name: Daily Quiz Generator

on:
  schedule:
    # 每天 UTC 22:00 = 北京时间次日 06:00
    - cron: "0 22 * * *"
  workflow_dispatch:
    # 支持手动触发（方便测试）

permissions:
  contents: write

jobs:
  generate-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate daily quiz
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.5' }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: python scripts/generate_quiz.py

      - name: Commit and push quiz
        run: |
          git add quiz_data.json scripts/student_profile.json data/results.json || true
          if ! git diff --cached --quiet; then
            DATE=$(date -u -d "+8 hours" +"%Y-%m-%d")
            git commit -m "chore: auto-generated daily quiz for $DATE"
            git push origin main
          else
            echo "No changes to commit."
          fi
