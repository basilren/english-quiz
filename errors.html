<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Bosco 错题本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);min-height:100vh;padding:12px;color:#333}
.container{max-width:600px;margin:0 auto}
.header{background:rgba(255,255,255,0.95);border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.header h1{font-size:20px;color:#c0392b;margin-bottom:4px}
.header .sub{font-size:12px;color:#888}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.summary-item{background:#fff5f5;border-radius:10px;padding:10px;text-align:center}
.summary-item .val{font-size:22px;font-weight:800;color:#c0392b}
.summary-item .lbl{font-size:11px;color:#999;margin-top:2px}

/* Date range picker */
.date-picker-section{background:rgba(255,255,255,.9);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.date-picker-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-picker-row label{font-size:13px;font-weight:600;color:#c0392b;white-space:nowrap}
.date-picker-row input[type="date"]{flex:1;padding:7px 10px;border:2px solid #f0e0e0;border-radius:8px;font-size:13px;color:#c0392b;background:#fff;outline:none;min-width:110px}
.date-picker-row input[type="date"]:focus{border-color:#e74c3c}
.date-picker-row .sep{font-size:13px;color:#999;padding:0 2px}
.date-range-info{font-size:11px;color:#999;margin-top:6px}

.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border-radius:20px;border:2px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:#fff;color:#c0392b;border-color:#fff}
.filter-btn:active{transform:scale(0.95)}

.date-group{margin-bottom:16px}
.date-label{color:rgba(255,255,255,0.85);font-size:13px;font-weight:600;margin-bottom:8px;padding-left:4px}

.card{background:rgba(255,255,255,0.97);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,0.1);animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.error-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;margin-right:6px;margin-bottom:8px;font-weight:600}
.tag-grammar{background:#3b82f6}.tag-cloze{background:#f59e0b}.tag-reading{background:#ef4444}.tag-vocabulary{background:#43b883}.tag-fill{background:#8b5cf6}
.error-source{font-size:11px;color:#aaa;margin-bottom:8px}
.error-stem{font-size:14px;line-height:1.6;margin-bottom:12px;white-space:pre-wrap;word-break:break-word;color:#333}
.opts{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.opt{padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.4;border:2px solid #f0edf5;background:#fafafa}
.opt.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b;font-weight:600}
.opt.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b;text-decoration:line-through;opacity:0.7}
.opt.dim{opacity:0.5}
.answer-info{font-size:12px;margin-bottom:8px;color:#666}
.answer-info .wrong-a{color:#c0392b;font-weight:700}.answer-info .correct-a{color:#1a7f4b;font-weight:700}
.expl{padding:12px 14px;background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;font-size:13px;line-height:1.7;color:#6b5900}

.empty-msg{background:rgba(255,255,255,0.95);border-radius:16px;padding:40px 20px;text-align:center;color:#888;font-size:15px}
.loading-msg{background:rgba(255,255,255,0.95);border-radius:16px;padding:40px 20px;text-align:center;color:#888;font-size:15px}
.link-bar{display:flex;gap:8px;margin-top:12px}
.link-btn{flex:1;display:block;text-align:center;padding:13px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;color:#fff}
.link-btn.purple{background:linear-gradient(135deg,#667eea,#764ba2)}
.link-btn.green{background:linear-gradient(135deg,#43b883,#2d8f6f)}
.footer{text-align:center;padding:14px;color:rgba(255,255,255,0.6);font-size:11px}

/* WeChat overlay */
.wx-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;flex-direction:column;align-items:center;padding-top:60px}
.wx-arrow{font-size:48px;color:#fff;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wx-msg{color:#fff;font-size:16px;text-align:center;margin-top:20px;line-height:1.8;padding:0 30px}
.wx-msg strong{font-size:18px}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- WeChat Guide Overlay -->
<div id="wxOverlay" class="wx-overlay hidden" onclick="this.classList.add('hidden')">
  <div class="wx-arrow">&#8599;&#65039;</div>
  <div class="wx-msg">
    <strong>&#128522; 微信内无法直接打开</strong><br><br>
    &#10147; 请点击右上角 <strong>&#8942;</strong> 菜单<br>
    &#10147; 选择「<strong>在浏览器中打开</strong>」<br><br>
    <span style="font-size:13px;opacity:.7">点击任意位置关闭此提示</span>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1 id="title">&#128210; Bosco 错题本</h1>
    <div class="sub" id="updateTime">加载中...</div>
    <div class="summary">
      <div class="summary-item"><div class="val" id="totalErrors">-</div><div class="lbl">错题总数</div></div>
      <div class="summary-item"><div class="val" id="totalPoints">-</div><div class="lbl">涉及知识点</div></div>
      <div class="summary-item"><div class="val" id="overallRate">-</div><div class="lbl">总正确率</div></div>
    </div>
  </div>

  <!-- Date range picker -->
  <div class="date-picker-section">
    <div class="date-picker-row">
      <label>&#128197;</label>
      <input type="date" id="dateFrom" onchange="onDateRangeChange()">
      <span class="sep">~</span>
      <input type="date" id="dateTo" onchange="onDateRangeChange()">
    </div>
    <div class="date-range-info" id="dateRangeInfo"></div>
  </div>

  <div class="filter-bar" id="filterBar">
    <div class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</div>
    <div class="filter-btn" data-filter="grammar" onclick="setFilter('grammar')">语法</div>
    <div class="filter-btn" data-filter="reading" onclick="setFilter('reading')">阅读</div>
    <div class="filter-btn" data-filter="cloze" onclick="setFilter('cloze')">完形</div>
    <div class="filter-btn" data-filter="vocabulary" onclick="setFilter('vocabulary')">词汇</div>
    <div class="filter-btn" data-filter="fill" onclick="setFilter('fill')">填空</div>
  </div>

  <div id="errorList"><div class="loading-msg">&#9203; 加载错题数据...</div></div>
  <div id="pagination"></div>

  <div class="link-bar">
    <a class="link-btn purple" href="/english-quiz/">&#128221; 去做题</a>
    <a class="link-btn green" href="/english-quiz/vocab_book.html">&#128218; 积累本</a>
    <a class="link-btn green" href="/english-quiz/report.html">&#128202; 学习报告</a>
  </div>
  <div class="footer">Bosco English Tutor &middot; 错题本随练习自动更新</div>
</div>

<script>
// === WeChat detection ===
(function(){
  var ua=navigator.userAgent.toLowerCase();
  if(ua.indexOf('micromessenger')!==-1){
    document.getElementById('wxOverlay').classList.remove('hidden');
  }
})();

var errorData = [];
var sessionsData = [];
var currentFilter = 'all';
var dateFrom = ''; // range start
var dateTo = '';   // range end
var currentPage = 1;
var PAGE_SIZE = 5;
var tagMap = {grammar:'tag-grammar',cloze:'tag-cloze',reading:'tag-reading',vocabulary:'tag-vocabulary',fill:'tag-fill'};
var typeMap = {grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',fill:'短文填空'};

function esc(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>');}

function daysAgo(dateStr){
  var d=new Date(dateStr+'T00:00:00'), now=new Date();
  now.setHours(0,0,0,0);
  return Math.floor((now-d)/(1000*60*60*24));
}

function dateLabel(dateStr){
  var ago=daysAgo(dateStr);
  if(ago===0) return '今天';
  if(ago===1) return '昨天';
  return dateStr;
}

function setFilter(f){
  currentFilter=f;currentPage=1;
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.filter===f);
  });
  render();
}

// === Date range management ===
function onDateRangeChange(){
  dateFrom=document.getElementById('dateFrom').value||'';
  dateTo=document.getElementById('dateTo').value||'';
  currentPage=1;
  updateDateRangeInfo();
  render();
}

function updateDateRangeInfo(){
  var info=document.getElementById('dateRangeInfo');
  if(!dateFrom && !dateTo){
    info.textContent='显示全部日期的错题';
    return;
  }
  if(dateFrom && dateTo && dateFrom===dateTo){
    info.textContent='筛选 '+dateFrom+' 当天的错题';
  } else if(dateFrom && dateTo){
    info.textContent='筛选 '+dateFrom+' ~ '+dateTo+' 的错题';
  } else if(dateFrom){
    info.textContent='筛选 '+dateFrom+' 之后的错题';
  } else {
    info.textContent='筛选 '+dateTo+' 之前的错题';
  }
}

function goPage(p){currentPage=p;render();window.scrollTo(0,document.getElementById('errorList').offsetTop-60);}

function getFiltered(){
  return errorData.filter(function(e){
    if(dateFrom && e.date<dateFrom) return false;
    if(dateTo && e.date>dateTo) return false;
    if(currentFilter==='all') return true;
    return e.type===currentFilter;
  }).sort(function(a,b){
    // Sort by date descending (today first), then question_id ascending
    if(a.date>b.date) return -1;
    if(a.date<b.date) return 1;
    return (a.question_id||0)-(b.question_id||0);
  });
}

// Find the date range that has errors
function findErrorDateRange(){
  if(errorData.length===0) return {min:'',max:''};
  var dates={};
  errorData.forEach(function(e){dates[e.date]=1;});
  var sorted=Object.keys(dates).sort();
  return {min:sorted[0]||'',max:sorted[sorted.length-1]||''};
}

function render(){
  var filtered=getFiltered();
  var area=document.getElementById('errorList');

  document.getElementById('totalErrors').textContent=filtered.length;
  var points={};
  filtered.forEach(function(e){points[e.knowledge_point]=1;});
  document.getElementById('totalPoints').textContent=Object.keys(points).length;

  if(sessionsData.length>0){
    var totalC=0,totalT=0;
    sessionsData.forEach(function(s){totalC+=s.correct;totalT+=s.total;});
    document.getElementById('overallRate').textContent=Math.round(totalC/totalT*100)+'%';
    document.getElementById('updateTime').textContent='共 '+sessionsData.length+' 组 &middot; 最后更新 '+sessionsData[sessionsData.length-1].date;
  }

  if(filtered.length===0){
    var dateInfo=(dateFrom||dateTo)?((dateFrom||'')+'~'+(dateTo||'')+' '):'';
    area.innerHTML='<div class="empty-msg">&#127881; '+dateInfo+'没有错题！继续保持！</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  // Pagination
  var totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  if(currentPage>totalPages) currentPage=totalPages;
  var start=(currentPage-1)*PAGE_SIZE;
  var pageItems=filtered.slice(start,start+PAGE_SIZE);

  // Group by date
  var groups={};
  pageItems.forEach(function(e){
    if(!groups[e.date]) groups[e.date]=[];
    groups[e.date].push(e);
  });

  var dates=Object.keys(groups).sort().reverse();
  var html='';
  dates.forEach(function(date){
    var label=dateLabel(date);
    html+='<div class="date-group">';
    html+='<div class="date-label">&#128197; '+label+' &middot; '+groups[date].length+'道错题</div>';
    groups[date].forEach(function(e){
      html+='<div class="card">';
      html+='<span class="error-tag '+(tagMap[e.type]||'tag-grammar')+'">'+(e.label||typeMap[e.type]||e.type)+'</span>';
      html+='<div class="error-source">第'+e.session+'组 &middot; 第'+e.question_id+'题</div>';
      html+='<div class="error-stem">'+esc(e.stem)+'</div>';
      html+='<div class="opts">';
      var letters=['A','B','C','D','E'];
      for(var i=0;i<e.options.length;i++){
        var L=letters[i], cls='opt';
        if(L===e.correct_answer) cls+=' correct';
        else if(L===e.student_answer) cls+=' wrong';
        else cls+=' dim';
        var mark='';
        if(L===e.correct_answer) mark=' &#10004;';
        if(L===e.student_answer && L!==e.correct_answer) mark=' &#10008; 你选';
        html+='<div class="'+cls+'">'+esc(e.options[i])+mark+'</div>';
      }
      html+='</div>';
      html+='<div class="answer-info">你选 <span class="wrong-a">'+e.student_answer+'</span> &#8594; 正确 <span class="correct-a">'+e.correct_answer+'</span></div>';
      html+='<div class="expl">&#128214; '+esc(e.explanation)+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  area.innerHTML=html;

  // Pagination controls
  var pgHtml='<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;padding-bottom:8px">';
  pgHtml+='<span style="font-size:12px;color:#64748b">'+filtered.length+' 题 &middot; 第 '+currentPage+'/'+totalPages+' 页</span>';
  pgHtml+='</div><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">';
  if(currentPage>1) pgHtml+='<button onclick="goPage('+(currentPage-1)+')" style="padding:6px 14px;border:1.5px solid #667eea;border-radius:8px;background:#fff;color:#667eea;font-size:13px;font-weight:600;cursor:pointer">&#9664; 上一页</button>';
  if(currentPage<totalPages) pgHtml+='<button onclick="goPage('+(currentPage+1)+')" style="padding:6px 14px;border:1.5px solid #667eea;border-radius:8px;background:#667eea;color:#fff;font-size:13px;font-weight:600;cursor:pointer">下一页 &#9654;</button>';
  pgHtml+='</div>';
  document.getElementById('pagination').innerHTML=pgHtml;
}

// Load data with fallback
function loadData(){
  var url='./data/results.json?v='+Date.now();
  var timeout=setTimeout(function(){
    document.getElementById('errorList').innerHTML='<div class="empty-msg">&#9203; 加载较慢，正在重试...</div>';
    loadFallback();
  },8000);

  fetch(url,{cache:'no-store'})
  .then(function(r){
    clearTimeout(timeout);
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  })
  .then(function(text){
    try{
      var data=JSON.parse(text);
      errorData=data.errors||[];
      sessionsData=data.sessions||[];
      initDatePicker();
      render();
    }catch(e){
      console.error('JSON parse error:',e);
      loadFallback();
    }
  })
  .catch(function(err){
    clearTimeout(timeout);
    console.error('Fetch error:',err);
    loadFallback();
  });
}

function loadFallback(){
  var apiUrl='https://api.github.com/repos/basilren/english-quiz/contents/data/results.json';
  fetch(apiUrl,{headers:{'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(info){
    if(!info.content) throw new Error('No content');
    var raw=atob(info.content.replace(/\n/g,''));
    var text=decodeURIComponent(escape(raw));
    var data=JSON.parse(text);
    errorData=data.errors||[];
    sessionsData=data.sessions||[];
    initDatePicker();
    render();
  })
  .catch(function(err){
    document.getElementById('errorList').innerHTML='<div class="empty-msg">&#9888; 加载失败，请刷新重试<br><span style="font-size:11px;color:#999">'+err.message+'</span></div>';
    console.error('Fallback error:',err);
  });
}

// Initialize: default to yesterday ~ today
function initDatePicker(){
  var today=new Date();
  var tStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  var yesterday=new Date();
  yesterday.setDate(yesterday.getDate()-1);
  var yStr=yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
  document.getElementById('dateFrom').value=yStr;
  document.getElementById('dateTo').value=tStr;
  dateFrom=yStr;
  dateTo=tStr;
  updateDateRangeInfo();
}

loadData();
</script>
</body>
</html>
