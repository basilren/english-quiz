<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:12px;color:#333}
.container{max-width:600px;margin:0 auto}
.header{background:rgba(255,255,255,.95);border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.header h1{font-size:18px;color:#4a3f8a;margin-bottom:4px}
.header .subtitle{font-size:12px;color:#888}
.progress-bar{width:100%;height:6px;background:#e8e4f0;border-radius:3px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:width .5s}
.progress-text{font-size:11px;color:#999;margin-top:4px}

/* Type Tabs */
.type-tabs{display:flex;gap:4px;background:rgba(255,255,255,.85);border-radius:12px;padding:4px;margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap}
.type-tab{flex:1;min-width:0;padding:8px 4px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:#888;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.type-tab.active{background:#fff;color:#4a3f8a;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.type-tab .tab-badge{display:inline-block;font-size:10px;background:#e8e4f0;color:#666;border-radius:8px;padding:1px 5px;margin-left:2px;vertical-align:middle}
.type-tab.active .tab-badge{background:#667eea;color:#fff}
.type-tab.done .tab-check{color:#43b883;margin-left:2px;font-size:11px}
.type-tab:active{transform:scale(.96)}

.card{background:rgba(255,255,255,.97);border-radius:16px;padding:20px 16px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card.compact .q-stem,.card.compact .reading-passage,.card.compact .options{line-height:1.4}
.card.compact .option-btn{padding:9px 12px;font-size:13px}
.card.compact .sub-question{margin-bottom:12px;padding-bottom:10px}
.card.compact .reading-passage{font-size:12px;line-height:1.6;padding:10px 12px}
.slide-in{animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}

.q-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;margin-bottom:10px;font-weight:600}
.tag-vocabulary{background:#43b883}.tag-grammar{background:#3b82f6}.tag-cloze{background:#f59e0b}.tag-reading{background:#ef4444}.tag-fill{background:#8b5cf6}
.q-number{font-size:13px;color:#999;margin-bottom:6px}
.q-stem{font-size:15px;line-height:1.6;margin-bottom:14px;white-space:pre-wrap;word-break:break-word}
.reading-passage{background:#f8f7ff;border-left:3px solid #667eea;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:13px;line-height:1.7;color:#444;white-space:pre-wrap;word-break:break-word}
/* Fill-in-blank passage: highlight blanks */
.fill-passage{background:#f8f7ff;border-left:3px solid #8b5cf6;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:13px;line-height:1.8;color:#444}
.fill-passage .blank{display:inline-block;min-width:30px;border-bottom:2px solid #8b5cf6;color:#8b5cf6;font-weight:700;padding:0 4px;margin:0 2px}
.fill-passage .blank.filled{color:#4a3f8a;background:#ede9fe;border-radius:4px;border-bottom:none;padding:1px 6px}
.fill-passage .blank.correct-blank{color:#1a7f4b;background:#edfff6;border-color:#43b883}
.fill-passage .blank.wrong-blank{color:#c0392b;background:#fff0f0;border-color:#ef4444}
/* Sentence-fill blank in passage */
.fill-blank-sentence{display:inline;border-bottom:2px dashed #8b5cf6;color:#8b5cf6;font-weight:600;padding:2px 4px;margin:0 2px}
.fill-blank-sentence.filled{color:#4a3f8a;background:#ede9fe;border-radius:6px;border-bottom:none;padding:2px 8px;font-size:12px;line-height:1.6}
.fill-blank-sentence.correct-blank{color:#1a7f4b;background:#edfff6;border-color:#43b883}
.fill-blank-sentence.wrong-blank{color:#c0392b;background:#fff0f0;border-color:#ef4444;text-decoration:line-through}
/* Options pool */
.fill-options-pool{background:#f3f0ff;border-radius:10px;padding:12px;margin-bottom:14px}
.pool-title{font-size:13px;font-weight:600;color:#4a3f8a;margin-bottom:8px}
.pool-opt{font-size:13px;line-height:1.6;padding:4px 0;color:#444;transition:opacity .2s}
.pool-opt.pool-used{opacity:.4;text-decoration:line-through}
.pool-letter{display:inline-block;width:22px;height:22px;border-radius:50%;background:#667eea;color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:22px;margin-right:6px}
/* Fill letter buttons */
.fill-letter-btns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.fill-letter-btn{width:44px;height:44px;border:2px solid #e8e4f0;border-radius:12px;background:#fff;font-size:16px;font-weight:700;color:#666;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fill-letter-btn:active{transform:scale(.95)}
.fill-letter-btn.selected{border-color:#667eea;background:#eef0ff;color:#4a3f8a}
.fill-letter-btn.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b}
.fill-letter-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}
.fill-letter-btn.disabled{pointer-events:none;opacity:.7}
.fill-letter-btn.dim{opacity:.4}
.sub-question{margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed #e8e4f0}
.sub-question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sub-q-label{font-size:14px;font-weight:600;color:#4a3f8a;margin-bottom:8px}

.options{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:center;padding:12px 14px;border:2px solid #e8e4f0;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.4;-webkit-tap-highlight-color:transparent}
.option-btn:active{transform:scale(.98)}
.option-btn.selected{border-color:#667eea;background:#eef0ff;color:#4a3f8a;font-weight:600}
.option-btn.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b}
.option-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}
.option-btn.disabled{pointer-events:none;opacity:.7}
.option-btn.dim{opacity:.5}
.option-letter{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#f0edf5;font-weight:700;font-size:13px;margin-right:10px;flex-shrink:0;transition:all .2s}
.selected .option-letter{background:#667eea;color:#fff}
.correct .option-letter{background:#43b883;color:#fff}
.wrong .option-letter{background:#ef4444;color:#fff}

.nav-bar{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary:not(:disabled):active{transform:scale(.97)}
.btn-secondary{background:#f0edf5;color:#666}
.btn-submit{background:linear-gradient(135deg,#43b883,#2d8f6f);color:#fff}
.btn-submit:active{transform:scale(.97)}
.btn-link{background:transparent;color:#667eea;font-size:13px;text-decoration:underline;padding:8px}

.explanation{margin-top:12px;padding:12px 14px;background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;font-size:13px;line-height:1.6;color:#6b5900;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.result-card{background:rgba(255,255,255,.97);border-radius:16px;padding:24px 18px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.result-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0}
.result-label{font-size:13px;color:#888}
.result-dots{margin:12px 0;font-size:18px;letter-spacing:3px}
.result-msg{font-size:14px;color:#555;margin:10px 0 16px;line-height:1.5}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stat-item{background:#f8f7ff;border-radius:10px;padding:10px}
.stat-item .val{font-size:20px;font-weight:700;color:#4a3f8a}
.stat-item .lbl{font-size:11px;color:#999;margin-top:2px}

.error-section{margin-top:14px;text-align:left}
.error-section h3{font-size:15px;color:#c0392b;margin-bottom:10px;text-align:center}
.error-item{background:#fff8f8;border:1px solid #ffe0e0;border-radius:10px;padding:12px;margin-bottom:8px}
.error-item .ei-head{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:6px}
.error-item .ei-stem{font-size:12px;color:#555;margin-bottom:4px;line-height:1.5;white-space:pre-wrap}
.error-item .ei-answer{font-size:12px;margin-bottom:4px}
.error-item .ei-explain{font-size:12px;line-height:1.5;color:#6b5900;background:#fffbeb;padding:8px;border-radius:6px}
.submitted-notice{text-align:center;padding:12px;background:#edfff6;border-radius:10px;margin-top:12px;color:#1a7f4b;font-weight:600;font-size:14px}

/* WeChat overlay */
.wx-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;flex-direction:column;align-items:center;padding-top:60px}
.wx-arrow{font-size:48px;color:#fff;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wx-msg{color:#fff;font-size:16px;text-align:center;margin-top:20px;line-height:1.8;padding:0 30px}
.wx-msg strong{font-size:18px}

.hidden{display:none!important}
</style>
</head>

var quizData = {"date":"2026-04-24","session_number":1,"questions":[{"id":1,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"-- Have you ever _____ to Beijing?\n-- Yes, I went there last summer.","options":["A. been","B. gone","C. go","D. going"],"correct_answer":"A","explanation":"have been to \u548c have gone to \u7684\u533a\u522b\u3002have been to \u8868\u793a'\u53bb\u8fc7\u67d0\u5730\uff08\u5df2\u7ecf\u56de\u6765\u4e86\uff09'\uff1bhave gone to \u8868\u793a'\u5df2\u7ecf\u53bb\u4e86\u67d0\u5730\uff08\u8fd8\u6ca1\u56de\u6765\uff09'\u3002\u8fd9\u91cc\u56de\u7b54\u8bf4'\u6211\u53bb\u5e74\u590f\u5929\u53bb\u4e86\u90a3\u91cc'\uff0c\u8bf4\u660e\u5df2\u7ecf\u56de\u6765\u4e86\uff0c\u6240\u4ee5\u7528 been\u3002C(go) \u539f\u5f62\u4e0d\u80fd\u76f4\u63a5\u8ddf have\uff1bD(going) \u662f\u73b0\u5728\u5206\u8bcd\uff0c\u642d\u914d\u9519\u8bef\u3002\u8bb0\u4f4f\uff1a\u95ee'\u4f60\u53bb\u8fc7\u5417'\u7528 been\uff0c\u8bf4'\u4ed6\u53bb\u4e86\uff08\u4e0d\u5728\u8fd9\u513f\uff09'\u7528 gone\u3002"},{"id":2,"type":"grammar","knowledge_point":"object_clause","difficulty":2,"stem":"I wonder _____ he will come to the party tomorrow.","options":["A. that","B. what","C. whether","D. which"],"correct_answer":"C","explanation":"\u5bbe\u8bed\u4ece\u53e5\u5f15\u5bfc\u8bcd\u9009\u62e9\u3002wonder \u8868\u793a'\u60f3\u77e5\u9053'\uff0c\u540e\u9762\u63a5'\u662f\u5426'\u7528 whether \u6216 if\u3002\u53e5\u610f\uff1a'\u6211\u60f3\u77e5\u9053\u4ed6\u660e\u5929\u662f\u5426\u4f1a\u6765\u53c2\u52a0\u805a\u4f1a\u3002'A(that) \u5f15\u5bfc\u786e\u5b9a\u7684\u4e8b\u5b9e\uff0c\u4f46 wonder \u8868\u793a\u4e0d\u786e\u5b9a\uff1bB(what) \u5f15\u5bfc'\u4ec0\u4e48'\uff0c\u4f46\u4ece\u53e5 he will come \u662f\u5b8c\u6574\u7684\uff0c\u4e0d\u7f3a\u6210\u5206\uff1bD(which) \u5f15\u5bfc'\u54ea\u4e00\u4e2a'\uff0c\u8bed\u610f\u4e0d\u5bf9\u3002\u505a\u9898\u53e3\u8bc0\uff1awonder/not sure/don't know \u540e\u9762\u5e38\u63a5 whether/if\uff08\u662f\u5426\uff09\u3002"},{"id":3,"type":"grammar","knowledge_point":"it_pattern","difficulty":2,"stem":"It is important for us _____ English well.","options":["A. learn","B. learning","C. to learn","D. learned"],"correct_answer":"C","explanation":"it \u53e5\u578b\u3002It is + adj. + for sb. + to do sth. = \u5bf9\u67d0\u4eba\u6765\u8bf4\u505a\u67d0\u4e8b\u662f......\u7684\u3002\u8fd9\u662f\u56fa\u5b9a\u53e5\u578b\uff0cit \u662f\u5f62\u5f0f\u4e3b\u8bed\uff0c\u771f\u6b63\u7684\u4e3b\u8bed\u662f\u540e\u9762\u7684 to do \u4e0d\u5b9a\u5f0f\u3002A(learn) \u52a8\u8bcd\u539f\u5f62\u4e0d\u80fd\u76f4\u63a5\u653e\u8fd9\u91cc\uff1bB(learning) \u52a8\u540d\u8bcd\u867d\u7136\u4e5f\u53ef\u4ee5\u4f5c\u4e3b\u8bed\uff0c\u4f46\u5728 It is...for sb...\u7ed3\u6784\u4e2d\u56fa\u5b9a\u642d\u914d to do\uff1bD(learned) \u8fc7\u53bb\u5f0f\u4e0d\u5bf9\u3002\u7c7b\u4f3c\u53e5\u578b\uff1aIt is necessary/difficult/easy for sb. to do sth."},{"id":4,"type":"grammar","knowledge_point":"conjunction_sub","difficulty":2,"stem":"_____ it was raining heavily, the football match was put off.","options":["A. Though","B. Because","C. Unless","D. Until"],"correct_answer":"B","explanation":"\u4ece\u5c5e\u8fde\u8bcd\u2014\u2014\u56e0\u679c\u5173\u7cfb\u3002\u53e5\u610f\uff1a'___\u4e0b\u5927\u96e8\uff0c\u8db3\u7403\u6bd4\u8d5b\u88ab\u63a8\u8fdf\u4e86\u3002'\u5927\u96e8\u662f\u63a8\u8fdf\u6bd4\u8d5b\u7684\u539f\u56e0\uff0c\u6240\u4ee5\u7528 Because\uff08\u56e0\u4e3a\uff09\u3002A(Though \u867d\u7136) \u8868\u793a\u8ba9\u6b65\u5173\u7cfb\u2014\u2014'\u867d\u7136\u4e0b\u96e8\uff0c\u4f46\u6bd4\u8d5b\u7167\u5e38'\u624d\u5bf9\uff1bC(Unless \u9664\u975e) \u8868\u793a\u6761\u4ef6\u2014\u2014'\u9664\u975e\u4e0b\u96e8'\u8bed\u610f\u4e0d\u901a\uff1bD(Until \u76f4\u5230) \u8868\u793a\u65f6\u95f4\u3002\u505a\u9898\uff1a\u5148\u5224\u65ad\u4e24\u4e2a\u5206\u53e5\u4e4b\u95f4\u662f\u56e0\u679c\u3001\u8ba9\u6b65\u8fd8\u662f\u6761\u4ef6\u5173\u7cfb\uff0c\u518d\u9009\u8fde\u8bcd\u3002"},{"id":5,"type":"vocabulary","knowledge_point":"context_word","difficulty":2,"stem":"The movie was so _____ that half of the audience fell asleep before it ended.","options":["A. exciting","B. boring","C. moving","D. surprising"],"correct_answer":"B","explanation":"\u8bed\u5883\u9009\u8bcd\u3002\u540e\u534a\u53e5\u8bf4'\u4e00\u534a\u89c2\u4f17\u5728\u7535\u5f71\u7ed3\u675f\u524d\u5c31\u7761\u7740\u4e86'\u2014\u2014\u8bf4\u660e\u7535\u5f71\u5f88\u65e0\u804a\u3002boring = \u65e0\u804a\u7684\u3001\u4ee4\u4eba\u538c\u5026\u7684\u3002A(exciting \u523a\u6fc0\u7684) \u89c2\u4f17\u4e0d\u4f1a\u7761\u7740\uff1bC(moving \u611f\u4eba\u7684) \u611f\u4eba\u7684\u7535\u5f71\u4f1a\u8ba9\u4eba\u6d41\u6cea\u800c\u4e0d\u662f\u7761\u89c9\uff1bD(surprising \u4ee4\u4eba\u60ca\u8bb6\u7684) \u60ca\u8bb6\u4e5f\u4e0d\u4f1a\u5bfc\u81f4\u7761\u89c9\u3002\u505a\u9898\uff1a\u5173\u952e\u7ebf\u7d22\u662f'fell asleep\uff08\u7761\u7740\u4e86\uff09'\uff0c\u5012\u63a8\u7535\u5f71\u4e00\u5b9a\u662f\u65e0\u804a\u7684\u3002"},{"id":6,"type":"vocabulary","knowledge_point":"word_form","difficulty":2,"stem":"We were all _____ (amaze) by the beautiful sunset at the beach yesterday.","options":["A. amaze","B. amazing","C. amazed","D. amazement"],"correct_answer":"C","explanation":"\u8bcd\u5f62\u53d8\u6362\u2014\u2014ed \u5f62\u5bb9\u8bcd vs ing \u5f62\u5bb9\u8bcd\u3002\u4e3b\u8bed\u662f we\uff08\u4eba\uff09\uff0c\u7528 -ed \u5f62\u5f0f\u8868\u793a\u4eba\u7684\u611f\u53d7\uff1aamazed = \u611f\u5230\u60ca\u53f9\u7684\u3002-ing \u5f62\u5f0f\u63cf\u8ff0\u4e8b\u7269\u7279\u5f81\uff1aamazing sunset\uff08\u4ee4\u4eba\u60ca\u53f9\u7684\u65e5\u843d\uff09\u3002A(amaze) \u662f\u52a8\u8bcd\u539f\u5f62\uff0c\u4e0d\u80fd\u653e\u5728 be \u540e\u9762\u4f5c\u8868\u8bed\uff1bD(amazement) \u662f\u540d\u8bcd'\u60ca\u53f9'\uff0c\u8bcd\u6027\u4e0d\u5bf9\u3002\u8bb0\u4f4f\uff1a\u4eba\u7684\u611f\u53d7\u7528 -ed\uff08bored, excited, interested\uff09\uff0c\u4e8b\u7269\u7684\u7279\u5f81\u7528 -ing\uff08boring, exciting, interesting\uff09\u3002"},{"id":7,"type":"vocabulary","knowledge_point":"phrase_collocation","difficulty":2,"stem":"You should _____ your promise. Don't let your friends down.","options":["A. make","B. keep","C. break","D. take"],"correct_answer":"B","explanation":"\u8bcd\u7ec4\u642d\u914d\u3002keep one's promise = \u9075\u5b88\u8bfa\u8a00\u3002\u540e\u4e00\u53e5'\u4e0d\u8981\u8ba9\u4f60\u7684\u670b\u53cb\u5931\u671b'\u6697\u793a\u5e94\u8be5\u4fe1\u5b88\u627f\u8bfa\u3002A(make a promise) \u662f'\u8bb8\u4e0b\u627f\u8bfa'\uff0c\u4f46\u53e5\u610f\u662f\u8981\u4f60\u9075\u5b88\u5df2\u6709\u7684\u627f\u8bfa\uff1bC(break a promise) \u662f'\u8fdd\u80cc\u627f\u8bfa'\uff0c\u4e0e\u540e\u6587'\u4e0d\u8981\u8ba9\u670b\u53cb\u5931\u671b'\u77db\u76fe\uff1bD(take a promise) \u4e0d\u662f\u6b63\u786e\u642d\u914d\u3002\u4e09\u4e2a\u5e38\u89c1promise\u642d\u914d\uff1amake a promise\uff08\u8bb8\u8bfa\uff09\u3001keep a promise\uff08\u5b88\u8bfa\uff09\u3001break a promise\uff08\u98df\u8a00\uff09\u3002"},{"id":8,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","group_passage":"Our school held a photography competition last month. At first, I did not want to take part because I thought my photos were not good enough. My best friend Amy (8)___ me to have a try.\n\nI spent two weekends walking around the city with my camera. I took pictures of old buildings, street markets, and people reading in the park. Among all my photos, I liked the one of an elderly man (9)___ chess with his grandson the most. Their smiles were so warm that I could not help pressing the shutter.\n\nOn the day of the exhibition, I was (10)___ to see my photo displayed on the main wall. The judge said my picture 'told a beautiful (11)___ about family and love.' I did not win the first prize, but many visitors stopped to look at my work.\n\nFrom this experience, I realised that a good photo is not about expensive equipment or perfect (12)___. It is about catching real moments and true feelings. I am glad Amy pushed me to try -- sometimes we need a little encouragement to discover what we can do.","stem":"(8)___","options":["A. ordered","B. warned","C. encouraged","D. forced"],"correct_answer":"C","explanation":"\u60c5\u611f\u8bcd + \u4e0a\u4e0b\u6587\u63a8\u7406\u3002\u524d\u9762\u8bf4'\u6211\u4e0d\u60f3\u53c2\u52a0\u56e0\u4e3a\u89c9\u5f97\u81ea\u5df1\u7684\u7167\u7247\u4e0d\u591f\u597d'\uff0c\u540e\u9762\u6700\u540e\u4e00\u6bb5\u8bf4'I am glad Amy pushed me to try'\u548c'sometimes we need a little encouragement'\u2014\u2014\u76f4\u63a5\u70b9\u660e\u4e86\u662f'\u9f13\u52b1'\u3002A(ordered \u547d\u4ee4) \u670b\u53cb\u4e0d\u4f1a\u547d\u4ee4\uff1bB(warned \u8b66\u544a) \u4e0d\u5408\u8bed\u5883\uff1bD(forced \u5f3a\u8feb) \u592a\u8d1f\u9762\uff0c\u4e0d\u7b26\u5408'best friend'\u7684\u6e29\u6696\u6c1b\u56f4\u3002\u505a\u9898\uff1a\u6587\u672b\u7684 encouragement \u662f\u6700\u76f4\u63a5\u7684\u7ebf\u7d22\uff0c\u4e0e encouraged \u547c\u5e94\u3002"},{"id":9,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(9)___","options":["A. playing","B. watching","C. winning","D. teaching"],"correct_answer":"A","explanation":"\u8bed\u5883\u63a8\u7406 + \u642d\u914d\u3002'\u4e00\u4f4d\u8001\u4eba\u548c\u4ed6\u5b59\u5b50___\u68cb'\u3002play chess = \u4e0b\u68cb\uff0c\u662f\u6700\u5e38\u89c1\u7684\u642d\u914d\u3002\u540e\u9762\u8bf4'\u4ed6\u4eec\u7684\u7b11\u5bb9\u975e\u5e38\u6e29\u6696'\u2014\u2014\u8001\u4eba\u548c\u5b59\u5b50\u4e00\u8d77\u4e0b\u68cb\u662f\u6e29\u99a8\u7684\u753b\u9762\u3002B(watching \u770b) watch chess \u867d\u7136\u80fd\u8bf4\u901a\uff0c\u4f46\u4e24\u4e2a\u4eba\u4e00\u8d77'\u770b\u68cb'\u4e0d\u5982'\u4e0b\u68cb'\u81ea\u7136\uff1bC(winning \u8d62) \u8bed\u6cd5\u4e0a\u53ef\u4ee5\u4f46\u53ea\u80fd\u8bf4\u4e00\u4e2a\u4eba\u8d62\uff1bD(teaching \u6559) \u867d\u7136\u8001\u4eba\u6559\u5b59\u5b50\u4e0b\u68cb\u4e5f\u5408\u7406\uff0c\u4f46\u540e\u6587\u7528\u4e86 their smiles\uff08\u4e24\u4eba\u7684\u7b11\u5bb9\uff09\uff0c\u8bf4\u660e\u4e24\u4eba\u662f\u4e92\u52a8\u7684\u3001\u5f00\u5fc3\u7684\u3002"},{"id":10,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(10)___","options":["A. angry","B. nervous","C. surprised","D. bored"],"correct_answer":"C","explanation":"\u8de8\u53e5\u63a8\u7406\u3002\u524d\u9762\u8bf4'\u6211\u89c9\u5f97\u81ea\u5df1\u7167\u7247\u4e0d\u591f\u597d'\uff0c\u7ed3\u679c\u5728\u5c55\u89c8\u65e5\u770b\u5230\u81ea\u5df1\u7684\u7167\u7247\u88ab\u6302\u5728\u4e3b\u5899\u4e0a\u2014\u2014\u8fd9\u79cd\u610f\u5916\u53d1\u73b0\u4f1a\u8ba9\u4eba\u611f\u5230\u60ca\u8bb6(surprised)\u3002A(angry \u751f\u6c14) \u6ca1\u6709\u751f\u6c14\u7684\u539f\u56e0\uff1bB(nervous \u7d27\u5f20) \u867d\u7136\u4e5f\u6709\u53ef\u80fd\uff0c\u4f46\u540e\u9762\u8bc4\u59d4\u7684\u6b63\u9762\u8bc4\u4ef7\u548c'I did not win first prize but...'\u7684\u8f7b\u677e\u8bed\u6c14\u8bf4\u660e\u6574\u4f53\u662f\u79ef\u6781\u60ca\u559c\uff1bD(bored \u65e0\u804a) \u770b\u5230\u81ea\u5df1\u7684\u4f5c\u54c1\u88ab\u5c55\u793a\u4e0d\u4f1a\u65e0\u804a\u3002\u505a\u9898\uff1a\u6ce8\u610f\u60c5\u611f\u7684\u53cd\u8f6c\u2014\u2014\u4ece'\u4e0d\u81ea\u4fe1'\u5230'\u60ca\u559c\u5730\u770b\u5230\u88ab\u5c55\u793a'\u3002"},{"id":11,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(11)___","options":["A. story","B. joke","C. lesson","D. lie"],"correct_answer":"A","explanation":"\u56fa\u5b9a\u642d\u914d + \u8bed\u5883\u3002\u8bc4\u59d4\u8bf4\u7167\u7247'told a beautiful ___ about family and love'\u2014\u2014\u4e00\u5f20\u7167\u7247\u80fd'\u8bb2\u8ff0'\u7684\u662f story\uff08\u6545\u4e8b\uff09\u3002tell a story = \u8bb2\u6545\u4e8b\u3002B(joke \u7b11\u8bdd) \u4e0e'\u5bb6\u5ead\u548c\u7231'\u7684\u6e29\u99a8\u4e3b\u9898\u4e0d\u642d\uff1bC(lesson \u8bfe/\u6559\u8bad) 'tell a lesson'\u642d\u914d\u4e0d\u5730\u9053\uff0c\u5e94\u8be5\u662f teach a lesson\uff1bD(lie \u8c0e\u8a00) 'a beautiful lie'\u4e0e\u6b63\u9762\u8bc4\u4ef7\u77db\u76fe\u3002\u505a\u9898\uff1atell a story \u662f\u82f1\u8bed\u4e2d\u975e\u5e38\u5e38\u89c1\u7684\u642d\u914d\uff0c\u56fe\u7247/\u7167\u7247'\u8bb2\u6545\u4e8b'\u662f\u9ad8\u9891\u8868\u8fbe\u3002"},{"id":12,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(12)___","options":["A. technique","B. memory","C. weather","D. score"],"correct_answer":"A","explanation":"\u4e3b\u65e8\u547c\u5e94 + \u6392\u9664\u6cd5\u3002\u6700\u540e\u4e00\u6bb5\u603b\u7ed3\uff1a'\u597d\u7167\u7247\u4e0d\u5728\u4e8e\u6602\u8d35\u7684\u8bbe\u5907\u6216\u5b8c\u7f8e\u7684___\uff0c\u800c\u662f\u6355\u6349\u771f\u5b9e\u7684\u77ac\u95f4\u548c\u771f\u60c5\u5b9e\u611f\u3002'\u4e0e expensive equipment\uff08\u6602\u8d35\u8bbe\u5907\uff09\u5e76\u5217\u7684\u5e94\u8be5\u662f\u6444\u5f71\u7684\u53e6\u4e00\u4e2a\u6280\u672f\u8981\u7d20\u2014\u2014technique\uff08\u6280\u5de7/\u6280\u672f\uff09\u3002B(memory \u8bb0\u5fc6) \u4e0e\u6444\u5f71\u6280\u672f\u65e0\u5173\uff1bC(weather \u5929\u6c14) \u867d\u7136\u5929\u6c14\u5f71\u54cd\u6444\u5f71\uff0c\u4f46'\u5b8c\u7f8e\u7684\u5929\u6c14'\u4e0e'\u597d\u7167\u7247\u7684\u5b9a\u4e49'\u8fd9\u4e2a\u8bba\u70b9\u4e0d\u76f8\u5173\uff1bD(score \u5206\u6570) \u4e0d\u642d\u914d\u3002\u505a\u9898\uff1a\u6ce8\u610f not about A or B, but about C \u7684\u5bf9\u6bd4\u7ed3\u6784\u2014\u2014A \u548c B \u662f\u540c\u4e00\u7c7b\u4e8b\u7269\uff08\u6280\u672f\u5c42\u9762\uff09\u3002"},{"id":13,"type":"reading","knowledge_point":"detail","difficulty":2,"group":"reading_1","group_passage":"In the Italian city of Milan, there are two unusual apartment buildings called Bosco Verticale, which means 'Vertical Forest' in English. Completed in 2014, these twin towers are covered with about 900 trees and over 20,000 plants on their balconies.\n\nThe idea came from Italian architect Stefano Boeri. He wanted to bring nature back into the city. Each apartment has a wide balcony where trees and bushes grow in large containers. The plants are chosen carefully according to which direction the balcony faces -- sun-loving plants go on the south side, while shade-tolerant ones are placed on the north.\n\nThe Vertical Forest is not just beautiful to look at. The plants help clean the air by absorbing carbon dioxide and producing oxygen. In summer, the leaves provide natural shade, reducing the need for air conditioning by up to 30%. In winter, the bare branches allow sunlight to warm the rooms. The buildings also provide habitats for birds and insects that are rarely seen in city centres.\n\nOf course, maintaining a vertical forest is not easy. A team of specially trained 'flying gardeners' uses ropes to climb down the outside of the buildings several times a year to prune and care for the plants. The watering system is automatic, using recycled grey water from the building.\n\nBoeri's idea has inspired similar projects around the world. Vertical forests are now being built or planned in cities such as Nanjing, Eindhoven, and Paris. As cities continue to grow, buildings like these may offer a way to keep urban life green and healthy.","stem":"According to the passage, the plants on the balconies help reduce the use of air conditioning by up to _____ in summer.","options":["A. 20%","B. 30%","C. 50%","D. 900%"],"correct_answer":"B","explanation":"\u539f\u6587\u7b2c\u4e09\u6bb5\u660e\u786e\u8bf4 'reducing the need for air conditioning by up to 30%'\u3002A(20%) 20,000 \u662f\u690d\u7269\u6570\u91cf\u4e0d\u662f\u767e\u5206\u6bd4\uff1bC(50%) \u6587\u4e2d\u6ca1\u6709\u8fd9\u4e2a\u6570\u5b57\uff1bD(900%) 900 \u662f\u6811\u6728\u6570\u91cf\u3002\u7ec6\u8282\u9898\u505a\u9898\u6280\u5de7\uff1a\u5b9a\u4f4d\u5173\u952e\u8bcd 'air conditioning' \u56de\u539f\u6587\u627e\u6570\u636e\u3002"},{"id":14,"type":"reading","knowledge_point":"inference","difficulty":2,"group":"reading_1","stem":"What can we infer about the 'flying gardeners' mentioned in Paragraph 4?","options":["A. They water the plants by hand every day.","B. They work at a great height, which requires special skills.","C. They live inside the apartment buildings.","D. They designed the buildings together with Boeri."],"correct_answer":"B","explanation":"\u63a8\u7406\u5224\u65ad\u3002\u539f\u6587\u8bf4'specially trained flying gardeners use ropes to climb down the outside of the buildings'\u2014\u2014\u7528\u7ef3\u7d22\u4ece\u5efa\u7b51\u5916\u90e8\u6500\u722c\u800c\u4e0b\uff0c\u8fd9\u8bf4\u660e\u4ed6\u4eec\u5728\u9ad8\u7a7a\u4f5c\u4e1a\uff0c\u9700\u8981\u4e13\u4e1a\u8bad\u7ec3\uff08special skills\uff09\u3002A(\u6bcf\u5929\u624b\u52a8\u6d47\u6c34) \u539f\u6587\u8bf4\u6d47\u6c34\u7cfb\u7edf\u662f\u81ea\u52a8\u7684(automatic)\uff0c\u7528\u7684\u662f\u56de\u6536\u7070\u6c34\uff1bC(\u4f4f\u5728\u516c\u5bd3\u91cc) \u6587\u4e2d\u6ca1\u6709\u63d0\u5230\u4ed6\u4eec\u4f4f\u5728\u90a3\u91cc\uff1bD(\u548c Boeri \u4e00\u8d77\u8bbe\u8ba1) \u6587\u4e2d\u53ea\u8bf4 Boeri \u662f\u8bbe\u8ba1\u5e08\uff0cflying gardeners \u662f\u7ef4\u62a4\u4eba\u5458\u3002"},{"id":15,"type":"reading","knowledge_point":"word_guessing","difficulty":2,"group":"reading_1","stem":"The underlined word 'prune' in Paragraph 4 probably means _____.","options":["A. plant new trees","B. cut and shape branches","C. paint the walls","D. count the leaves"],"correct_answer":"B","explanation":"\u8bcd\u4e49\u731c\u6d4b\u3002\u539f\u6587\uff1agardeners use ropes to climb down the outside of the buildings to prune and care for the plants\u3002\u4e0a\u4e0b\u6587\u7ebf\u7d22\uff1a(1) \u8fd9\u4e9b\u56ed\u4e01\u4e13\u95e8\u8d1f\u8d23\u690d\u7269\u7ef4\u62a4\uff08care for the plants\uff09\uff1b(2) prune \u548c care for \u5e76\u5217\uff0c\u8bf4\u660e prune \u4e5f\u662f\u690d\u7269\u7ef4\u62a4\u7684\u4e00\u79cd\u52a8\u4f5c\u3002\u5728\u56ed\u827a\u4e2d\uff0cprune = \u4fee\u526a\u679d\u53f6\uff08cut and shape branches\uff09\uff0c\u662f\u5e38\u89c1\u7684\u7ef4\u62a4\u624b\u6bb5\u3002A(\u79cd\u65b0\u6811) \u79cd\u6811\u4e0d\u9700\u8981\u4ece\u5916\u9762\u722c\u4e0b\u6765\uff1bC(\u5237\u5899) \u4e0e\u690d\u7269\u65e0\u5173\uff1bD(\u6570\u53f6\u5b50) \u4e0d\u5408\u903b\u8f91\u3002"},{"id":16,"type":"reading","knowledge_point":"attitude_purpose","difficulty":2,"group":"reading_1","stem":"What is the writer's attitude towards vertical forests?","options":["A. Doubtful -- they cost too much money.","B. Negative -- they are bad for the environment.","C. Positive -- they may help make cities greener.","D. Indifferent -- the writer does not care about them."],"correct_answer":"C","explanation":"\u89c2\u70b9\u6001\u5ea6\u9898\u3002\u6700\u540e\u4e00\u6bb5\uff1a'Boeri's idea has inspired similar projects around the world'\uff08\u542f\u53d1\u4e86\u5168\u7403\u7c7b\u4f3c\u9879\u76ee\uff09+ 'buildings like these may offer a way to keep urban life green and healthy'\uff08\u53ef\u80fd\u4e3a\u57ce\u5e02\u751f\u6d3b\u4fdd\u6301\u7eff\u8272\u5065\u5eb7\u63d0\u4f9b\u9014\u5f84\uff09\u2014\u2014\u4f5c\u8005\u7528 inspired\u3001green and healthy \u7b49\u79ef\u6781\u8bcd\u6c47\uff0c\u6001\u5ea6\u660e\u663e\u662f\u6b63\u9762\u7684\u3002A \u8bf4'\u6000\u7591\u2014\u2014\u82b1\u8d39\u592a\u591a'\uff0c\u6587\u4e2d\u6ca1\u6709\u6279\u8bc4\u6210\u672c\uff1bB \u8bf4'\u8d1f\u9762\u2014\u2014\u5bf9\u73af\u5883\u6709\u5bb3'\uff0c\u4e0e\u5168\u6587\u76f8\u53cd\uff1bD \u8bf4'\u6f20\u4e0d\u5173\u5fc3'\uff0c\u4f46\u4f5c\u8005\u5199\u4e86\u8be6\u7ec6\u7684\u4ecb\u7ecd\u548c\u5c55\u671b\u3002\u505a\u9898\uff1a\u770b\u6700\u540e\u4e00\u6bb5\u7684\u603b\u7ed3\u6027\u8bed\u8a00\u2014\u2014\u79ef\u6781\u8bcd\u6c47 = \u6b63\u9762\u6001\u5ea6\u3002"},{"id":17,"type":"fill","knowledge_point":"sentence_fill","difficulty":2,"group":"fill_1","group_passage":"Last month, a new community reading corner opened near our school. It is a small wooden house filled with books for children and adults.\n\nAnyone can borrow a book for free. (17)___ This 'take one, leave one' rule keeps the reading corner alive and growing.\n\nEvery Saturday morning, volunteers come to organise the books and clean the space. (18)___ The children sit in a circle and listen carefully, sometimes asking questions about the characters.\n\nMy favourite part is the 'Book Recommendation Wall.' (19)___ I once found a great science fiction novel because a girl in Grade 9 wrote that it 'changed the way she sees the future.'\n\n(20)___ It is more than just a place with books -- it has become a warm community where neighbours share knowledge and stories.","stem":"(17)___","options":["A. They also read picture books aloud to younger kids.","B. The reading corner has brought people of all ages together.","C. Readers can write a short note about any book they love and stick it on the wall.","D. The only rule is that you should bring back a book or donate another one in return.","E. The local government plans to build a large library next year."],"correct_answer":"D","explanation":"\u7a7a\u683c\u524d\u8bf4'\u4efb\u4f55\u4eba\u90fd\u53ef\u4ee5\u514d\u8d39\u501f\u4e66'\uff0c\u7a7a\u683c\u540e\u8bf4'\u8fd9\u4e2a\"\u62ff\u4e00\u672c\uff0c\u7559\u4e00\u672c\"\u7684\u89c4\u5219\u8ba9\u8bfb\u4e66\u89d2\u4fdd\u6301\u6d3b\u529b\u5e76\u4e0d\u65ad\u6210\u957f'\u3002\u7a7a\u683c\u5904\u5e94\u89e3\u91ca\u8fd9\u4e2a\u89c4\u5219\u662f\u4ec0\u4e48\u3002D\uff08\u552f\u4e00\u7684\u89c4\u5219\u662f\u4f60\u9700\u8981\u5f52\u8fd8\u4e00\u672c\u4e66\u6216\u6350\u8d60\u53e6\u4e00\u672c\u4f5c\u4e3a\u56de\u62a5\uff09\u6b63\u597d\u89e3\u91ca\u4e86'take one, leave one'\u89c4\u5219\u7684\u5185\u5bb9\u3002A \u662f\u5173\u4e8e\u8bfb\u7ed8\u672c\u7684\uff1bB \u662f\u603b\u7ed3\u6027\u53e5\u5b50\uff1bC \u662f\u5173\u4e8e\u63a8\u8350\u5899\u7684\uff1bE \u662f\u5173\u4e8e\u653f\u5e9c\u5efa\u56fe\u4e66\u9986\u7684\u3002"},{"id":18,"type":"fill","knowledge_point":"sentence_fill","difficulty":2,"group":"fill_1","stem":"(18)___","options":["A. They also read picture books aloud to younger kids.","B. The reading corner has brought people of all ages together.","C. Readers can write a short note about any book they love and stick it on the wall.","D. The only rule is that you should bring back a book or donate another one in return.","E. The local government plans to build a larg   else html=renderGroup(page, isCompact);
  html+='<div class="nav-bar">';
  if(currentPage>0) html+='<button class="btn btn-secondary" onclick="prevPage()">&#9664; 上一页</button>';
  var allPageConfirmed = page.indices.every(function(idx){return confirmed[idx];});
  var allPageAnswered = page.indices.every(function(idx){return answers[idx]!==null;});
  if(!allPageConfirmed){
    html+='<button class="btn btn-submit" onclick="confirmPage()" '+(allPageAnswered?'':'disabled')+'>&#10004; 提交本页</button>';
  } else if(currentPage<totalPages-1){
    html+='<button class="btn btn-primary" onclick="nextPage()">下一页 &#9654;</button>';
  } else {
    var allDone=confirmed.every(Boolean);
    if(allDone) html+='<button class="btn btn-primary" onclick="showResult()">&#128202; 查看成绩</button>';
    else html+='<button class="btn btn-primary" onclick="goNext()">继续答题 &#9654;</button>';
  }
  html+='</div>';
  area.innerHTML=html;
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  updateProgress();
}

function renderSingle(idx, compact){
  var q=questions[idx];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[q.type]||'tag-grammar')+'">'+(typeLabels[q.type]||q.type)+'</span>';
  html+='<div class="q-number">第'+q.id+'题</div>';
  html+='<div class="q-stem">'+esc(q.stem)+'</div>';
  html+=renderOpts(idx);
  if(confirmed[idx]) html+=renderExpl(idx);
  html+='</div>'; return html;
}

function renderGroup(page, compact){
  var indices=page.indices, fq=questions[indices[0]];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[fq.type]||'tag-grammar')+'">'+(typeLabels[fq.type]||fq.type)+'</span>';

  if(fq.type==='fill' && fq.group_passage){
    // Sentence-fill: passage with blanks + shared option pool
    html+=renderFillPassage(fq.group_passage, indices);
    // Shared options pool (A-E)
    html+='<div class="fill-options-pool">';
    html+='<div class="pool-title">&#128221; \u53e5\u5b50\u9009\u9879\uff08\u5176\u4e2d\u4e00\u9879\u4e3a\u5e72\u6270\u9879\uff09</div>';
    var opts=fq.options;
    for(var k=0;k<opts.length;k++){
      var L=String.fromCharCode(65+k);
      var used=false;
      for(var m=0;m<indices.length;m++){if(answers[indices[m]]===L)used=true;}
      html+='<div class="pool-opt'+(used?' pool-used':'')+'"><span class="pool-letter">'+L+'</span> '+esc(opts[k].replace(/^[A-E]\.\s*/,''))+'</div>';
    }
    html+='</div>';
    // Per-blank selection
    for(var j=0;j<indices.length;j++){
      var idx=indices[j], q=questions[idx];
      html+='<div class="sub-question">';
      html+='<div class="sub-q-label">\u7b2c'+q.id+'\u9898 '+esc(q.stem)+' \u2192 \u8bf7\u9009\u62e9\u586b\u5165\u7684\u53e5\u5b50</div>';
      html+=renderFillSelect(idx, indices);
      if(confirmed[idx]) html+=renderExpl(idx);
      html+='</div>';
    }
  } else {
    if(fq.group_passage){
      html+='<div class="reading-passage">'+esc(fq.group_passage)+'</div>';
    }
    for(var j=0;j<indices.length;j++){
      var idx=indices[j], q=questions[idx];
      html+='<div class="sub-question">';
      html+='<div class="sub-q-label">\u7b2c'+q.id+'\u9898 '+esc(q.stem)+'</div>';
      html+=renderOpts(idx);
      if(confirmed[idx]) html+=renderExpl(idx);
      html+='</div>';
    }
  }
  html+='</div>'; return html;
}

function renderFillPassage(passage, indices){
  // Replace (N)_____ style blanks with sentence-level placeholders
  var html = esc(passage);
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    var num=q.id;
    var pattern=new RegExp('\\('+num+'\\)_+','g');
    var selectedLetter=answers[idx];
    var displayText='______';
    if(selectedLetter){
      var optIdx=selectedLetter.charCodeAt(0)-65;
      var optText=q.options[optIdx]?q.options[optIdx].replace(/^[A-E]\.\s*/,''):'';
      displayText=selectedLetter+'. '+optText;
    }
    var cls='fill-blank-sentence';
    if(selectedLetter) cls+=' filled';
    if(confirmed[idx]){
      if(selectedLetter===q.correct_answer) cls+=' correct-blank';
      else cls+=' wrong-blank';
    }
    html=html.replace(pattern,'<span class="'+cls+'"><b>('+num+')</b> '+displayText+'</span>');
  }
  return '<div class="fill-passage">'+html+'</div>';
}

function renderFillSelect(idx, allIndices){
  // Render compact letter buttons (A-E) for choosing which sentence fills this blank
  var q=questions[idx];
  var letters=['A','B','C','D','E'];
  var html='<div class="fill-letter-btns">';
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls='fill-letter-btn';
    if(confirmed[idx]){
      cls+=' disabled';
      if(L===q.correct_answer) cls+=' correct';
      else if(sel&&L!==q.correct_answer) cls+=' wrong';
      else cls+=' dim';
    } else {
      if(sel) cls+=' selected';
    }
    html+='<button class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">'+L+'</button>';
  }
  html+='</div>';
  return html;
}

function renderOpts(idx){
  var q=questions[idx], html='<div class="options">';
  // For fill type, options may have E
  var letters = q.options.length > 4 ? ['A','B','C','D','E'] : ['A','B','C','D'];
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls='option-btn';
    if(confirmed[idx]){
      cls+=' disabled';
      if(L===q.correct_answer) cls+=' correct';
      else if(sel&&L!==q.correct_answer) cls+=' wrong';
      else cls+=' dim';
    } else { if(sel) cls+=' selected'; }
    var txt=q.options[i].replace(/^[A-E]\.\s*/,'');
    html+='<div class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">';
    html+='<span class="option-letter">'+L+'</span><span>'+esc(txt)+'</span></div>';
  }
  html+='</div>'; return html;
}

function renderExpl(idx){
  var q=questions[idx], ok=answers[idx]===q.correct_answer;
  var icon=ok?'&#10004;':'&#10008;', pre=ok?'':'你选 '+answers[idx]+'，正确答案 '+q.correct_answer+'。';
  return '<div class="explanation">'+(ok?'<span style="color:#43b883;font-weight:700">'+icon+' 正确！</span> ':'<span style="color:#c0392b;font-weight:700">'+icon+' 错误</span> '+pre)+esc(q.explanation)+'</div>';
}

function selOpt(idx,L){ if(confirmed[idx])return; answers[idx]=L; renderPage(); }

function confirmPage(){
  var page=pages[currentPage];
  var unanswered=page.indices.filter(function(i){return answers[i]===null;});
  if(unanswered.length>0){alert('本页还有'+unanswered.length+'题未作答');return;}
  page.indices.forEach(function(i){confirmed[i]=true;});
  renderPage();
  saveProgress();
}

function nextPage(){ if(currentPage<totalPages-1){currentPage++;renderPage();window.scrollTo(0,0);} }
function prevPage(){ if(currentPage>0){currentPage--;renderPage();window.scrollTo(0,0);} }
function goNext(){
  for(var i=0;i<totalPages;i++){
    if(!pages[i].indices.every(function(idx){return confirmed[idx];})){currentPage=i;renderPage();window.scrollTo(0,0);return;}
  }
}

function saveProgress(){
  var allDone=confirmed.every(Boolean);
  if(!allDone)return;
  var correct=0, ansStr='';
  for(var i=0;i<totalQ;i++){
    if(answers[i]===questions[i].correct_answer) correct++;
    ansStr+=answers[i];
  }
  var record={date:quizData.date,session:quizData.session_number,answers:ansStr,score:correct,total:totalQ,rate:Math.round(correct/totalQ*100),timestamp:new Date().toISOString(),submitted:true};
  try{
    localStorage.setItem('basco_quiz_'+quizData.date+'_'+quizData.session_number,JSON.stringify(record));
    var hist=JSON.parse(localStorage.getItem('basco_history')||'[]');
    hist.push(record);
    localStorage.setItem('basco_history',JSON.stringify(hist));
  }catch(e){}
}

// === GitHub API auto-submit ===
var GH_OWNER='basilren', GH_REPO='english-quiz', GH_FILE='data/results.json';
var _tk=['github_pat_','11CAZBMYQ0','EWA4S994N2','X0_iLeXXLY','u2lw8w0tlE','cDYG92Uu58','cZrfYp8mpr','TaZ8Hi5TEI','YZS77OXoDHFJ'];
function _gt(){return _tk.join('');}

function submitToGitHub(){
  var syncBtn=document.getElementById('syncBtn');
  var syncStatus=document.getElementById('syncStatus');
  if(syncBtn)syncBtn.disabled=true;
  if(syncStatus)syncStatus.innerHTML='&#9889; 正在同步数据...';

  var newErrors=[];
  var typeLabelsMap={grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',fill:'短文填空'};
  var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',word_form:'词形变换',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测',sentence_fill:'短文填空'};
  var correct=0;
  for(var i=0;i<totalQ;i++){
    var q=questions[i];
    if(answers[i]===q.correct_answer){correct++;}
    else{
      newErrors.push({
        date:quizData.date,
        session:quizData.session_number,
        question_id:q.id,
        type:q.type,
        knowledge_point:q.knowledge_point,
        label:kpLabels[q.knowledge_point]||(typeLabelsMap[q.type]||q.type),
        stem:q.stem,
        options:q.options,
        correct_answer:q.correct_answer,
        student_answer:answers[i],
        explanation:q.explanation
      });
    }
  }
  var newSession={date:quizData.date,session:quizData.session_number,total:totalQ,correct:correct,rate:Math.round(correct/totalQ*100)};

  var apiBase='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
  var token=_gt();

  fetch(apiBase,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(fileInfo){
    var existing;
    if(fileInfo.content){
      try{
        var raw=atob(fileInfo.content.replace(/\n/g,''));
        var utf8=decodeURIComponent(escape(raw));
        existing=JSON.parse(utf8);
      }catch(e){existing={student:'Bosco',sessions:[],errors:[]};}
    } else {
      existing={student:'Bosco',sessions:[],errors:[]};
    }

    var dup=existing.sessions.some(function(s){return s.date===newSession.date&&s.session===newSession.session;});
    if(dup){
      if(syncStatus)syncStatus.innerHTML='&#10004; 本组成绩已同步过';
      if(syncBtn){syncBtn.disabled=false;syncBtn.textContent='已同步';}
      return Promise.resolve('skip');
    }

    existing.sessions.push(newSession);
    for(var j=0;j<newErrors.length;j++){existing.errors.push(newErrors[j]);}
    if(existing.errors.length>50) existing.errors=existing.errors.slice(existing.errors.length-50);

    var newContent=btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2))));
    var body={message:'Submit session '+newSession.date+' #'+newSession.session+' ('+newSession.rate+'%)',content:newContent,sha:fileInfo.sha};

    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(r){
    if(r==='skip')return;
    if(r.ok){
      if(syncStatus)syncStatus.innerHTML='&#10004; 错题本和学习报告已自动更新！';
      if(syncBtn){syncBtn.textContent='&#10004; 已同步';syncBtn.style.background='#43b883';}
    }else{
      r.json().then(function(e){
        if(syncStatus)syncStatus.innerHTML='&#9888; 同步失败，可稍后重试';
        if(syncBtn)syncBtn.disabled=false;
        console.error('GitHub API error:',e);
      });
    }
  })
  .catch(function(err){
    if(syncStatus)syncStatus.innerHTML='&#9888; 网络错误，可稍后重试';
    if(syncBtn)syncBtn.disabled=false;
    console.error('Submit error:',err);
  });
}

function showResult(){
  saveProgress();
  document.getElementById('questionArea').classList.add('hidden');
  var area=document.getElementById('resultArea'); area.classList.remove('hidden');
  var correct=0,dots='',errors=[],ansStr='';
  for(var i=0;i<totalQ;i++){
    var ok=answers[i]===questions[i].correct_answer;
    if(ok){correct++;dots+='&#10004;';}else{dots+='&#10008;';errors.push(i);}
    ansStr+=answers[i];
  }
  var rate=Math.round(correct/totalQ*100);
  var emoji=rate>=80?'&#127881;':rate>=60?'&#128170;':'&#128218;';
  var msg=rate>=90?'太棒了！几乎全对！':rate>=80?'很不错！继续保持！':rate>=60?'还可以，错题好好看讲解！':'别灰心，弄懂错题就是进步！';
  var html='<div class="result-card">';
  html+='<div class="result-label">第 27 天成绩</div>';
  html+='<div class="result-score">'+correct+'/'+totalQ+'</div>';
  html+='<div class="result-dots">'+dots+'</div>';
  html+='<div class="result-msg">'+emoji+' '+msg+'</div>';
  html+='<div class="stat-grid"><div class="stat-item"><div class="val">'+rate+'%</div><div class="lbl">正确率</div></div>';
  html+='<div class="stat-item"><div class="val">'+errors.length+'</div><div class="lbl">错题数</div></div></div>';
  html+='<div class="submitted-notice">&#10004; 答案已自动归档</div>';
  html+='<div id="syncStatus" style="text-align:center;padding:8px;font-size:13px;color:#667eea;font-weight:600;margin-top:8px">&#9889; 正在同步到错题本...</div>';
  if(errors.length>0){
    html+='<div class="error-section"><h3>&#10008; 错题详解</h3>';
    for(var j=0;j<errors.length;j++){
      var idx=errors[j],q=questions[idx];
      var sp=q.stem.length>60?q.stem.substring(0,60)+'...':q.stem;
      html+='<div class="error-item"><div class="ei-head">第'+q.id+'题 &middot; '+(typeLabels[q.type]||q.type)+'</div>';
      html+='<div class="ei-stem">'+esc(sp)+'</div>';
      html+='<div class="ei-answer">你选：<span style="color:#c0392b;font-weight:600">'+answers[idx]+'</span>&emsp;正确：<span style="color:#1a7f4b;font-weight:600">'+q.correct_answer+'</span></div>';
      html+='<div class="ei-explain">&#128214; '+esc(q.explanation)+'</div></div>';
    }
    html+='</div>';
  }
  html+='<div class="nav-bar" style="margin-top:16px">';
  html+='<button class="btn btn-secondary" onclick="reviewAll()">&#128203; 逐题回顾</button>';
  html+='<button class="btn btn-primary" onclick="copyAns(\''+ansStr+'\')">&#128203; 复制答案</button>';
  html+='</div>';
  html+='<div class="nav-bar" style="margin-top:12px">';
  html+='<button class="btn btn-link" onclick="window.location.href=\'errors.html\'">&#128221; 查看错题本</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'report.html\'">&#128202; 查看学习报告</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'index.html\'">&#128221; 再做一组</button>';
  html+='</div>';
  html+='<div style="text-align:center;margin-top:10px"><button id="syncBtn" class="btn btn-secondary" onclick="submitToGitHub()" style="width:auto;padding:8px 20px;font-size:12px">&#128259; 重新同步</button></div>';
  html+='</div>';
  area.innerHTML=html; window.scrollTo(0,0);
  submitToGitHub();
}

  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');

}
