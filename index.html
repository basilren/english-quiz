<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:12px;color:#333}
.container{max-width:600px;margin:0 auto}
.header{background:rgba(255,255,255,.95);border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.header h1{font-size:18px;color:#4a3f8a;margin-bottom:4px}
.header .subtitle{font-size:12px;color:#888}
.progress-bar{width:100%;height:6px;background:#e8e4f0;border-radius:3px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:width .5s}
.progress-text{font-size:11px;color:#999;margin-top:4px}

/* Type Tabs */
.type-tabs{display:flex;gap:4px;background:rgba(255,255,255,.85);border-radius:12px;padding:4px;margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap}
.type-tab{flex:1;min-width:0;padding:8px 4px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:#888;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.type-tab.active{background:#fff;color:#4a3f8a;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.type-tab .tab-badge{display:inline-block;font-size:10px;background:#e8e4f0;color:#666;border-radius:8px;padding:1px 5px;margin-left:2px;vertical-align:middle}
.type-tab.active .tab-badge{background:#667eea;color:#fff}
.type-tab.done .tab-check{color:#43b883;margin-left:2px;font-size:11px}
.type-tab:active{transform:scale(.96)}

.card{background:rgba(255,255,255,.97);border-radius:16px;padding:20px 16px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card.compact .q-stem,.card.compact .reading-passage,.card.compact .options{line-height:1.4}
.card.compact .option-btn{padding:9px 12px;font-size:13px}
.card.compact .sub-question{margin-bottom:12px;padding-bottom:10px}
.card.compact .reading-passage{font-size:12px;line-height:1.6;padding:10px 12px}
.slide-in{animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}

.q-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;margin-bottom:10px;font-weight:600}
.tag-vocabulary{background:#43b883}.tag-grammar{background:#3b82f6}.tag-cloze{background:#f59e0b}.tag-reading{background:#ef4444}.tag-fill{background:#8b5cf6}
.q-number{font-size:13px;color:#999;margin-bottom:6px}
.q-stem{font-size:15px;line-height:1.6;margin-bottom:14px;white-space:pre-wrap;word-break:break-word}
.reading-passage{background:#f8f7ff;border-left:3px solid #667eea;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:13px;line-height:1.7;color:#444;white-space:pre-wrap;word-break:break-word}
/* Fill-in-blank passage: highlight blanks */
.fill-passage{background:#f8f7ff;border-left:3px solid #8b5cf6;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:13px;line-height:1.8;color:#444}
.fill-passage .blank{display:inline-block;min-width:30px;border-bottom:2px solid #8b5cf6;color:#8b5cf6;font-weight:700;padding:0 4px;margin:0 2px}
.fill-passage .blank.filled{color:#4a3f8a;background:#ede9fe;border-radius:4px;border-bottom:none;padding:1px 6px}
.fill-passage .blank.correct-blank{color:#1a7f4b;background:#edfff6;border-color:#43b883}
.fill-passage .blank.wrong-blank{color:#c0392b;background:#fff0f0;border-color:#ef4444}
/* Sentence-fill blank in passage */
.fill-blank-sentence{display:inline;border-bottom:2px dashed #8b5cf6;color:#8b5cf6;font-weight:600;padding:2px 4px;margin:0 2px}
.fill-blank-sentence.filled{color:#4a3f8a;background:#ede9fe;border-radius:6px;border-bottom:none;padding:2px 8px;font-size:12px;line-height:1.6}
.fill-blank-sentence.correct-blank{color:#1a7f4b;background:#edfff6;border-color:#43b883}
.fill-blank-sentence.wrong-blank{color:#c0392b;background:#fff0f0;border-color:#ef4444;text-decoration:line-through}
/* Options pool */
.fill-options-pool{background:#f3f0ff;border-radius:10px;padding:12px;margin-bottom:14px}
.pool-title{font-size:13px;font-weight:600;color:#4a3f8a;margin-bottom:8px}
.pool-opt{font-size:13px;line-height:1.6;padding:4px 0;color:#444;transition:opacity .2s}
.pool-opt.pool-used{opacity:.4;text-decoration:line-through}
.pool-letter{display:inline-block;width:22px;height:22px;border-radius:50%;background:#667eea;color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:22px;margin-right:6px}
/* Fill letter buttons */
.fill-letter-btns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.fill-letter-btn{width:44px;height:44px;border:2px solid #e8e4f0;border-radius:12px;background:#fff;font-size:16px;font-weight:700;color:#666;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fill-letter-btn:active{transform:scale(.95)}
.fill-letter-btn.selected{border-color:#667eea;background:#eef0ff;color:#4a3f8a}
.fill-letter-btn.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b}
.fill-letter-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}
.fill-letter-btn.disabled{pointer-events:none;opacity:.7}
.fill-letter-btn.dim{opacity:.4}
.sub-question{margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed #e8e4f0}
.sub-question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sub-q-label{font-size:14px;font-weight:600;color:#4a3f8a;margin-bottom:8px}

.options{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:center;padding:12px 14px;border:2px solid #e8e4f0;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.4;-webkit-tap-highlight-color:transparent}
.option-btn:active{transform:scale(.98)}
.option-btn.selected{border-color:#667eea;background:#eef0ff;color:#4a3f8a;font-weight:600}
.option-btn.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b}
.option-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}
.option-btn.disabled{pointer-events:none;opacity:.7}
.option-btn.dim{opacity:.5}
.option-letter{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#f0edf5;font-weight:700;font-size:13px;margin-right:10px;flex-shrink:0;transition:all .2s}
.selected .option-letter{background:#667eea;color:#fff}
.correct .option-letter{background:#43b883;color:#fff}
.wrong .option-letter{background:#ef4444;color:#fff}

.nav-bar{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary:not(:disabled):active{transform:scale(.97)}
.btn-secondary{background:#f0edf5;color:#666}
.btn-submit{background:linear-gradient(135deg,#43b883,#2d8f6f);color:#fff}
.btn-submit:active{transform:scale(.97)}
.btn-link{background:transparent;color:#667eea;font-size:13px;text-decoration:underline;padding:8px}

.explanation{margin-top:12px;padding:12px 14px;background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;font-size:13px;line-height:1.6;color:#6b5900;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.result-card{background:rgba(255,255,255,.97);border-radius:16px;padding:24px 18px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.result-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0}
.result-label{font-size:13px;color:#888}
.result-dots{margin:12px 0;font-size:18px;letter-spacing:3px}
.result-msg{font-size:14px;color:#555;margin:10px 0 16px;line-height:1.5}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stat-item{background:#f8f7ff;border-radius:10px;padding:10px}
.stat-item .val{font-size:20px;font-weight:700;color:#4a3f8a}
.stat-item .lbl{font-size:11px;color:#999;margin-top:2px}

.error-section{margin-top:14px;text-align:left}
.error-section h3{font-size:15px;color:#c0392b;margin-bottom:10px;text-align:center}
.error-item{background:#fff8f8;border:1px solid #ffe0e0;border-radius:10px;padding:12px;margin-bottom:8px}
.error-item .ei-head{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:6px}
.error-item .ei-stem{font-size:12px;color:#555;margin-bottom:4px;line-height:1.5;white-space:pre-wrap}
.error-item .ei-answer{font-size:12px;margin-bottom:4px}
.error-item .ei-explain{font-size:12px;line-height:1.5;color:#6b5900;background:#fffbeb;padding:8px;border-radius:6px}
.submitted-notice{text-align:center;padding:12px;background:#edfff6;border-radius:10px;margin-top:12px;color:#1a7f4b;font-weight:600;font-size:14px}

/* WeChat overlay */
.wx-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;flex-direction:column;align-items:center;padding-top:60px}
.wx-arrow{font-size:48px;color:#fff;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wx-msg{color:#fff;font-size:16px;text-align:center;margin-top:20px;line-height:1.8;padding:0 30px}
.wx-msg strong{font-size:18px}

.hidden{display:none!important}

/* Word lookup popup */
.word-popup{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.98);border-radius:16px;padding:16px 20px;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:10000;min-width:260px;max-width:90vw;opacity:0;transition:all .25s ease;pointer-events:none}
.word-popup.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.word-popup .pw-word{font-size:18px;font-weight:700;color:#4a3f8a;margin-bottom:6px}
.word-popup .pw-meaning{font-size:14px;color:#555;margin-bottom:10px;line-height:1.5}
.word-popup .pw-confusable{font-size:12px;color:#c0392b;margin-bottom:12px}
.word-popup .pw-btns{display:flex;gap:8px}
.word-popup .pw-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.word-popup .pw-btn-add{background:linear-gradient(135deg,#43b883,#2d8f6f);color:#fff}
.word-popup .pw-btn-close{background:#f0edf5;color:#666}
.word-popup .pw-toast{color:#43b883;font-size:12px;text-align:center;margin-top:8px;font-weight:600;min-height:18px}

/* Bottom nav */
.bottom-nav{display:flex;gap:6px;margin-top:12px}
.bottom-nav a{flex:1;padding:10px 4px;text-align:center;border-radius:10px;background:rgba(255,255,255,.9);color:#4a3f8a;font-size:12px;font-weight:600;text-decoration:none}
.bottom-nav a:active{transform:scale(.96)}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:10001}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

var typeShortLabels = {vocabulary:'词汇',grammar:'语法',cloze:'完形',reading:'阅读',fill:'填空'};
var tagClasses = {vocabulary:'tag-vocabulary',grammar:'tag-grammar',cloze:'tag-cloze',reading:'tag-reading',fill:'tag-fill'};
var typeLabels={grammar:'语法题',vocabulary:'词汇题',cloze:'完形填空',reading:'阅读理解',fill:'短文填空'};

// Initialize from quizData
var questions=quizData.questions;
var totalQ=questions.length;
var answers=new Array(totalQ);
var confirmed=new Array(totalQ);
for(var _i=0;_i<totalQ;_i++){answers[_i]=null;confirmed[_i]=false;}
var currentPage=0;

// Build pages: group by group field, singles get their own page
var pages=[];
(function(){
  var grouped={},order=[];
  questions.forEach(function(q,i){
    var g=q.group||('_single_'+i);
    if(!grouped[g]){grouped[g]=[];order.push(g);}
    grouped[g].push(i);
  });
  order.forEach(function(g){
    pages.push({group:g,indices:grouped[g]});
  });
})();
var totalPages=pages.length;

// Map type -> page indices
var typePageMap = {};
var typeOrder = [];
(function(){
  for(var p=0;p<pages.length;p++){
    var t=questions[pages[p].indices[0]].type;
    if(!typePageMap[t]){typePageMap[t]=[];typeOrder.push(t);}
    typePageMap[t].push(p);
  }
})();
// Count questions per type
var typeQCount = {};
questions.forEach(function(q){typeQCount[q.type]=(typeQCount[q.type]||0)+1;});

function getCurrentType(){ return questions[pages[currentPage].indices[0]].type; }

function buildTypeTabs(){
  var curType=getCurrentType();
  var html='';
  typeOrder.forEach(function(t){
    if(!typePageMap[t]) return;
    var cnt=typeQCount[t]||0;
    var allDone=true;
    questions.forEach(function(q,i){if(q.type===t&&!confirmed[i])allDone=false;});
    var cls='type-tab'+(curType===t?' active':'')+(allDone?' done':'');
    html+='<button class="'+cls+'" onclick="jumpToType(\''+t+'\')">';
    html+=(typeShortLabels[t]||t);
    html+='<span class="tab-badge">'+cnt+'</span>';
    if(allDone) html+='<span class="tab-check">&#10003;</span>';
    html+='</button>';
  });
  document.getElementById('typeTabs').innerHTML=html;
}

function jumpToType(type){
  var pgs=typePageMap[type];
  if(!pgs||pgs.length===0)return;
  var target=pgs[0];
  for(var i=0;i<pgs.length;i++){
    var pg=pages[pgs[i]];
    if(!pg.indices.every(function(idx){return confirmed[idx];})){target=pgs[i];break;}
  }
  currentPage=target;
  renderPage();
  window.scrollTo(0,0);
}

function esc(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>');}
function updateProgress(){
  var done=confirmed.filter(Boolean).length;
  document.getElementById('progressFill').style.width=(done/totalQ*100)+'%';
  document.getElementById('progressText').textContent='第'+(currentPage+1)+'页/共'+totalPages+'页 已完成'+done+'/'+totalQ+'题';
}

function renderPage(){
  buildTypeTabs();
  var page=pages[currentPage], area=document.getElementById('questionArea'), html='';
  var isCompact = page.indices.length > 3 ? ' compact' : '';
  if(page.type==='single') html=renderSingle(page.indices[0], isCompact);
  else html=renderGroup(page, isCompact);
  html+='<div class="nav-bar">';
  if(currentPage>0) html+='<button class="btn btn-secondary" onclick="prevPage()">&#9664; 上一页</button>';
  var allPageConfirmed = page.indices.every(function(idx){return confirmed[idx];});
  var allPageAnswered = page.indices.every(function(idx){return answers[idx]!==null;});
  if(!allPageConfirmed){
    html+='<button class="btn btn-submit" onclick="confirmPage()" '+(allPageAnswered?'':'disabled')+'>&#10004; 提交本页</button>';
  } else if(currentPage<totalPages-1){
    html+='<button class="btn btn-primary" onclick="nextPage()">下一页 &#9654;</button>';
  } else {
    var allDone=confirmed.every(Boolean);
    if(allDone) html+='<button class="btn btn-primary" onclick="showResult()">&#128202; 查看成绩</button>';
    else html+='<button class="btn btn-primary" onclick="goNext()">继续答题 &#9654;</button>';
  }
  html+='</div>';
  area.innerHTML=html;
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  updateProgress();
}

function renderSingle(idx, compact){
  var q=questions[idx];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[q.type]||'tag-grammar')+'">'+(typeLabels[q.type]||q.type)+'</span>';
  html+='<div class="q-number">第'+q.id+'题</div>';
  html+='<div class="q-stem">'+esc(q.stem)+'</div>';
  html+=renderOpts(idx);
  if(confirmed[idx]) html+=renderExpl(idx);
  html+='</div>'; return html;
}

function renderGroup(page, compact){
  var indices=page.indices, fq=questions[indices[0]];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[fq.type]||'tag-grammar')+'">'+(typeLabels[fq.type]||fq.type)+'</span>';

  if(fq.type==='fill' && fq.group_passage){
    // Sentence-fill: passage with blanks + shared option pool
    html+=renderFillPassage(fq.group_passage, indices);
    // Shared options pool (A-E)
    html+='<div class="fill-options-pool">';
    html+='<div class="pool-title">&#128221; \u53e5\u5b50\u9009\u9879\uff08\u5176\u4e2d\u4e00\u9879\u4e3a\u5e72\u6270\u9879\uff09</div>';
    var opts=fq.options;
    for(var k=0;k<opts.length;k++){
      var L=String.fromCharCode(65+k);
      var used=false;
      for(var m=0;m<indices.length;m++){if(answers[indices[m]]===L)used=true;}
      html+='<div class="pool-opt'+(used?' pool-used':'')+'"><span class="pool-letter">'+L+'</span> '+esc(opts[k].replace(/^[A-E]\.\s*/,''))+'</div>';
    }
    html+='</div>';
    // Per-blank selection
    for(var j=0;j<indices.length;j++){
      var idx=indices[j], q=questions[idx];
      html+='<div class="sub-question">';
      html+='<div class="sub-q-label">\u7b2c'+q.id+'\u9898 '+esc(q.stem)+' \u2192 \u8bf7\u9009\u62e9\u586b\u5165\u7684\u53e5\u5b50</div>';
      html+=renderFillSelect(idx, indices);
      if(confirmed[idx]) html+=renderExpl(idx);
      html+='</div>';
    }
  } else {
    if(fq.group_passage){
      html+='<div class="reading-passage">'+esc(fq.group_passage)+'</div>';
    }
    for(var j=0;j<indices.length;j++){
      var idx=indices[j], q=questions[idx];
      html+='<div class="sub-question">';
      html+='<div class="sub-q-label">\u7b2c'+q.id+'\u9898 '+esc(q.stem)+'</div>';
      html+=renderOpts(idx);
      if(confirmed[idx]) html+=renderExpl(idx);
      html+='</div>';
    }
  }
  html+='</div>'; return html;
}

function renderFillPassage(passage, indices){
  // Replace (N)_____ style blanks with sentence-level placeholders
  var html = esc(passage);
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    var num=q.id;
    var pattern=new RegExp('\\('+num+'\\)_+','g');
    var selectedLetter=answers[idx];
    var displayText='______';
    if(selectedLetter){
      var optIdx=selectedLetter.charCodeAt(0)-65;
      var optText=q.options[optIdx]?q.options[optIdx].replace(/^[A-E]\.\s*/,''):'';
      displayText=selectedLetter+'. '+optText;
    }
    var cls='fill-blank-sentence';
    if(selectedLetter) cls+=' filled';
    if(confirmed[idx]){
      if(selectedLetter===q.correct_answer) cls+=' correct-blank';
      else cls+=' wrong-blank';
    }
    html=html.replace(pattern,'<span class="'+cls+'"><b>('+num+')</b> '+displayText+'</span>');
  }
  return '<div class="fill-passage">'+html+'</div>';
}

function renderFillSelect(idx, allIndices){
  // Render compact letter buttons (A-E) for choosing which sentence fills this blank
  var q=questions[idx];
  var letters=['A','B','C','D','E'];
  var html='<div class="fill-letter-btns">';
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls='fill-letter-btn';
    if(confirmed[idx]){
      cls+=' disabled';
      if(L===q.correct_answer) cls+=' correct';
      else if(sel&&L!==q.correct_answer) cls+=' wrong';
      else cls+=' dim';
    } else {
      if(sel) cls+=' selected';
    }
    html+='<button class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">'+L+'</button>';
  }
  html+='</div>';
  return html;
}

function renderOpts(idx){
  var q=questions[idx], html='<div class="options">';
  // For fill type, options may have E
  var letters = q.options.length > 4 ? ['A','B','C','D','E'] : ['A','B','C','D'];
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls='option-btn';
    if(confirmed[idx]){
      cls+=' disabled';
      if(L===q.correct_answer) cls+=' correct';
      else if(sel&&L!==q.correct_answer) cls+=' wrong';
      else cls+=' dim';
    } else { if(sel) cls+=' selected'; }
    var txt=q.options[i].replace(/^[A-E]\.\s*/,'');
    html+='<div class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">';
    html+='<span class="option-letter">'+L+'</span><span>'+esc(txt)+'</span></div>';
  }
  html+='</div>'; return html;
}

function renderExpl(idx){
  var q=questions[idx], ok=answers[idx]===q.correct_answer;
  var icon=ok?'&#10004;':'&#10008;', pre=ok?'':'你选 '+answers[idx]+'，正确答案 '+q.correct_answer+'。';
  return '<div class="explanation">'+(ok?'<span style="color:#43b883;font-weight:700">'+icon+' 正确！</span> ':'<span style="color:#c0392b;font-weight:700">'+icon+' 错误</span> '+pre)+esc(q.explanation)+'</div>';
}

function selOpt(idx,L){ if(confirmed[idx])return; answers[idx]=L; renderPage(); }

function confirmPage(){
  var page=pages[currentPage];
  var unanswered=page.indices.filter(function(i){return answers[i]===null;});
  if(unanswered.length>0){alert('本页还有'+unanswered.length+'题未作答');return;}
  page.indices.forEach(function(i){confirmed[i]=true;});
  renderPage();
  saveProgress();
}

function nextPage(){ if(currentPage<totalPages-1){currentPage++;renderPage();window.scrollTo(0,0);} }
function prevPage(){ if(currentPage>0){currentPage--;renderPage();window.scrollTo(0,0);} }
function goNext(){
  for(var i=0;i<totalPages;i++){
    if(!pages[i].indices.every(function(idx){return confirmed[idx];})){currentPage=i;renderPage();window.scrollTo(0,0);return;}
  }
}

function saveProgress(){
  var allDone=confirmed.every(Boolean);
  if(!allDone)return;
  var correct=0, ansStr='';
  for(var i=0;i<totalQ;i++){
    if(answers[i]===questions[i].correct_answer) correct++;
    ansStr+=answers[i];
  }
  var record={date:quizData.date,session:quizData.session_number,answers:ansStr,score:correct,total:totalQ,rate:Math.round(correct/totalQ*100),timestamp:new Date().toISOString(),submitted:true};
  try{
    localStorage.setItem('basco_quiz_'+quizData.date+'_'+quizData.session_number,JSON.stringify(record));
    var hist=JSON.parse(localStorage.getItem('basco_history')||'[]');
    hist.push(record);
    localStorage.setItem('basco_history',JSON.stringify(hist));
  }catch(e){}
}

function submitToGitHub(){
  var syncBtn=document.getElementById('syncBtn');
  var syncStatus=document.getElementById('syncStatus');
  if(syncBtn)syncBtn.disabled=true;
  if(syncStatus)syncStatus.innerHTML='&#9889; 正在同步数据...';

  var newErrors=[];
  var typeLabelsMap={grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',fill:'短文填空'};
  var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',word_form:'词形变换',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测',sentence_fill:'短文填空'};
  var correct=0;
  for(var i=0;i<totalQ;i++){
    var q=questions[i];
    if(answers[i]===q.correct_answer){correct++;}
    else{
      newErrors.push({
        date:quizData.date,
        session:quizData.session_number,
        question_id:q.id,
        type:q.type,
        knowledge_point:q.knowledge_point,
        label:kpLabels[q.knowledge_point]||(typeLabelsMap[q.type]||q.type),
        stem:q.stem,
        options:q.options,
        correct_answer:q.correct_answer,
        student_answer:answers[i],
        explanation:q.explanation
      });
    }
  }
  var newSession={date:quizData.date,session:quizData.session_number,total:totalQ,correct:correct,rate:Math.round(correct/totalQ*100)};

  var apiBase='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
  var token=_gt();

  fetch(apiBase,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(fileInfo){
    var existing;
    if(fileInfo.content){
      try{
        var raw=atob(fileInfo.content.replace(/\n/g,''));
        var utf8=decodeURIComponent(escape(raw));
        existing=JSON.parse(utf8);
      }catch(e){existing={student:'Bosco',sessions:[],errors:[]};}
    } else {
      existing={student:'Bosco',sessions:[],errors:[]};
    }

    var dup=existing.sessions.some(function(s){return s.date===newSession.date&&s.session===newSession.session;});
    if(dup){
      if(syncStatus)syncStatus.innerHTML='&#10004; 本组成绩已同步过';
      if(syncBtn){syncBtn.disabled=false;syncBtn.textContent='已同步';}
      return Promise.resolve('skip');
    }

    existing.sessions.push(newSession);
    for(var j=0;j<newErrors.length;j++){existing.errors.push(newErrors[j]);}
    if(existing.errors.length>50) existing.errors=existing.errors.slice(existing.errors.length-50);

    var newContent=btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2))));
    var body={message:'Submit session '+newSession.date+' #'+newSession.session+' ('+newSession.rate+'%)',content:newContent,sha:fileInfo.sha};

    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(r){
    if(r==='skip')return;
    if(r.ok){
      if(syncStatus)syncStatus.innerHTML='&#10004; 错题本和学习报告已自动更新！';
      if(syncBtn){syncBtn.textContent='&#10004; 已同步';syncBtn.style.background='#43b883';}
    }else{
      r.json().then(function(e){
        if(syncStatus)syncStatus.innerHTML='&#9888; 同步失败，可稍后重试';
        if(syncBtn)syncBtn.disabled=false;
        console.error('GitHub API error:',e);
      });
    }
  })
  .catch(function(err){
    if(syncStatus)syncStatus.innerHTML='&#9888; 网络错误，可稍后重试';
    if(syncBtn)syncBtn.disabled=false;
    console.error('Submit error:',err);
  });
}

// === Word lookup & long-press ===
var vocabLocalData=null, confusableLocalData=null;
var currentLookupWord='';
var LONG_PRESS_DURATION=600;
var pressTimer=null, pressTarget=null;

function fetchLocalJSON(url,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){if(xhr.status===200){try{cb(JSON.parse(xhr.responseText));}catch(e){cb(null);}}else{cb(null);}}
  };
  xhr.send();
}
fetchLocalJSON('vocab_data.json',function(d){vocabLocalData=d;});
fetchLocalJSON('confusables.json',function(d){confusableLocalData=d;});

function getSelectionText(){var s=window.getSelection();return s?s.toString().trim():'';}
function getWordAtPoint(x,y){
  var node,offset;
  if(document.caretPositionFromPoint){var pos=document.caretPositionFromPoint(x,y);node=pos.offsetNode;offset=pos.offset;}
  else if(document.caretRangeFromPoint){var range=document.caretRangeFromPoint(x,y);node=range.startContainer;offset=range.startOffset;}
  else{return'';}
  if(node.nodeType!==3)return'';
  var text=node.textContent;
  var start=offset,end=offset;
  while(start>0&&/[a-zA-Z]/.test(text[start-1]))start--;
  while(end<text.length&&/[a-zA-Z]/.test(text[end]))end++;
  var word=text.substring(start,end);
  return(word.length>=2&&/^[a-zA-Z]+$/.test(word))?word.toLowerCase():'';
}

function findLocalMeaning(word){
  if(!vocabLocalData||!vocabLocalData.words)return null;
  return vocabLocalData.words[word]||null;
}
function findLocalConfusable(word){
  if(!confusableLocalData||!confusableLocalData.pairs)return[];
  var arr=confusableLocalData.pairs[word];
  if(arr)return arr;
  for(var k in confusableLocalData.pairs){
    var list=confusableLocalData.pairs[k];
    for(var i=0;i<list.length;i++)if(list[i].toLowerCase()===word)return[k].concat(list.filter(function(x){return x.toLowerCase()!==word;}));
  }
  return[];
}

function lookupWord(word){
  currentLookupWord=word;
  document.getElementById('pwWord').textContent=word;
  var mean=findLocalMeaning(word);
  var meanEl=document.getElementById('pwMeaning');
  var confEl=document.getElementById('pwConfusable');
  var addBtn=document.getElementById('pwAddBtn');
  if(mean){meanEl.textContent=mean;meanEl.style.display='block';}
  else{meanEl.textContent='本地词库未收录，将尝试联网查询...';meanEl.style.display='block';fetchOnlineMeaning(word);}
  var conf=findLocalConfusable(word);
  if(conf&&conf.length>0){confEl.innerHTML='&#128161; 易混词: <b>'+conf.join('</b>, <b>')+'</b>';confEl.style.display='block';}
  else{confEl.style.display='none';}
  var book=JSON.parse(localStorage.getItem('basco_vocab_book')||'{"version":1,"words":[]}');
  var exists=book.words.some(function(x){return x.word.toLowerCase()===word.toLowerCase();});
  addBtn.textContent=exists?'&#10004; 已在积累本':'&#128218; 加入积累本';
  addBtn.disabled=exists;
  document.getElementById('pwToast').textContent='';
  document.getElementById('wordPopup').classList.add('show');
}
function fetchOnlineMeaning(word){
  fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+word)
  .then(function(r){if(!r.ok)throw new Error('fail');return r.json();})
  .then(function(data){
    var def='';try{def=data[0].meanings[0].definitions[0].definition;}catch(e){}
    if(def)document.getElementById('pwMeaning').textContent=def;
    else document.getElementById('pwMeaning').textContent='未找到释义';
  }).catch(function(){document.getElementById('pwMeaning').textContent='未找到释义';});
}
function closeWordPopup(){document.getElementById('wordPopup').classList.remove('show');}
function addToVocabBook(){
  if(!currentLookupWord)return;
  var book=JSON.parse(localStorage.getItem('basco_vocab_book')||'{"version":1,"words":[]}');
  if(book.words.some(function(x){return x.word.toLowerCase()===currentLookupWord.toLowerCase();})){
    document.getElementById('pwToast').textContent='该单词已在积累本中';
    return;
  }
  var mean=findLocalMeaning(currentLookupWord)||'';
  var conf=findLocalConfusable(currentLookupWord);
  book.words.push({word:currentLookupWord,addedAt:new Date().toISOString().slice(0,10),fromQuestion:null,meaning:mean,confusable:conf});
  localStorage.setItem('basco_vocab_book',JSON.stringify(book));
  document.getElementById('pwAddBtn').textContent='&#10004; 已添加';
  document.getElementById('pwAddBtn').disabled=true;
  document.getElementById('pwToast').textContent='已添加到积累本 &#10004;';
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

function attachLongPress(){
  var area=document.getElementById('questionArea');
  if(!area)return;
  area.addEventListener('touchstart',function(e){
    if(e.touches.length!==1)return;
    var t=e.touches[0];
    var word=getWordAtPoint(t.clientX,t.clientY);
    if(!word)return;
    pressTimer=setTimeout(function(){lookupWord(word);},LONG_PRESS_DURATION);
  },{passive:true});
  area.addEventListener('touchend',function(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}});
  area.addEventListener('touchmove',function(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}});
  area.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    var word=getWordAtPoint(e.clientX,e.clientY);
    if(!word)return;
    pressTimer=setTimeout(function(){lookupWord(word);},LONG_PRESS_DURATION);
  });
  area.addEventListener('mouseup',function(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}});
  area.addEventListener('mousemove',function(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}});
}

  }catch(e){}
})();
renderPage();
attachLongPress();
