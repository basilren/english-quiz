<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

.header {
  background: rgba(255,255,255,0.95); border-radius: 16px;

.progress-fill { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); border-radius:3px; transition:width 0.5s; }
.progress-text { font-size:11px; color:#999; margin-top:4px; }

.card {
  background: rgba(255,255,255,0.97); border-radius: 16px;
  padding: 20px 16px; margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.card.compact .q-stem, .card.compact .reading-passage, .card.compact .options { line-height: 1.4; }
.card.compact .option-btn { padding: 9px 12px; font-size: 13px; }
.card.compact .sub-question { margin-bottom: 12px; padding-bottom: 10px; }
.card.compact .reading-passage { font-size: 12px; line-height: 1.6; padding: 10px 12px; }
.slide-in { animation: slideIn 0.3s ease; }
@keyframes slideIn { from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1} }

.q-tag { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; color:#fff; margin-bottom:10px; font-weight:600; }
.tag-vocabulary{background:#43b883}.tag-grammar{background:#3b82f6}.tag-cloze{background:#f59e0b}.tag-reading{background:#ef4444}.tag-listening{background:#8b5cf6}
.q-number { font-size:13px; color:#999; margin-bottom:6px; }

.options { display:flex; flex-direction:column; gap:8px; }

}

.option-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}

<script>

var quizData = {"date":"2026-04-09","session_number":1,"questions":[{"id":1,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"-- I can't find my English textbook.\n-- Maybe you _____ it at home.","options":["A. have left","B. left","C. are leaving","D. will leave"],"correct_answer":"A","explanation":"现在完成时 have left 表示'把书落在家里了'，强调过去的动作对现在造成的影响（现在找不到书）。left 虽然语法上也可以，但 maybe you have left it 更强调对现在的结果。have left 体现'过去落下 -> 现在没带'的因果关系。"},{"id":2,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"The number of students in our school _____ to over 3,000 so far.","options":["A. increases","B. increased","C. has increased","D. is increasing"],"correct_answer":"C","explanation":"so far（到目前为止）是现在完成时的标志词。主语 the number of... 是单数，用 has increased。注意区分：the number of（数量，单数）vs a number of（许多，复数）。常见完成时标志词：so far, up to now, since, for, already, yet, just。"},{"id":3,"type":"grammar","knowledge_point":"object_clause","difficulty":2,"stem":"-- Do you know _____ the meeting will start?\n-- At 3 o'clock this afternoon.","options":["A. where","B. when","C. why","D. how"],"correct_answer":"B","explanation":"根据回答 At 3 o'clock this afternoon（下午3点）可知问的是时间，所以用 when。宾语从句的引导词由从句缺少的成分决定：缺时间用 when，缺地点用 where，缺原因用 why，缺方式用 how。这里回答给出了具体时间，对应 when。"},{"id":4,"type":"grammar","knowledge_point":"object_clause","difficulty":2,"stem":"I don't know _____ he will come or not. If he _____, I'll let you know.","options":["A. whether; comes","B. if; will come","C. whether; will come","D. that; comes"],"correct_answer":"A","explanation":"两个考点合一：(1) whether...or not 固定搭配（if 不能与 or not 直接连用）(2) if 引导条件状语从句时，用'主将从现'（主句 will let，从句用一般现在时 comes）。注意区分：第一个空的 if/whether 引导宾语从句（是否），第二个 if 引导条件从句（如果），两个 if 含义不同！"},{"id":5,"type":"grammar","knowledge_point":"conditional","difficulty":2,"stem":"If it _____ tomorrow, we will put off the sports meeting.","options":["A. will rain","B. rains","C. rained","D. is going to rain"],"correct_answer":"B","explanation":"if 引导条件状语从句，遵循'主将从现'规则：主句用一般将来时（will put off），从句用一般现在时（rains）。即使说的是明天的事，if 从句也不能用 will。这是中考必考规则。类似结构：When/As soon as + 一般现在时, 主句 + will。"},{"id":6,"type":"grammar","knowledge_point":"tense_general","difficulty":2,"stem":"Listen! Someone _____ the piano in the next room. It sounds beautiful.","options":["A. plays","B. played","C. is playing","D. has played"],"correct_answer":"C","explanation":"Listen! 是现在进行时的标志词，表示'此刻正在发生'的动作。someone is playing the piano = 有人正在弹钢琴。常见进行时标志词：look, listen, now, at the moment。一般现在时（plays）表示习惯性动作；过去时（played）表示过去；完成时（has played）强调从过去到现在。"},{"id":7,"type":"grammar","knowledge_point":"infinitive","difficulty":2,"stem":"My parents often tell me _____ too much time on computer games.","options":["A. not spend","B. don't spend","C. not to spend","D. to not spend"],"correct_answer":"C","explanation":"tell sb. not to do sth. 意为'告诉某人不要做某事'。不定式的否定形式是 not to do（not 放在 to 前面）。类似结构：ask/advise/want/remind sb. (not) to do sth.。D 选项 to not spend 语序错误，否定词 not 必须在 to 前面。"},{"id":8,"type":"grammar","knowledge_point":"gerund","difficulty":2,"stem":"Would you mind _____ the window? It is too hot in here.","options":["A. open","B. to open","C. opening","D. opened"],"correct_answer":"C","explanation":"Would you mind doing sth.? 意为'你介意做某事吗？'，mind 后接动名词（V-ing）。回答方式：不介意 = Of course not. / Not at all. 介意 = Sorry, but... 类似用法：enjoy/finish/practice/suggest/keep/avoid + doing。"},{"id":9,"type":"vocabulary","knowledge_point":"word_meaning","difficulty":2,"stem":"The old man lives _____, but he doesn't feel lonely because his neighbours often visit him.","options":["A. alone","B. afraid","C. asleep","D. awake"],"correct_answer":"A","explanation":"alone 意为'独自地'，强调客观上一个人。lonely 意为'孤独的'，强调主观感受。句意：老人独自生活，但不感到孤独。but 表转折，前后形成对比：alone（独居）但不 lonely（孤独）。afraid 害怕；asleep 睡着；awake 醒着。注意 alone vs lonely 是中考高频考点。"},{"id":10,"type":"vocabulary","knowledge_point":"phrase_collocation","difficulty":2,"stem":"We haven't seen each other for a long time. Let's _____ a time to get together.","options":["A. put up","B. set up","C. fix up","D. give up"],"correct_answer":"C","explanation":"fix up 在这里意为'确定/安排'（fix up a time = 定个时间）。put up 张贴/搭建；set up 建立/创建；give up 放弃。fix up 还有'修理'的意思，但 fix up a time 是'约定时间'的常用搭配。注意 fix up 是短语动词，可以分开用：fix a time up。"},{"id":11,"type":"vocabulary","knowledge_point":"word_form","difficulty":2,"stem":"David is one of the most _____ (success) businessmen in the city.","options":["A. success","B. succeed","C. successful","D. successfully"],"correct_answer":"C","explanation":"most _____ businessmen，空格在 most 和名词之间，需要形容词。success（名词：成功）-> successful（形容词：成功的）-> successfully（副词：成功地）-> succeed（动词：成功）。one of the most + 形容词最高级 + 复数名词，是固定结构。词形变换口诀：-ful 变形容词，-ly 变副词。"},{"id":12,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","group_passage":"Every year, our school holds a Food Festival. Students from different classes prepare dishes from around the world and sell them to raise money for charity.\n\nThis year, my class decided to make Japanese sushi. None of us had made it before, so we watched several videos online to (12)___ how to do it. We spent a whole afternoon practising, and the results were terrible at first -- the rice kept falling apart!\n\nOn the day of the festival, we were very (13)___. What if nobody wanted to buy our sushi? But when we set up our stall, something unexpected happened. A long queue quickly formed in front of our table! It turned out that sushi was the most (14)___ food at the festival.\n\nBy lunchtime, we had sold everything and raised over 2,000 yuan. Our class teacher was so proud that she took a photo of us and posted it on the school website.\n\nLooking back, the Food Festival taught me that (15)___ is the key to success. Even though we failed many times during practice, we never gave up. I also learned that working as a team can turn a (16)___ task into an enjoyable experience.","stem":"(12)","options":["A. imagine","B. learn","C. explain","D. remember"],"correct_answer":"B","explanation":"watched several videos online to learn how to do it = 在线看视频学习怎么做。to learn 表示目的。imagine 想象；explain 解释（解释给谁？没有对象）；remember 记住（还没做过，不存在'记住'的前提）。learn how to do 是'学习如何做'的标准搭配。"},{"id":13,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(13)","options":["A. nervous","B. excited","C. relaxed","D. satisfied"],"correct_answer":"A","explanation":"后文 What if nobody wanted to buy our sushi? 表达了担忧，说明当时心情是 nervous（紧张的）。What if...? 是表示担心的句型。excited 兴奋（与担忧矛盾）；relaxed 放松（与担忧矛盾）；satisfied 满意（还没开始卖，谈不上满意）。注意通过后文的情感线索反推前文的情绪词。"},{"id":14,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(14)","options":["A. expensive","B. common","C. popular","D. traditional"],"correct_answer":"C","explanation":"前文说排了长队（A long queue quickly formed），说明寿司最受欢迎 = the most popular food。expensive 最贵的（贵不代表排队）；common 常见的（常见不意味着排队）；traditional 传统的（寿司对中国学生来说不算传统）。popular = 受欢迎的，完美对应排长队的语境。"},{"id":15,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(15)","options":["A. luck","B. talent","C. patience","D. persistence"],"correct_answer":"D","explanation":"后文 Even though we failed many times during practice, we never gave up 是关键线索——虽然失败多次但从未放弃，这正是 persistence（坚持）的定义。luck 运气；talent 天赋；patience 耐心（耐心偏向'等待'，坚持偏向'不放弃'）。never gave up = persistence，是跨句推理题，需要读完下一句才能确定答案。"},{"id":16,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(16)","options":["A. simple","B. difficult","C. boring","D. dangerous"],"correct_answer":"B","explanation":"turn a difficult task into an enjoyable experience = 把困难的任务变成愉快的经历。前文提到做寿司很难（rice kept falling apart, failed many times），所以原本是 difficult task。simple 简单的（与前文矛盾）；boring 无聊的（前文没说无聊）；dangerous 危险的（做寿司不危险）。difficult 呼应全文'从困难到成功'的主题。"},{"id":17,"type":"reading","knowledge_point":"detail","difficulty":2,"group":"reading_1","group_passage":"Have you ever heard of 'microplastics'? These are tiny pieces of plastic, smaller than 5 millimetres, that have become a growing problem for our environment.\n\nMicroplastics come from many sources. When we wash clothes made of synthetic materials like polyester, thousands of tiny plastic fibres are released into the water. Plastic bags and bottles that are thrown away break down into smaller and smaller pieces over time. Even some toothpastes and face washes contain tiny plastic beads.\n\nScientists have found microplastics almost everywhere -- in the ocean, in rivers, in the soil, and even in the air we breathe. A recent study showed that the average person may eat about 5 grams of plastic every week. That is roughly the weight of a credit card!\n\nThe effects of microplastics on human health are still being studied, but early research suggests they may cause problems. Some microplastics contain harmful chemicals that can enter our bodies. Fish and other sea animals often mistake microplastics for food, and these plastics then move up the food chain to our dinner plates.\n\nWhat can we do to help? Experts suggest using fewer plastic products, choosing natural fabrics like cotton over synthetic ones, and supporting companies that are working to reduce plastic waste. Every small action counts.","stem":"17. How small are microplastics?","options":["A. Smaller than 5 centimetres.","B. Smaller than 5 millimetres.","C. About 5 grams.","D. About the size of a credit card."],"correct_answer":"B","explanation":"原文第一段：tiny pieces of plastic, smaller than 5 millimetres。直接对应 B。A 把 millimetres（毫米）换成了 centimetres（厘米），单位偷换。C 的 5 grams 是每周摄入量，不是大小。D 的 credit card 是用来比喻每周摄入量的重量，不是微塑料的尺寸。细节题要注意数字和单位是否完全匹配。"},{"id":18,"type":"reading","knowledge_point":"inference","difficulty":2,"group":"reading_1","stem":"18. What can we learn from the study mentioned in Paragraph 3?","options":["A. People eat plastic on purpose.","B. Credit cards are made of plastic.","C. People take in a surprising amount of plastic without knowing it.","D. Eating 5 grams of plastic per week is safe."],"correct_answer":"C","explanation":"推理判断：原文说 the average person may eat about 5 grams of plastic every week，并用信用卡重量做比喻来强调数量惊人。由此可推断：人们在不知不觉中摄入了令人惊讶的塑料量。A 说故意吃（原文没说是故意的）；B 虽然信用卡确实含塑料，但这不是文章要表达的点；D 原文没说安全。推理题需要在原文信息上推进一步，而非照抄。"},{"id":19,"type":"reading","knowledge_point":"word_guessing","difficulty":2,"group":"reading_1","stem":"19. What does the underlined word 'synthetic' in Paragraph 2 probably mean?","options":["A. Natural and soft.","B. Cheap and common.","C. Man-made, not natural.","D. Colourful and fashionable."],"correct_answer":"C","explanation":"词义猜测：第二段说 clothes made of synthetic materials like polyester（聚酯纤维），最后一段说 choosing natural fabrics like cotton over synthetic ones。natural 和 synthetic 形成对比（over 表示'优先于'），说明 synthetic = 非天然的 = man-made。polyester（涤纶）也是众所周知的人造纤维，进一步印证。"},{"id":20,"type":"reading","knowledge_point":"main_idea","difficulty":2,"group":"reading_1","stem":"20. What is the best title for this passage?","options":["A. Say No to All Plastic Products","B. Microplastics: A Tiny but Growing Threat","C. How Scientists Study the Ocean","D. The History of Plastic Pollution"],"correct_answer":"B","explanation":"主旨题：全文五段结构为——(1)什么是微塑料 (2)来源 (3)分布之广 (4)对健康的潜在影响 (5)我们能做什么。核心主题是'微塑料这个小东西带来越来越大的威胁'。A 太绝对（不是说完全不用塑料）；C 太窄（科学家研究海洋只是文章的一个细节）；D 没涉及塑料污染历史。B 最全面概括。"}]};

var questions = quizData.questions;
var totalQ = questions.length;
var answers = new Array(totalQ).fill(null);
var confirmed = new Array(totalQ).fill(false);

// Build pages: single or grouped
var pages = [];
(function() {
  var i = 0;
  while (i < totalQ) {
    var q = questions[i];
    if (q.group) {
      var gid = q.group, items = [];
      while (i < totalQ && questions[i].group === gid) { items.push(i); i++; }
      pages.push({ type:"group", indices:items, groupType:q.type });
    } else {
      pages.push({ type:"single", indices:[i] }); i++;
    }
  }
})();
var currentPage = 0, totalPages = pages.length;
var typeLabels={vocabulary:"词汇题",grammar:"语法题",cloze:"完形填空",reading:"阅读理解",listening:"听力题"};
var tagClasses={vocabulary:"tag-vocabulary",grammar:"tag-grammar",cloze:"tag-cloze",reading:"tag-reading",listening:"tag-listening"};

function esc(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>');}
function updateProgress(){
  var done=confirmed.filter(Boolean).length;
  document.getElementById("progressFill").style.width=(done/totalQ*100)+"%";
  document.getElementById("progressText").textContent="第"+(currentPage+1)+"页/共"+totalPages+"页 已完成"+done+"/"+totalQ+"题";
}

function renderPage(){
  var page=pages[currentPage], area=document.getElementById("questionArea"), html='';
  var isCompact = page.indices.length > 3 ? ' compact' : '';
  if(page.type==="single") html=renderSingle(page.indices[0], isCompact);
  else html=renderGroup(page, isCompact);
  // Nav
  html+='<div class="nav-bar">';
  if(currentPage>0) html+='<button class="btn btn-secondary" onclick="prevPage()">&#9664; 上一页</button>';
  var allPageConfirmed = page.indices.every(function(idx){return confirmed[idx];});
  var allPageAnswered = page.indices.every(function(idx){return answers[idx]!==null;});
  if(!allPageConfirmed){
    html+='<button class="btn btn-submit" onclick="confirmPage()" '+(allPageAnswered?'':'disabled')+'>&#10004; 提交本页</button>';
  } else if(currentPage<totalPages-1){
    html+='<button class="btn btn-primary" onclick="nextPage()">下一页 &#9654;</button>';
  } else {
    var allDone=confirmed.every(Boolean);
    if(allDone) html+='<button class="btn btn-primary" onclick="showResult()">&#128202; 查看成绩</button>';
    else html+='<button class="btn btn-primary" onclick="goNext()">继续答题 &#9654;</button>';
  }
  html+='</div>';
  area.innerHTML=html; updateProgress();
}

function renderSingle(idx, compact){
  var q=questions[idx];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[q.type]||'tag-grammar')+'">'+(typeLabels[q.type]||q.type)+'</span>';
  html+='<div class="q-number">第'+q.id+'题</div>';
  html+='<div class="q-stem">'+esc(q.stem)+'</div>';
  html+=renderOpts(idx);
  if(confirmed[idx]) html+=renderExpl(idx);
  html+='</div>'; return html;
}

function renderGroup(page, compact){
  var indices=page.indices, fq=questions[indices[0]];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[fq.type]||'tag-grammar')+'">'+(typeLabels[fq.type]||fq.type)+'</span>';
  if(fq.group_passage) html+='<div class="reading-passage">'+esc(fq.group_passage)+'</div>';
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    html+='<div class="sub-question">';
    html+='<div class="sub-q-label">第'+q.id+'题 '+esc(q.stem)+'</div>';
    html+=renderOpts(idx);
    if(confirmed[idx]) html+=renderExpl(idx);
    html+='</div>';
  }
  html+='</div>'; return html;
}

function renderOpts(idx){
  var q=questions[idx], letters=["A","B","C","D"], html='<div class="options">';
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls="option-btn";
    if(confirmed[idx]){
      cls+=" disabled";
      if(L===q.correct_answer) cls+=" correct";
      else if(sel&&L!==q.correct_answer) cls+=" wrong";
      else cls+=" dim";
    } else { if(sel) cls+=" selected"; }
    var txt=q.options[i].replace(/^[A-D]\.\s*/,"");
    html+='<div class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">';
    html+='<span class="option-letter">'+L+'</span><span>'+esc(txt)+'</span></div>';
  }
  html+='</div>'; return html;
}

function renderExpl(idx){
  var q=questions[idx], ok=answers[idx]===q.correct_answer;
  var icon=ok?"&#10004;":"&#10008;", pre=ok?"":"你选 "+answers[idx]+"，正确答案 "+q.correct_answer+"。";
  return '<div class="explanation">'+(ok?'<span style="color:#43b883;font-weight:700">'+icon+' 正确！</span> ':'<span style="color:#c0392b;font-weight:700">'+icon+' 错误</span> '+pre)+esc(q.explanation)+'</div>';
}

function selOpt(idx,L){ if(confirmed[idx])return; answers[idx]=L; renderPage(); }

function confirmPage(){
  var page=pages[currentPage];
  var unanswered=page.indices.filter(function(i){return answers[i]===null;});
  if(unanswered.length>0){alert("本页还有"+unanswered.length+"题未作答");return;}
  page.indices.forEach(function(i){confirmed[i]=true;});
  renderPage();
  saveProgress();
}

function nextPage(){ if(currentPage<totalPages-1){currentPage++;renderPage();window.scrollTo(0,0);} }
function prevPage(){ if(currentPage>0){currentPage--;renderPage();window.scrollTo(0,0);} }
function goNext(){
  for(var i=0;i<totalPages;i++){
    if(!pages[i].indices.every(function(idx){return confirmed[idx];})){currentPage=i;renderPage();window.scrollTo(0,0);return;}
  }
}

function saveProgress(){
  var allDone=confirmed.every(Boolean);
  if(!allDone)return;
  var correct=0, ansStr="";
  for(var i=0;i<totalQ;i++){
    if(answers[i]===questions[i].correct_answer) correct++;
    ansStr+=answers[i];
  }
  var record={date:quizData.date,session:quizData.session_number,answers:ansStr,score:correct,total:totalQ,rate:Math.round(correct/totalQ*100),timestamp:new Date().toISOString(),submitted:true};
  try{
    localStorage.setItem("basco_quiz_"+quizData.date+"_"+quizData.session_number,JSON.stringify(record));
    var hist=JSON.parse(localStorage.getItem("basco_history")||"[]");
    hist.push(record);
    localStorage.setItem("basco_history",JSON.stringify(hist));
  }catch(e){}
}

// === GitHub API auto-submit ===
var GH_OWNER='basilren', GH_REPO='english-quiz', GH_FILE='data/results.json';
var _tk=['github_pat_','11CAZBMYQ0','EWA4S994N2','X0_iLeXXLY','u2lw8w0tlE','cDYG92Uu58','cZrfYp8mpr','TaZ8Hi5TEI','YZS77OXoDHFJ'];
function _gt(){return _tk.join('');}

function submitToGitHub(){
  var syncBtn=document.getElementById('syncBtn');
  var syncStatus=document.getElementById('syncStatus');
  if(syncBtn)syncBtn.disabled=true;
  if(syncStatus)syncStatus.innerHTML='&#9889; 正在同步数据...';

  // Build error list for this session
  var newErrors=[];
  var typeLabelsMap={grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',listening:'听力题'};
  var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测'};
  var correct=0;
  for(var i=0;i<totalQ;i++){
    var q=questions[i];
    if(answers[i]===q.correct_answer){correct++;}
    else{
      newErrors.push({
        date:quizData.date,
        session:quizData.session_number,
        question_id:q.id,
        type:q.type,
        knowledge_point:q.knowledge_point,
        label:kpLabels[q.knowledge_point]||(typeLabelsMap[q.type]||q.type),
        stem:q.stem,
        options:q.options,
        correct_answer:q.correct_answer,
        student_answer:answers[i],
        explanation:q.explanation
      });
    }
  }
  var newSession={date:quizData.date,session:quizData.session_number,total:totalQ,correct:correct,rate:Math.round(correct/totalQ*100)};

  // Fetch current results.json, merge, then push
  var apiBase='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
  var token=_gt();

  fetch(apiBase,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(fileInfo){
    var existing;
    if(fileInfo.content){
      try{
        var raw=atob(fileInfo.content.replace(/\n/g,''));
        // Decode UTF-8: atob returns Latin-1, need to convert back to UTF-8
        var utf8=decodeURIComponent(escape(raw));
        existing=JSON.parse(utf8);
      }catch(e){existing={student:'Bosco',sessions:[],errors:[]};}
    } else {
      existing={student:'Bosco',sessions:[],errors:[]};
    }

    // Check for duplicate session
    var dup=existing.sessions.some(function(s){return s.date===newSession.date&&s.session===newSession.session;});
    if(dup){
      if(syncStatus)syncStatus.innerHTML='&#10004; 本组成绩已同步过';
      if(syncBtn){syncBtn.disabled=false;syncBtn.textContent='已同步';}
      return Promise.resolve('skip');
    }

    // Merge
    existing.sessions.push(newSession);
    for(var j=0;j<newErrors.length;j++){existing.errors.push(newErrors[j]);}
    // Keep max 50 errors
    if(existing.errors.length>50) existing.errors=existing.errors.slice(existing.errors.length-50);

    var newContent=btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2))));
    var body={message:'Submit session '+newSession.date+' #'+newSession.session+' ('+newSession.rate+'%)',content:newContent,sha:fileInfo.sha};

    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(r){
    if(r==='skip')return;
    if(r.ok){
      if(syncStatus)syncStatus.innerHTML='&#10004; 错题本和学习报告已自动更新！';
      if(syncBtn){syncBtn.textContent='&#10004; 已同步';syncBtn.style.background='#43b883';}
    }else{
      r.json().then(function(e){
        if(syncStatus)syncStatus.innerHTML='&#9888; 同步失败，可稍后重试';
        if(syncBtn)syncBtn.disabled=false;
        console.error('GitHub API error:',e);
      });
    }
  })
  .catch(function(err){
    if(syncStatus)syncStatus.innerHTML='&#9888; 网络错误，可稍后重试';
    if(syncBtn)syncBtn.disabled=false;
    console.error('Submit error:',err);
  });
}

function showResult(){
  saveProgress();
  document.getElementById("questionArea").classList.add("hidden");
  var area=document.getElementById("resultArea"); area.classList.remove("hidden");
  var correct=0,dots="",errors=[],ansStr="";
  for(var i=0;i<totalQ;i++){
    var ok=answers[i]===questions[i].correct_answer;
    if(ok){correct++;dots+="&#10004;";}else{dots+="&#10008;";errors.push(i);}
    ansStr+=answers[i];
  }
  var rate=Math.round(correct/totalQ*100);
  var emoji=rate>=80?"&#127881;":rate>=60?"&#128170;":"&#128218;";
  var msg=rate>=90?"太棒了！几乎全对！":rate>=80?"很不错！继续保持！":rate>=60?"还可以，错题好好看讲解！":"别灰心，弄懂错题就是进步！";
  var html='<div class="result-card">';
  html+='<div class="result-label">第 13 天成绩</div>';
  html+='<div class="result-score">'+correct+'/'+totalQ+'</div>';
  html+='<div class="result-dots">'+dots+'</div>';
  html+='<div class="result-msg">'+emoji+' '+msg+'</div>';
  html+='<div class="stat-grid"><div class="stat-item"><div class="val">'+rate+'%</div><div class="lbl">正确率</div></div>';
  html+='<div class="stat-item"><div class="val">'+errors.length+'</div><div class="lbl">错题数</div></div></div>';
  html+='<div class="submitted-notice">&#10004; 答案已自动归档</div>';
  html+='<div id="syncStatus" style="text-align:center;padding:8px;font-size:13px;color:#667eea;font-weight:600;margin-top:8px">&#9889; 正在同步到错题本...</div>';
  if(errors.length>0){
    html+='<div class="error-section"><h3>&#10008; 错题详解</h3>';
    for(var j=0;j<errors.length;j++){
      var idx=errors[j],q=questions[idx];
      var sp=q.stem.length>60?q.stem.substring(0,60)+"...":q.stem;
      html+='<div class="error-item"><div class="ei-head">第'+q.id+'题 &middot; '+(typeLabels[q.type]||q.type)+'</div>';
      html+='<div class="ei-stem">'+esc(sp)+'</div>';
      html+='<div class="ei-answer">你选：<span style="color:#c0392b;font-weight:600">'+answers[idx]+'</span>&emsp;正确：<span style="color:#1a7f4b;font-weight:600">'+q.correct_answer+'</span></div>';
      html+='<div class="ei-explain">&#128214; '+esc(q.explanation)+'</div></div>';
    }
    html+='</div>';
  }
  html+='<div class="nav-bar" style="margin-top:16px">';
  html+='<button class="btn btn-secondary" onclick="reviewAll()">&#128203; 逐题回顾</button>';
  html+='<button class="btn btn-primary" onclick="copyAns(\''+ansStr+'\')">&#128203; 复制答案</button>';
  html+='</div>';
  html+='<div class="nav-bar" style="margin-top:12px">';
  html+='<button class="btn btn-link" onclick="window.location.href=\'errors.html\'">&#128221; 查看错题本</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'report.html\'">&#128202; 查看学习报告</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'index.html\'">&#128221; 再做一组</button>';
  html+='</div>';
  html+='<div style="text-align:center;margin-top:10px"><button id="syncBtn" class="btn btn-secondary" onclick="submitToGitHub()" style="width:auto;padding:8px 20px;font-size:12px">&#128259; 重新同步</button></div>';
  html+='</div>';
  area.innerHTML=html; window.scrollTo(0,0);
  // Auto submit to GitHub
  submitToGitHub();
}
function reviewAll(){
  document.getElementById("resultArea").classList.add("hidden");
  document.getElementById("questionArea").classList.remove("hidden");
  currentPage=0; renderPage();
}
function copyAns(s){
  if(navigator.clipboard) navigator.clipboard.writeText(s).then(function(){alert("已复制："+s);});
  else prompt("请复制：",s);
}

renderPage();
