<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:12px;color:#333}
.container{max-width:600px;margin:0 auto}
.header{background:rgba(255,255,255,.95);border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.header h1{font-size:18px;color:#4a3f8a;margin-bottom:4px}
.header .subtitle{font-size:12px;color:#888}
.progress-bar{width:100%;height:6px;background:#e8e4f0;border-radius:3px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:width .5s}
.progress-text{font-size:11px;color:#999;margin-top:4px}

/* Type Tabs */
.type-tabs{display:flex;gap:4px;background:rgba(255,255,255,.85);border-radius:12px;padding:4px;margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap}
.type-tab{flex:1;min-width:0;padding:8px 4px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:#888;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.type-tab.active{background:#fff;color:#4a3f8a;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.type-tab .tab-badge{display:inline-block;font-size:10px;background:#e8e4f0;color:#666;border-radius:8px;padding:1px 5px;margin-left:2px;vertical-align:middle}
.type-tab.active .tab-badge{background:#667eea;color:#fff}
.type-tab.done .tab-check{color:#43b883;margin-left:2px;font-size:11px}
.type-tab:active{transform:scale(.96)}

.card{background:rgba(255,255,255,.97);border-radius:16px;padding:20px 16px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card.compact .q-stem,.card.compact .reading-passage,.card.compact .options{line-height:1.4}
.card.compact .option-btn{padding:9px 12px;font-size:13px}
.card.compact .sub-question{margin-bottom:12px;padding-bottom:10px}
.card.compact .reading-passage{font-size:12px;line-height:1.6;padding:10px 12px}
.slide-in{animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}

.q-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;margin-bottom:10px;font-weight:600}
.tag-vocabulary{background:#43b883}.tag-grammar{background:#3b82f6}.tag-cloze{background:#f59e0b}.tag-reading{background:#ef4444}.tag-fill{background:#8b5cf6}
.q-number{font-size:13px;color:#999;margin-bottom:6px}
.q-stem{font-size:15px;line-height:1.6;margin-bottom:14px;white-space:pre-wrap;word-break:break-word}
.reading-passage{background:#f8f7ff;border-left:3px solid #667eea;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:13px;line-height:1.7;color:#444;white-space:pre-wrap;word-break:break-word}
/* Fill-in-blank passage: highlight blanks */
.fill-passage{background:#f8f7ff;border-left:3px solid #8b5cf6;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:13px;line-height:1.8;color:#444}
.fill-passage .blank{display:inline-block;min-width:30px;border-bottom:2px solid #8b5cf6;color:#8b5cf6;font-weight:700;padding:0 4px;margin:0 2px}
.fill-passage .blank.filled{color:#4a3f8a;background:#ede9fe;border-radius:4px;border-bottom:none;padding:1px 6px}
.fill-passage .blank.correct-blank{color:#1a7f4b;background:#edfff6;border-color:#43b883}
.fill-passage .blank.wrong-blank{color:#c0392b;background:#fff0f0;border-color:#ef4444}
.sub-question{margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed #e8e4f0}
.sub-question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sub-q-label{font-size:14px;font-weight:600;color:#4a3f8a;margin-bottom:8px}

.options{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:center;padding:12px 14px;border:2px solid #e8e4f0;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.4;-webkit-tap-highlight-color:transparent}
.option-btn:active{transform:scale(.98)}
.option-btn.selected{border-color:#667eea;background:#eef0ff;color:#4a3f8a;font-weight:600}
.option-btn.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b}
.option-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}
.option-btn.disabled{pointer-events:none;opacity:.7}
.option-btn.dim{opacity:.5}
.option-letter{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#f0edf5;font-weight:700;font-size:13px;margin-right:10px;flex-shrink:0;transition:all .2s}
.selected .option-letter{background:#667eea;color:#fff}
.correct .option-letter{background:#43b883;color:#fff}
.wrong .option-letter{background:#ef4444;color:#fff}

.nav-bar{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary:not(:disabled):active{transform:scale(.97)}
.btn-secondary{background:#f0edf5;color:#666}
.btn-submit{background:linear-gradient(135deg,#43b883,#2d8f6f);color:#fff}
.btn-submit:active{transform:scale(.97)}
.btn-link{background:transparent;color:#667eea;font-size:13px;text-decoration:underline;padding:8px}

.explanation{margin-top:12px;padding:12px 14px;background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;font-size:13px;line-height:1.6;color:#6b5900;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.result-card{background:rgba(255,255,255,.97);border-radius:16px;padding:24px 18px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.result-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0}
.result-label{font-size:13px;color:#888}
.result-dots{margin:12px 0;font-size:18px;letter-spacing:3px}
.result-msg{font-size:14px;color:#555;margin:10px 0 16px;line-height:1.5}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stat-item{background:#f8f7ff;border-radius:10px;padding:10px}
.stat-item .val{font-size:20px;font-weight:700;color:#4a3f8a}
.stat-item .lbl{font-size:11px;color:#999;margin-top:2px}

.error-section{margin-top:14px;text-align:left}
.error-section h3{font-size:15px;color:#c0392b;margin-bottom:10px;text-align:center}
.error-item{background:#fff8f8;border:1px solid #ffe0e0;border-radius:10px;padding:12px;margin-bottom:8px}
.error-item .ei-head{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:6px}
.error-item .ei-stem{font-size:12px;color:#555;margin-bottom:4px;line-height:1.5;white-space:pre-wrap}
.error-item .ei-answer{font-size:12px;margin-bottom:4px}
.error-item .ei-explain{font-size:12px;line-height:1.5;color:#6b5900;background:#fffbeb;padding:8px;border-radius:6px}
.submitted-notice{text-align:center;padding:12px;background:#edfff6;border-radius:10px;margin-top:12px;color:#1a7f4b;font-weight:600;font-size:14px}

/* WeChat overlay */
.wx-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;flex-direction:column;align-items:center;padding-top:60px}
.wx-arrow{font-size:48px;color:#fff;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wx-msg{color:#fff;font-size:16px;text-align:center;margin-top:20px;line-height:1.8;padding:0 30px}
.wx-msg strong{font-size:18px}

.hidden{display:none!important}
</style>
</head>

<script>

// NOTE: All strings must avoid Chinese quotes. Use single quotes only.
var quizData = {"date":"2026-04-12","session_number":1,"questions":[
  {"id":1,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,
   "stem":"-- Have you ever _____ to Beijing?\n-- Yes, I _____ there last summer.",
   "options":["A. been; went","B. gone; went","C. been; have been","D. gone; have gone"],
   "correct_answer":"A",
   "explanation":"have been to = have visited somewhere (and returned). In the answer, 'last summer' is a specific past time, so use simple past 'went'. have gone to = went and hasn't returned yet -- doesn't fit since the person IS here talking."},

  {"id":2,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,
   "stem":"The Smiths _____ in China since 2019. They love living here.",
   "options":["A. are","B. have been","C. were","D. had been"],
   "correct_answer":"B",
   "explanation":"since 2019 = from 2019 until now, a key signal for present perfect tense. have been = have been (continuing state). 'are' can't express duration from past; 'were' means they left; 'had been' is past perfect -- not needed here."},

  {"id":3,"type":"grammar","knowledge_point":"present_perfect","difficulty":3,
   "stem":"This is the most interesting book that I _____ ever _____.",
   "options":["A. /; read","B. have; read","C. had; read","D. /; reading"],
   "correct_answer":"B",
   "explanation":"'This is the most/best/first... that + present perfect' is a classic pattern. The superlative 'most interesting' triggers present perfect in the that-clause. have ever read = have ever read."},

  {"id":4,"type":"grammar","knowledge_point":"object_clause","difficulty":2,
   "stem":"The teacher asked the students _____.",
   "options":["A. if they had finished the homework","B. if had they finished the homework","C. that they had finished the homework","D. have they finished the homework"],
   "correct_answer":"A",
   "explanation":"Object clause rules: 1) Statement word order (subject + verb); 2) The teacher 'asked' = yes/no question, use if/whether; 3) Tense shifts back: 'have finished' -> 'had finished'. B has inverted word order; C uses 'that' for a question; D has no conjunction."},

  {"id":5,"type":"grammar","knowledge_point":"passive_voice","difficulty":2,
   "stem":"Paper _____ by the Chinese about two thousand years ago.",
   "options":["A. invented","B. was invented","C. is invented","D. invents"],
   "correct_answer":"B",
   "explanation":"Paper is the receiver of the action, so use passive voice: be + past participle. 'Two thousand years ago' = past time, so 'was invented'. A lacks be-verb; C is present tense; D is active voice."},

  {"id":6,"type":"grammar","knowledge_point":"conditional","difficulty":2,
   "stem":"If it _____ tomorrow, we will go to the park for a picnic.",
   "options":["A. won't rain","B. doesn't rain","C. didn't rain","D. isn't raining"],
   "correct_answer":"B",
   "explanation":"In if-clauses for real future conditions, use simple present (not will/won't). 'If + simple present, will + do' is the pattern. Key rule: main clause future, if-clause present."},

  {"id":7,"type":"vocabulary","knowledge_point":"word_form","difficulty":2,
   "stem":"It's _____ (danger) to swim alone in the deep river.",
   "options":["A. danger","B. dangerous","C. dangerously","D. endangered"],
   "correct_answer":"B",
   "explanation":"It's + adjective + to do sth. After 'It's', we need an adjective. danger (noun) -> dangerous (adj) -> dangerously (adv). Pattern: It is dangerous/important/necessary to do sth."},

  {"id":8,"type":"vocabulary","knowledge_point":"phrase_collocation","difficulty":2,
   "stem":"We should _____ the lights when we leave the room to save energy.",
   "options":["A. turn on","B. turn off","C. turn up","D. turn down"],
   "correct_answer":"B",
   "explanation":"turn off = switch off. 'Leave the room' + 'save energy' = turn off the lights. turn on = switch on; turn up = increase; turn down = decrease/reject."},

  {"id":9,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1",
   "group_passage":"Last summer, my family took a road trip across Yunnan Province. It was one of the best experiences of my life.\n\nWe started our journey in Kunming, the capital city. The weather there was so (9)___ that people call it the 'Spring City'. We visited Green Lake Park and saw many people dancing and singing in the morning.\n\nAfter two days, we drove to Dali, a beautiful old town near Erhai Lake. The lake was so clear that we could see the (10)___ of the mountains in the water. My father rented bikes for us, and we rode along the lake for hours. It was tiring but (11)___.\n\nThe most amazing part was our visit to Lijiang. The old town was full of narrow streets, traditional shops, and small rivers. At night, thousands of (12)___ lit up the streets, making the whole town look like a fairy tale.\n\nOn our way home, my mother said, 'The best thing about traveling is not the places you visit, but the (13)___ you share with your family.' I think she was absolutely right.",
   "stem":"(9)","options":["A. cold","B. hot","C. comfortable","D. terrible"],
   "correct_answer":"C",
   "explanation":"Kunming is famous for its mild, pleasant climate -- hence 'Spring City'. 'Comfortable' = pleasant weather. cold/hot/terrible all contradict the nickname."},

  {"id":10,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1",
   "stem":"(10)","options":["A. photos","B. shadows","C. reflections","D. paintings"],
   "correct_answer":"C",
   "explanation":"'See the reflections of the mountains in the water.' Reflections = mirror images in clear water. photos = camera pictures; shadows = dark shapes; paintings = art."},

  {"id":11,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1",
   "stem":"(11)","options":["A. boring","B. worthwhile","C. dangerous","D. impossible"],
   "correct_answer":"B",
   "explanation":"'Tiring but worthwhile' -- 'but' shows contrast. Although tiring, it was worth doing. boring has no contrast with tiring; dangerous/impossible don't fit the context."},

  {"id":12,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1",
   "stem":"(12)","options":["A. lanterns","B. flowers","C. posters","D. flags"],
   "correct_answer":"A",
   "explanation":"'Thousands of lanterns lit up the streets.' Lijiang's old town is famous for red lanterns at night. 'Lit up' = illuminated. Only lanterns give light."},

  {"id":13,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1",
   "stem":"(13)","options":["A. food","B. money","C. memories","D. gifts"],
   "correct_answer":"C",
   "explanation":"'The best thing about traveling is the memories you share with your family.' The emotional tone requires 'memories', not material things like food/money/gifts."},

  {"id":14,"type":"fill","knowledge_point":"sentence_fill","difficulty":3,"group":"fill_1",
   "group_passage":"A: Hi, Tom! Long time no see. (14)___\nB: I went to Beijing with my parents.\nA: That sounds great! (15)___\nB: We visited the Great Wall and the Summer Palace.\nA: Wow! (16)___\nB: Yes, we did. The food there was delicious, especially the Peking duck.\nA: I'm so jealous! I hope I can go there someday too.\nB: (17)___ It's really worth visiting.",
   "fill_options":["A. Did you try any local food?","B. Where did you go during the holiday?","C. What did you do there?","D. You should go when you have a chance.","E. How long did you stay there?"],
   "stem":"(14)","options":["A. Did you try any local food?","B. Where did you go during the holiday?","C. What did you do there?","D. You should go when you have a chance.","E. How long did you stay there?"],
   "correct_answer":"B",
   "explanation":"The answer is 'I went to Beijing' -- this is answering WHERE the person went. So the question must ask about the destination. 'Where did you go during the holiday?' matches perfectly. A asks about food; C asks about activities; D is a suggestion; E asks about duration."},

  {"id":15,"type":"fill","knowledge_point":"sentence_fill","difficulty":3,"group":"fill_1",
   "stem":"(15)","options":["A. Did you try any local food?","B. Where did you go during the holiday?","C. What did you do there?","D. You should go when you have a chance.","E. How long did you stay there?"],
   "correct_answer":"C",
   "explanation":"The answer is 'We visited the Great Wall and the Summer Palace' -- describing ACTIVITIES done there. So the question asks 'What did you do there?' A asks about food; B was already used for (14); D is a suggestion; E asks about time."},

  {"id":16,"type":"fill","knowledge_point":"sentence_fill","difficulty":3,"group":"fill_1",
   "stem":"(16)","options":["A. Did you try any local food?","B. Where did you go during the holiday?","C. What did you do there?","D. You should go when you have a chance.","E. How long did you stay there?"],
   "correct_answer":"A",
   "explanation":"The answer is 'Yes, we did. The food there was delicious, especially the Peking duck.' This is answering a yes/no question about FOOD. 'Did you try any local food?' is the only option that matches. The 'Yes, we did' confirms it's a did-you question."},

  {"id":17,"type":"fill","knowledge_point":"sentence_fill","difficulty":3,"group":"fill_1",
   "stem":"(17)","options":["A. Did you try any local food?","B. Where did you go during the holiday?","C. What did you do there?","D. You should go when you have a chance.","E. How long did you stay there?"],
   "correct_answer":"D",
   "explanation":"A says 'I hope I can go there someday' -- expressing a wish. B responds with 'You should go when you have a chance' + 'It's really worth visiting' -- giving encouragement and a suggestion. This is the natural way to respond to someone's wish. E asks about duration (doesn't fit the flow)."},

  {"id":18,"type":"reading","knowledge_point":"detail","difficulty":2,"group":"reading_1",
   "group_passage":"Sleep is one of the most important things for our health, but many teenagers today are not getting enough of it. According to doctors, teenagers aged 13-18 need about 8-10 hours of sleep every night. However, a recent study shows that nearly 70% of high school students sleep less than 7 hours on school nights.\n\nWhy are teenagers sleeping so little? There are several reasons. First, heavy homework loads keep students up late. Many students report that they cannot finish their homework before 11 p.m. Second, electronic devices such as smartphones and tablets are a major problem. The blue light from screens tricks the brain into thinking it is still daytime, making it harder to fall asleep. Third, some teenagers drink coffee or energy drinks to stay awake during the day, which then makes it difficult for them to sleep at night.\n\nLack of sleep has serious effects on teenagers. It can lead to poor concentration in class, lower grades, and even health problems such as obesity and depression. Studies also show that tired teenagers are more likely to have accidents.\n\nExperts suggest several ways to improve sleep quality. First, try to go to bed and wake up at the same time every day, even on weekends. Second, stop using electronic devices at least 30 minutes before bedtime. Third, avoid caffeine after 3 p.m. Finally, make your bedroom dark, quiet, and cool -- the ideal environment for sleep.",
   "stem":"18. According to the study, how many high school students sleep less than 7 hours on school nights?",
   "options":["A. About 30%.","B. About 50%.","C. About 70%.","D. About 90%."],
   "correct_answer":"C",
   "explanation":"Paragraph 1: 'nearly 70% of high school students sleep less than 7 hours on school nights.' Directly stated -- about 70%, matching option C."},

  {"id":19,"type":"reading","knowledge_point":"detail","difficulty":2,"group":"reading_1",
   "stem":"19. Why does blue light from screens affect sleep?",
   "options":["A. It damages the eyes permanently.","B. It makes the brain think it is still daytime.","C. It makes the bedroom too bright to sleep.","D. It causes headaches that keep people awake."],
   "correct_answer":"B",
   "explanation":"Paragraph 2: 'The blue light from screens tricks the brain into thinking it is still daytime.' Directly matches B. Key phrase: 'tricks the brain into thinking'."},

  {"id":20,"type":"reading","knowledge_point":"inference","difficulty":3,"group":"reading_1",
   "stem":"20. What can we infer from the passage?",
   "options":["A. All teenagers drink coffee every day.","B. Sleeping too much is also a problem for teenagers.","C. Good sleep habits can help improve school performance.","D. Doctors recommend that teenagers sleep less than 7 hours."],
   "correct_answer":"C",
   "explanation":"Paragraph 3 says lack of sleep leads to 'poor concentration, lower grades'. The reverse: good sleep -> better concentration -> better grades = better performance. A is too extreme; B not discussed; D contradicts the 8-10 hours recommendation."}
]};

var questions = quizData.questions;
var totalQ = questions.length;
var answers = new Array(totalQ).fill(null);
var confirmed = new Array(totalQ).fill(false);

// Build pages: single or grouped
var pages = [];
(function() {
  var i = 0;
  while (i < totalQ) {
    var q = questions[i];
    if (q.group) {
      var gid = q.group, items = [];
      while (i < totalQ && questions[i].group === gid) { items.push(i); i++; }
      pages.push({ type:'group', indices:items, groupType:q.type });
    } else {
      pages.push({ type:'single', indices:[i] }); i++;
    }
  }
})();
var currentPage = 0, totalPages = pages.length;

// === TYPE TAB NAVIGATION ===
var typeOrder = ['grammar','vocabulary','cloze','fill','reading'];
var typeLabels = {vocabulary:'词汇题',grammar:'语法题',cloze:'完形填空',reading:'阅读理解',fill:'短文填空'};
var typeShortLabels = {vocabulary:'词汇',grammar:'语法',cloze:'完形',reading:'阅读',fill:'填空'};
var tagClasses = {vocabulary:'tag-vocabulary',grammar:'tag-grammar',cloze:'tag-cloze',reading:'tag-reading',fill:'tag-fill'};

// Map type -> page indices
var typePageMap = {};
(function(){
  for(var p=0;p<pages.length;p++){
    var t=questions[pages[p].indices[0]].type;
    if(!typePageMap[t]) typePageMap[t]=[];
    typePageMap[t].push(p);
  }
})();
// Count questions per type
var typeQCount = {};
questions.forEach(function(q){typeQCount[q.type]=(typeQCount[q.type]||0)+1;});

function getCurrentType(){ return questions[pages[currentPage].indices[0]].type; }

function buildTypeTabs(){
  var curType=getCurrentType();
  var html='';
  typeOrder.forEach(function(t){
    if(!typePageMap[t]) return;
    var cnt=typeQCount[t]||0;
    var allDone=true;
    questions.forEach(function(q,i){if(q.type===t&&!confirmed[i])allDone=false;});
    var cls='type-tab'+(curType===t?' active':'')+(allDone?' done':'');
    html+='<button class="'+cls+'" onclick="jumpToType(\''+t+'\')">';
    html+=(typeShortLabels[t]||t);
    html+='<span class="tab-badge">'+cnt+'</span>';
    if(allDone) html+='<span class="tab-check">&#10003;</span>';
    html+='</button>';
  });
  document.getElementById('typeTabs').innerHTML=html;
}

function jumpToType(type){
  var pgs=typePageMap[type];
  if(!pgs||pgs.length===0)return;
  var target=pgs[0];
  for(var i=0;i<pgs.length;i++){
    var pg=pages[pgs[i]];
    if(!pg.indices.every(function(idx){return confirmed[idx];})){target=pgs[i];break;}
  }
  currentPage=target;
  renderPage();
  window.scrollTo(0,0);
}

function esc(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>');}
function updateProgress(){
  var done=confirmed.filter(Boolean).length;
  document.getElementById('progressFill').style.width=(done/totalQ*100)+'%';
  document.getElementById('progressText').textContent='第'+(currentPage+1)+'页/共'+totalPages+'页 已完成'+done+'/'+totalQ+'题';
}

function renderPage(){
  buildTypeTabs();
  var page=pages[currentPage], area=document.getElementById('questionArea'), html='';
  var isCompact = page.indices.length > 3 ? ' compact' : '';
  if(page.type==='single') html=renderSingle(page.indices[0], isCompact);
  else html=renderGroup(page, isCompact);
  html+='<div class="nav-bar">';
  if(currentPage>0) html+='<button class="btn btn-secondary" onclick="prevPage()">&#9664; 上一页</button>';
  var allPageConfirmed = page.indices.every(function(idx){return confirmed[idx];});
  var allPageAnswered = page.indices.every(function(idx){return answers[idx]!==null;});
  if(!allPageConfirmed){
    html+='<button class="btn btn-submit" onclick="confirmPage()" '+(allPageAnswered?'':'disabled')+'>&#10004; 提交本页</button>';
  } else if(currentPage<totalPages-1){
    html+='<button class="btn btn-primary" onclick="nextPage()">下一页 &#9654;</button>';
  } else {
    var allDone=confirmed.every(Boolean);
    if(allDone) html+='<button class="btn btn-primary" onclick="showResult()">&#128202; 查看成绩</button>';
    else html+='<button class="btn btn-primary" onclick="goNext()">继续答题 &#9654;</button>';
  }
  html+='</div>';
  area.innerHTML=html;
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  updateProgress();
}

function renderSingle(idx, compact){
  var q=questions[idx];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[q.type]||'tag-grammar')+'">'+(typeLabels[q.type]||q.type)+'</span>';
  html+='<div class="q-number">第'+q.id+'题</div>';
  html+='<div class="q-stem">'+esc(q.stem)+'</div>';
  html+=renderOpts(idx);
  if(confirmed[idx]) html+=renderExpl(idx);
  html+='</div>'; return html;
}

function renderGroup(page, compact){
  var indices=page.indices, fq=questions[indices[0]];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[fq.type]||'tag-grammar')+'">'+(typeLabels[fq.type]||fq.type)+'</span>';
  // For fill type, render the passage with blanks showing selected answers
  if(fq.type==='fill' && fq.group_passage){
    html+=renderFillPassage(fq.group_passage, indices);
  } else if(fq.group_passage){
    html+='<div class="reading-passage">'+esc(fq.group_passage)+'</div>';
  }
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    html+='<div class="sub-question">';
    html+='<div class="sub-q-label">第'+q.id+'题 '+esc(q.stem)+'</div>';
    html+=renderOpts(idx);
    if(confirmed[idx]) html+=renderExpl(idx);
    html+='</div>';
  }
  html+='</div>'; return html;
}

function renderFillPassage(passage, indices){
  // Replace (14)___ style blanks with interactive spans
  var html = esc(passage);
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    var num=q.id;
    var pattern=new RegExp('\\('+num+'\\)___','g');
    var letter=answers[idx]||'___';
    var cls='blank';
    if(answers[idx]) cls+=' filled';
    if(confirmed[idx]){
      if(answers[idx]===q.correct_answer) cls+=' correct-blank';
      else cls+=' wrong-blank';
    }
    html=html.replace(pattern,'<span class="'+cls+'">('+num+') '+letter+'</span>');
  }
  return '<div class="fill-passage">'+html+'</div>';
}

function renderOpts(idx){
  var q=questions[idx], html='<div class="options">';
  // For fill type, options may have E
  var letters = q.options.length > 4 ? ['A','B','C','D','E'] : ['A','B','C','D'];
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls='option-btn';
    if(confirmed[idx]){
      cls+=' disabled';
      if(L===q.correct_answer) cls+=' correct';
      else if(sel&&L!==q.correct_answer) cls+=' wrong';
      else cls+=' dim';
    } else { if(sel) cls+=' selected'; }
    var txt=q.options[i].replace(/^[A-E]\.\s*/,'');
    html+='<div class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">';
    html+='<span class="option-letter">'+L+'</span><span>'+esc(txt)+'</span></div>';
  }
  html+='</div>'; return html;
}

function renderExpl(idx){
  var q=questions[idx], ok=answers[idx]===q.correct_answer;
  var icon=ok?'&#10004;':'&#10008;', pre=ok?'':'你选 '+answers[idx]+'，正确答案 '+q.correct_answer+'。';
  return '<div class="explanation">'+(ok?'<span style="color:#43b883;font-weight:700">'+icon+' 正确！</span> ':'<span style="color:#c0392b;font-weight:700">'+icon+' 错误</span> '+pre)+esc(q.explanation)+'</div>';
}

function selOpt(idx,L){ if(confirmed[idx])return; answers[idx]=L; renderPage(); }

function confirmPage(){
  var page=pages[currentPage];
  var unanswered=page.indices.filter(function(i){return answers[i]===null;});
  if(unanswered.length>0){alert('本页还有'+unanswered.length+'题未作答');return;}
  page.indices.forEach(function(i){confirmed[i]=true;});
  renderPage();
  saveProgress();
}

function nextPage(){ if(currentPage<totalPages-1){currentPage++;renderPage();window.scrollTo(0,0);} }
function prevPage(){ if(currentPage>0){currentPage--;renderPage();window.scrollTo(0,0);} }
function goNext(){
  for(var i=0;i<totalPages;i++){
    if(!pages[i].indices.every(function(idx){return confirmed[idx];})){currentPage=i;renderPage();window.scrollTo(0,0);return;}
  }
}

function saveProgress(){
  var allDone=confirmed.every(Boolean);
  if(!allDone)return;
  var correct=0, ansStr='';
  for(var i=0;i<totalQ;i++){
    if(answers[i]===questions[i].correct_answer) correct++;
    ansStr+=answers[i];
  }
  var record={date:quizData.date,session:quizData.session_number,answers:ansStr,score:correct,total:totalQ,rate:Math.round(correct/totalQ*100),timestamp:new Date().toISOString(),submitted:true};
  try{
    localStorage.setItem('basco_quiz_'+quizData.date+'_'+quizData.session_number,JSON.stringify(record));
    var hist=JSON.parse(localStorage.getItem('basco_history')||'[]');
    hist.push(record);
    localStorage.setItem('basco_history',JSON.stringify(hist));
  }catch(e){}
}

// === GitHub API auto-submit ===
var GH_OWNER='basilren', GH_REPO='english-quiz', GH_FILE='data/results.json';
var _tk=['github_pat_','11CAZBMYQ0','EWA4S994N2','X0_iLeXXLY','u2lw8w0tlE','cDYG92Uu58','cZrfYp8mpr','TaZ8Hi5TEI','YZS77OXoDHFJ'];
function _gt(){return _tk.join('');}

function submitToGitHub(){
  var syncBtn=document.getElementById('syncBtn');
  var syncStatus=document.getElementById('syncStatus');
  if(syncBtn)syncBtn.disabled=true;
  if(syncStatus)syncStatus.innerHTML='&#9889; 正在同步数据...';

  var newErrors=[];
  var typeLabelsMap={grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',fill:'短文填空'};
  var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',word_form:'词形变换',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测',sentence_fill:'短文填空'};
  var correct=0;
  for(var i=0;i<totalQ;i++){
    var q=questions[i];
    if(answers[i]===q.correct_answer){correct++;}
    else{
      newErrors.push({
        date:quizData.date,
        session:quizData.session_number,
        question_id:q.id,
        type:q.type,
        knowledge_point:q.knowledge_point,
        label:kpLabels[q.knowledge_point]||(typeLabelsMap[q.type]||q.type),
        stem:q.stem,
        options:q.options,
        correct_answer:q.correct_answer,
        student_answer:answers[i],
        explanation:q.explanation
      });
    }
  }
  var newSession={date:quizData.date,session:quizData.session_number,total:totalQ,correct:correct,rate:Math.round(correct/totalQ*100)};

  var apiBase='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
  var token=_gt();

  fetch(apiBase,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(fileInfo){
    var existing;
    if(fileInfo.content){
      try{
        var raw=atob(fileInfo.content.replace(/\n/g,''));
        var utf8=decodeURIComponent(escape(raw));
        existing=JSON.parse(utf8);
      }catch(e){existing={student:'Bosco',sessions:[],errors:[]};}
    } else {
      existing={student:'Bosco',sessions:[],errors:[]};
    }

    var dup=existing.sessions.some(function(s){return s.date===newSession.date&&s.session===newSession.session;});
    if(dup){
      if(syncStatus)syncStatus.innerHTML='&#10004; 本组成绩已同步过';
      if(syncBtn){syncBtn.disabled=false;syncBtn.textContent='已同步';}
      return Promise.resolve('skip');
    }

    existing.sessions.push(newSession);
    for(var j=0;j<newErrors.length;j++){existing.errors.push(newErrors[j]);}
    if(existing.errors.length>50) existing.errors=existing.errors.slice(existing.errors.length-50);

    var newContent=btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2))));
    var body={message:'Submit session '+newSession.date+' #'+newSession.session+' ('+newSession.rate+'%)',content:newContent,sha:fileInfo.sha};

    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(r){
    if(r==='skip')return;
    if(r.ok){
      if(syncStatus)syncStatus.innerHTML='&#10004; 错题本和学习报告已自动更新！';
      if(syncBtn){syncBtn.textContent='&#10004; 已同步';syncBtn.style.background='#43b883';}
    }else{
      r.json().then(function(e){
        if(syncStatus)syncStatus.innerHTML='&#9888; 同步失败，可稍后重试';
        if(syncBtn)syncBtn.disabled=false;
        console.error('GitHub API error:',e);
      });
    }
  })
  .catch(function(err){
    if(syncStatus)syncStatus.innerHTML='&#9888; 网络错误，可稍后重试';
    if(syncBtn)syncBtn.disabled=false;
    console.error('Submit error:',err);
  });
}

function showResult(){
  saveProgress();
  document.getElementById('questionArea').classList.add('hidden');
  var area=document.getElementById('resultArea'); area.classList.remove('hidden');
  var correct=0,dots='',errors=[],ansStr='';
  for(var i=0;i<totalQ;i++){
    var ok=answers[i]===questions[i].correct_answer;
    if(ok){correct++;dots+='&#10004;';}else{dots+='&#10008;';errors.push(i);}
    ansStr+=answers[i];
  }
  var rate=Math.round(correct/totalQ*100);
  var emoji=rate>=80?'&#127881;':rate>=60?'&#128170;':'&#128218;';
  var msg=rate>=90?'太棒了！几乎全对！':rate>=80?'很不错！继续保持！':rate>=60?'还可以，错题好好看讲解！':'别灰心，弄懂错题就是进步！';
  var html='<div class="result-card">';
  html+='<div class="result-label">第 17 天成绩</div>';
  html+='<div class="result-score">'+correct+'/'+totalQ+'</div>';
  html+='<div class="result-dots">'+dots+'</div>';
  html+='<div class="result-msg">'+emoji+' '+msg+'</div>';
  html+='<div class="stat-grid"><div class="stat-item"><div class="val">'+rate+'%</div><div class="lbl">正确率</div></div>';
  html+='<div class="stat-item"><div class="val">'+errors.length+'</div><div class="lbl">错题数</div></div></div>';
  html+='<div class="submitted-notice">&#10004; 答案已自动归档</div>';
  html+='<div id="syncStatus" style="text-align:center;padding:8px;font-size:13px;color:#667eea;font-weight:600;margin-top:8px">&#9889; 正在同步到错题本...</div>';
  if(errors.length>0){
    html+='<div class="error-section"><h3>&#10008; 错题详解</h3>';
    for(var j=0;j<errors.length;j++){
      var idx=errors[j],q=questions[idx];
      var sp=q.stem.length>60?q.stem.substring(0,60)+'...':q.stem;
      html+='<div class="error-item"><div class="ei-head">第'+q.id+'题 &middot; '+(typeLabels[q.type]||q.type)+'</div>';
      html+='<div class="ei-stem">'+esc(sp)+'</div>';
      html+='<div class="ei-answer">你选：<span style="color:#c0392b;font-weight:600">'+answers[idx]+'</span>&emsp;正确：<span style="color:#1a7f4b;font-weight:600">'+q.correct_answer+'</span></div>';
      html+='<div class="ei-explain">&#128214; '+esc(q.explanation)+'</div></div>';
    }
    html+='</div>';
  }
  html+='<div class="nav-bar" style="margin-top:16px">';
  html+='<button class="btn btn-secondary" onclick="reviewAll()">&#128203; 逐题回顾</button>';
  html+='<button class="btn btn-primary" onclick="copyAns(\''+ansStr+'\')">&#128203; 复制答案</button>';
  html+='</div>';
  html+='<div class="nav-bar" style="margin-top:12px">';
  html+='<button class="btn btn-link" onclick="window.location.href=\'errors.html\'">&#128221; 查看错题本</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'report.html\'">&#128202; 查看学习报告</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'index.html\'">&#128221; 再做一组</button>';
  html+='</div>';
  html+='<div style="text-align:center;margin-top:10px"><button id="syncBtn" class="btn btn-secondary" onclick="submitToGitHub()" style="width:auto;padding:8px 20px;font-size:12px">&#128259; 重新同步</button></div>';
  html+='</div>';
  area.innerHTML=html; window.scrollTo(0,0);
  submitToGitHub();
}
function reviewAll(){
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  currentPage=0; renderPage();
}
function copyAns(s){
  if(navigator.clipboard) navigator.clipboard.writeText(s).then(function(){alert('已复制：'+s);});
  else prompt('请复制：',s);
}

renderPage();
