<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 12px; color: #333;
}
.container { max-width: 600px; margin: 0 auto; }
.header {
  background: rgba(255,255,255,0.95); border-radius: 16px;
  padding: 16px 20px; text-align: center; margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.header h1 { font-size: 18px; color: #4a3f8a; margin-bottom: 4px; }
.header .subtitle { font-size: 12px; color: #888; }
.progress-bar { width:100%; height:6px; background:#e8e4f0; border-radius:3px; margin-top:10px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); border-radius:3px; transition:width 0.5s; }
.progress-text { font-size:11px; color:#999; margin-top:4px; }

.card {
  background: rgba(255,255,255,0.97); border-radius: 16px;
  padding: 20px 16px; margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.card.compact .q-stem, .card.compact .reading-passage, .card.compact .options { line-height: 1.4; }
.card.compact .option-btn { padding: 9px 12px; font-size: 13px; }
.card.compact .sub-question { margin-bottom: 12px; padding-bottom: 10px; }
.card.compact .reading-passage { font-size: 12px; line-height: 1.6; padding: 10px 12px; }
.slide-in { animation: slideIn 0.3s ease; }
@keyframes slideIn { from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1} }

.q-tag { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; color:#fff; margin-bottom:10px; font-weight:600; }
.tag-vocabulary{background:#43b883}.tag-grammar{background:#3b82f6}.tag-cloze{background:#f59e0b}.tag-reading{background:#ef4444}.tag-listening{background:#8b5cf6}
.q-number { font-size:13px; color:#999; margin-bottom:6px; }
.q-stem { font-size:15px; line-height:1.6; margin-bottom:14px; white-space:pre-wrap; word-break:break-word; }
.reading-passage {
  background:#f8f7ff; border-left:3px solid #667eea;
  padding:12px 14px; border-radius:0 8px 8px 0;
  margin-bottom:14px; font-size:13px; line-height:1.7;
  color:#444; white-space:pre-wrap; word-break:break-word;
}
.sub-question { margin-bottom:18px; padding-bottom:14px; border-bottom:1px dashed #e8e4f0; }
.sub-question:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.sub-q-label { font-size:14px; font-weight:600; color:#4a3f8a; margin-bottom:8px; }

.options { display:flex; flex-direction:column; gap:8px; }
.option-btn {
  display:flex; align-items:center; padding:12px 14px;
  border:2px solid #e8e4f0; border-radius:12px; background:#fff;
  cursor:pointer; transition:all 0.2s; font-size:14px; line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
.option-btn:active{transform:scale(0.98)}
.option-btn.selected{border-color:#667eea;background:#eef0ff;color:#4a3f8a;font-weight:600}
.option-btn.correct{border-color:#43b883;background:#edfff6;color:#1a7f4b}
.option-btn.wrong{border-color:#ef4444;background:#fff0f0;color:#c0392b}
.option-btn.disabled{pointer-events:none;opacity:0.7}
.option-btn.dim{opacity:0.5}
.option-letter {
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;background:#f0edf5;
  font-weight:700;font-size:13px;margin-right:10px;flex-shrink:0;transition:all 0.2s;
}
.selected .option-letter{background:#667eea;color:#fff}
.correct .option-letter{background:#43b883;color:#fff}
.wrong .option-letter{background:#ef4444;color:#fff}

.nav-bar{display:flex;gap:8px;margin-top:14px}
.btn {
  flex:1;padding:12px;border:none;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary:not(:disabled):active{transform:scale(0.97)}
.btn-secondary{background:#f0edf5;color:#666}
.btn-submit{background:linear-gradient(135deg,#43b883,#2d8f6f);color:#fff}
.btn-submit:active{transform:scale(0.97)}

.explanation {
  margin-top:12px;padding:12px 14px;background:#fffbeb;
  border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;
  font-size:13px;line-height:1.6;color:#6b5900;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.result-card {
  background:rgba(255,255,255,0.97);border-radius:16px;
  padding:24px 18px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.result-score {
  font-size:52px;font-weight:800;
  background:linear-gradient(135deg,#667eea,#764ba2);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0;
}
.result-label{font-size:13px;color:#888}
.result-dots{margin:12px 0;font-size:18px;letter-spacing:3px}
.result-msg{font-size:14px;color:#555;margin:10px 0 16px;line-height:1.5}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stat-item{background:#f8f7ff;border-radius:10px;padding:10px}
.stat-item .val{font-size:20px;font-weight:700;color:#4a3f8a}
.stat-item .lbl{font-size:11px;color:#999;margin-top:2px}

.error-section{margin-top:14px;text-align:left}
.error-section h3{font-size:15px;color:#c0392b;margin-bottom:10px;text-align:center}
.error-item {
  background:#fff8f8;border:1px solid #ffe0e0;border-radius:10px;
  padding:12px;margin-bottom:8px;
}
.error-item .ei-head{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:6px}
.error-item .ei-stem{font-size:12px;color:#555;margin-bottom:4px;line-height:1.5;white-space:pre-wrap}
.error-item .ei-answer{font-size:12px;margin-bottom:4px}
.error-item .ei-explain{font-size:12px;line-height:1.5;color:#6b5900;background:#fffbeb;padding:8px;border-radius:6px}
.submitted-notice{text-align:center;padding:12px;background:#edfff6;border-radius:10px;margin-top:12px;color:#1a7f4b;font-weight:600;font-size:14px}
.hidden{display:none!important}
</style>
</head>

<script>
// NOTE: All strings must avoid Chinese quotes. Use single quotes only.
var quizData = {"date":"2026-04-06","session_number":1,"questions":[{"id":1,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"-- Where is Tom?\n-- He _____ to the library. He will come back soon.","options":["A. has been","B. has gone","C. went","D. goes"],"correct_answer":"B","explanation":"has gone to 表示'去了某地（还没回来）'。Tom 不在这里，去了图书馆还没回来，所以用 has gone to。has been to 表示'曾去过（已回来）'，与'will come back soon'矛盾（如果已回来就不需要说soon回来了）。went 是过去时，没有'现在不在'的含义。"},{"id":2,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"Great changes _____ in our city over the past ten years.","options":["A. take place","B. took place","C. have taken place","D. will take place"],"correct_answer":"C","explanation":"over the past ten years 意为'在过去十年中'，是现在完成时的标志词组（past/last + 时间段）。take place 发生，其完成时为 have taken place。A 是一般现在时；B 是过去时（但 over the past ten years 强调到现在的时间段）；D 是将来时。"},{"id":3,"type":"grammar","knowledge_point":"object_clause","difficulty":2,"stem":"-- Could you please tell me _____?\n-- Sure. You can take Bus No.6.","options":["A. how can I get to the zoo","B. how I can get to the zoo","C. when can I get to the zoo","D. when I can get to the zoo"],"correct_answer":"B","explanation":"宾语从句用陈述语序。回答是'坐6路公交'，说明问的是'怎么去'（how），不是'什么时候去'（when）。B 是 how + 陈述语序（I can get）。A 是疑问语序（can I）；C/D 用 when 但回答是方式不是时间。两步判断：(1) 看回答确定引导词 → how (2) 确认陈述语序 → I can。"},{"id":4,"type":"grammar","knowledge_point":"infinitive","difficulty":2,"stem":"The teacher told us _____ quiet in the library.","options":["A. keep","B. keeping","C. to keep","D. kept"],"correct_answer":"C","explanation":"tell sb. to do sth. 意为'告诉某人做某事'，是固定用法。老师告诉我们在图书馆保持安静。否定形式：tell sb. not to do sth.。类似结构：ask sb. to do, want sb. to do, advise sb. to do, encourage sb. to do。"},{"id":5,"type":"vocabulary","knowledge_point":"word_meaning","difficulty":2,"stem":"The population of this city has _____ rapidly in recent years. More and more people are moving here.","options":["A. increased","B. reduced","C. changed","D. controlled"],"correct_answer":"A","explanation":"increased 意为'增加'。后文说'越来越多的人搬到这里'，说明人口在增加。reduce 减少；change 改变（太笼统）；control 控制。increase/reduce 是描述数量变化的常见动词，注意搭配：increase rapidly 快速增长，increase by 10% 增长了10%。"},{"id":6,"type":"vocabulary","knowledge_point":"phrase_collocation","difficulty":2,"stem":"We should _____ a good habit of saving water in our daily life.","options":["A. pick up","B. make up","C. develop","D. give up"],"correct_answer":"C","explanation":"develop a habit 意为'养成习惯'，是固定搭配。我们应该养成节约用水的好习惯。pick up 捡起/学会；make up 编造/化妆；give up 放弃。注意：develop 不只是'发展'，还有'培养、养成'的含义，是高频考点词。"},{"id":7,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","group_passage":"Mrs. Green was a strict but kind teacher. One Monday morning, she noticed that one of her students, David, looked very (7)___. His eyes were red and he kept yawning during class.\n\nDuring the break, Mrs. Green asked David what was wrong. David (8)___ his head and said nothing at first. But Mrs. Green waited patiently, and finally David told her the truth. His parents had been arguing a lot recently, and he could not (9)___ at night because of the noise.\n\nMrs. Green felt sorry for David. She did not tell anyone about his family problems. (10)___, she gave David some extra help with his homework after school. She also let him rest in the reading room during lunch breaks.\n\nA few weeks later, David's situation at home improved. His parents stopped arguing and the family became (11)___ again. David thanked Mrs. Green for her kindness. 'You did not just teach me English,' he said. 'You taught me that someone cares.'","stem":"(7)","options":["A. excited","B. tired","C. angry","D. surprised"],"correct_answer":"B","explanation":"tired 意为'疲倦的'。后文线索：eyes were red（眼睛红）+ kept yawning（一直打哈欠）→ 典型的疲倦表现。A excited 兴奋（兴奋不会打哈欠）；C angry 生气（生气不会打哈欠）；D surprised 惊讶（不合逻辑）。做完形时先看空格后面的具体描述，再回头选词。"},{"id":8,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(8)","options":["A. nodded","B. raised","C. shook","D. turned"],"correct_answer":"C","explanation":"shook his head 意为'摇头'，表示否定或不想说。David 一开始什么都不说（said nothing），摇头表示不想谈。nodded 点头（表示肯定，与 said nothing 矛盾）；raised 抬头；turned 转头。shake one's head = 摇头，nod one's head = 点头。注意 shook 是 shake 的过去式。"},{"id":9,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(9)","options":["A. eat","B. study","C. play","D. sleep"],"correct_answer":"D","explanation":"sleep 意为'睡觉'。父母吵架噪音大，David 晚上无法入睡。这与前文'looked tired, eyes were red, kept yawning'完全吻合——因为睡不好所以很疲惫。这是典型的跨段推理：第一段描述表象（疲倦），第二段揭示原因（睡不着）。"},{"id":10,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(10)","options":["A. Instead","B. However","C. Moreover","D. Otherwise"],"correct_answer":"A","explanation":"Instead 意为'相反，而是'。Mrs. Green 没有告诉别人 David 的家庭问题，而是（instead）自己给他额外帮助。前句是'没有做某事'，后句是'做了另一件事'→ instead 表示替代关系。However 但是（表转折）；Moreover 而且（表递进）；Otherwise 否则（表条件）。"},{"id":11,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(11)","options":["A. noisy","B. peaceful","C. busy","D. famous"],"correct_answer":"B","explanation":"peaceful 意为'和平的，安宁的'。父母不再吵架了，家庭重新变得平静。peaceful 与前文 arguing（吵架）形成对比。noisy 吵闹的（与'停止吵架'矛盾）；busy 忙碌的（无关）；famous 出名的（无关）。"},{"id":12,"type":"reading","knowledge_point":"detail","difficulty":2,"group":"reading_1","group_passage":"Have you ever wondered why we dream? Scientists have been studying dreams for centuries, but there is still no single answer that everyone agrees on.\n\nOne popular theory is that dreams help our brains process information from the day. During sleep, the brain sorts through memories, keeping the important ones and throwing away the unimportant ones. Dreams may be a side effect of this process.\n\nAnother theory suggests that dreams help us deal with emotions. If you have had a stressful day, you might dream about the things that worried you. Some researchers believe that dreaming about problems can actually help us find solutions. This is why people sometimes say, 'Let me sleep on it,' when they need to make a difficult decision.\n\nInterestingly, everyone dreams, but not everyone remembers their dreams. Studies show that we dream for about two hours every night, usually during a stage of sleep called REM (Rapid Eye Movement). People who wake up during REM sleep are more likely to remember what they were dreaming about.\n\nWhile we may never fully understand why we dream, one thing is clear: dreams are an important part of healthy sleep. So next time you have a strange dream, don't worry -- your brain is just doing its job!","stem":"12. According to the first theory, what do dreams help our brains do?","options":["A. Create new memories.","B. Process information from the day.","C. Forget everything we learned.","D. Stay awake at night."],"correct_answer":"B","explanation":"原文第二段：dreams help our brains process information from the day。梦帮助大脑处理白天的信息。A 不是'创造新记忆'而是'整理记忆'；C 太极端（不是忘记所有东西）；D 相反（梦发生在睡眠中）。"},{"id":13,"type":"reading","knowledge_point":"word_guessing","difficulty":2,"group":"reading_1","stem":"13. What does the phrase 'sleep on it' in Paragraph 3 most probably mean?","options":["A. Go to bed very early.","B. Think about it while sleeping and decide later.","C. Forget about the problem completely.","D. Talk to someone about the problem."],"correct_answer":"B","explanation":"词义猜测题：上下文说'做梦可以帮我们找到解决方案'，然后说人们在需要做困难决定时会说 sleep on it。结合语境，sleep on it = 睡一觉再想想/晚点再决定。B 选项'睡觉时想一想，晚点再决定'最贴切。A 太字面；C 不是忘记；D 原文没提跟别人说。"},{"id":14,"type":"reading","knowledge_point":"main_idea","difficulty":2,"group":"reading_1","stem":"14. What is the best title for this passage?","options":["A. How to Sleep Better at Night","B. The Science Behind Dreams","C. Why REM Sleep Is Dangerous","D. How to Remember Your Dreams"],"correct_answer":"B","explanation":"全文五段：(1) 引出问题——为什么做梦 (2) 理论一：处理信息 (3) 理论二：处理情绪 (4) 做梦的生理机制(REM) (5) 总结。核心话题是'梦背后的科学'。A 文章不是讲如何睡得更好；C REM 不是危险的；D 只是文中一小部分内容。主旨题：找覆盖全文所有段落的选项。"}]};

var questions = quizData.questions;
var totalQ = questions.length;
var answers = new Array(totalQ).fill(null);
var confirmed = new Array(totalQ).fill(false);

// Build pages: single or grouped
var pages = [];
(function() {
  var i = 0;
  while (i < totalQ) {
    var q = questions[i];
    if (q.group) {
      var gid = q.group, items = [];
      while (i < totalQ && questions[i].group === gid) { items.push(i); i++; }
      pages.push({ type:"group", indices:items, groupType:q.type });
    } else {
      pages.push({ type:"single", indices:[i] }); i++;
    }
  }
})();
var currentPage = 0, totalPages = pages.length;
var typeLabels={vocabulary:"词汇题",grammar:"语法题",cloze:"完形填空",reading:"阅读理解",listening:"听力题"};
var tagClasses={vocabulary:"tag-vocabulary",grammar:"tag-grammar",cloze:"tag-cloze",reading:"tag-reading",listening:"tag-listening"};

function esc(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>');}
function updateProgress(){
  var done=confirmed.filter(Boolean).length;
  document.getElementById("progressFill").style.width=(done/totalQ*100)+"%";
  document.getElementById("progressText").textContent="第"+(currentPage+1)+"页/共"+totalPages+"页 已完成"+done+"/"+totalQ+"题";
}

function renderPage(){
  var page=pages[currentPage], area=document.getElementById("questionArea"), html='';
  var isCompact = page.indices.length > 3 ? ' compact' : '';
  if(page.type==="single") html=renderSingle(page.indices[0], isCompact);
  else html=renderGroup(page, isCompact);
  // Nav
  html+='<div class="nav-bar">';
  if(currentPage>0) html+='<button class="btn btn-secondary" onclick="prevPage()">&#9664; 上一页</button>';
  var allPageConfirmed = page.indices.every(function(idx){return confirmed[idx];});
  var allPageAnswered = page.indices.every(function(idx){return answers[idx]!==null;});
  if(!allPageConfirmed){
    html+='<button class="btn btn-submit" onclick="confirmPage()" '+(allPageAnswered?'':'disabled')+'>&#10004; 提交本页</button>';
  } else if(currentPage<totalPages-1){
    html+='<button class="btn btn-primary" onclick="nextPage()">下一页 &#9654;</button>';
  } else {
    var allDone=confirmed.every(Boolean);
    if(allDone) html+='<button class="btn btn-primary" onclick="showResult()">&#128202; 查看成绩</button>';
    else html+='<button class="btn btn-primary" onclick="goNext()">继续答题 &#9654;</button>';
  }
  html+='</div>';
  area.innerHTML=html; updateProgress();
}

function renderSingle(idx, compact){
  var q=questions[idx];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[q.type]||'tag-grammar')+'">'+(typeLabels[q.type]||q.type)+'</span>';
  html+='<div class="q-number">第'+q.id+'题</div>';
  html+='<div class="q-stem">'+esc(q.stem)+'</div>';
  html+=renderOpts(idx);
  if(confirmed[idx]) html+=renderExpl(idx);
  html+='</div>'; return html;
}

function renderGroup(page, compact){
  var indices=page.indices, fq=questions[indices[0]];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[fq.type]||'tag-grammar')+'">'+(typeLabels[fq.type]||fq.type)+'</span>';
  if(fq.group_passage) html+='<div class="reading-passage">'+esc(fq.group_passage)+'</div>';
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    html+='<div class="sub-question">';
    html+='<div class="sub-q-label">第'+q.id+'题 '+esc(q.stem)+'</div>';
    html+=renderOpts(idx);
    if(confirmed[idx]) html+=renderExpl(idx);
    html+='</div>';
  }
  html+='</div>'; return html;
}

function renderOpts(idx){
  var q=questions[idx], letters=["A","B","C","D"], html='<div class="options">';
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls="option-btn";
    if(confirmed[idx]){
      cls+=" disabled";
      if(L===q.correct_answer) cls+=" correct";
      else if(sel&&L!==q.correct_answer) cls+=" wrong";
      else cls+=" dim";
    } else { if(sel) cls+=" selected"; }
    var txt=q.options[i].replace(/^[A-D]\.\s*/,"");
    html+='<div class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">';
    html+='<span class="option-letter">'+L+'</span><span>'+esc(txt)+'</span></div>';
  }
  html+='</div>'; return html;
}

function renderExpl(idx){
  var q=questions[idx], ok=answers[idx]===q.correct_answer;
  var icon=ok?"&#10004;":"&#10008;", pre=ok?"":"你选 "+answers[idx]+"，正确答案 "+q.correct_answer+"。";
  return '<div class="explanation">'+(ok?'<span style="color:#43b883;font-weight:700">'+icon+' 正确！</span> ':'<span style="color:#c0392b;font-weight:700">'+icon+' 错误</span> '+pre)+esc(q.explanation)+'</div>';
}

function selOpt(idx,L){ if(confirmed[idx])return; answers[idx]=L; renderPage(); }

function confirmPage(){
  var page=pages[currentPage];
  var unanswered=page.indices.filter(function(i){return answers[i]===null;});
  if(unanswered.length>0){alert("本页还有"+unanswered.length+"题未作答");return;}
  page.indices.forEach(function(i){confirmed[i]=true;});
  renderPage();
  saveProgress();
}

function nextPage(){ if(currentPage<totalPages-1){currentPage++;renderPage();window.scrollTo(0,0);} }
function prevPage(){ if(currentPage>0){currentPage--;renderPage();window.scrollTo(0,0);} }
function goNext(){
  for(var i=0;i<totalPages;i++){
    if(!pages[i].indices.every(function(idx){return confirmed[idx];})){currentPage=i;renderPage();window.scrollTo(0,0);return;}
  }
}

function saveProgress(){
  var allDone=confirmed.every(Boolean);
  if(!allDone)return;
  var correct=0, ansStr="";
  for(var i=0;i<totalQ;i++){
    if(answers[i]===questions[i].correct_answer) correct++;
    ansStr+=answers[i];
  }
  var record={date:quizData.date,session:quizData.session_number,answers:ansStr,score:correct,total:totalQ,rate:Math.round(correct/totalQ*100),timestamp:new Date().toISOString(),submitted:true};
  try{
    localStorage.setItem("basco_quiz_"+quizData.date+"_"+quizData.session_number,JSON.stringify(record));
    var hist=JSON.parse(localStorage.getItem("basco_history")||"[]");
    hist.push(record);
    localStorage.setItem("basco_history",JSON.stringify(hist));
  }catch(e){}
}

// === GitHub API auto-submit ===
var GH_OWNER='basilren', GH_REPO='english-quiz', GH_FILE='data/results.json';
var _tk=['github_pat_','11CAZBMYQ0','EWA4S994N2','X0_iLeXXLY','u2lw8w0tlE','cDYG92Uu58','cZrfYp8mpr','TaZ8Hi5TEI','YZS77OXoDHFJ'];
function _gt(){return _tk.join('');}

function submitToGitHub(){
  var syncBtn=document.getElementById('syncBtn');
  var syncStatus=document.getElementById('syncStatus');
  if(syncBtn)syncBtn.disabled=true;
  if(syncStatus)syncStatus.innerHTML='&#9889; 正在同步数据...';

  // Build error list for this session
  var newErrors=[];
  var typeLabelsMap={grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',listening:'听力题'};
  var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测'};
  var correct=0;
  for(var i=0;i<totalQ;i++){
    var q=questions[i];
    if(answers[i]===q.correct_answer){correct++;}
    else{
      newErrors.push({
        date:quizData.date,
        session:quizData.session_number,
        question_id:q.id,
        type:q.type,
        knowledge_point:q.knowledge_point,
        label:kpLabels[q.knowledge_point]||(typeLabelsMap[q.type]||q.type),
        stem:q.stem,
        options:q.options,
        correct_answer:q.correct_answer,
        student_answer:answers[i],
        explanation:q.explanation
      });
    }
  }
  var newSession={date:quizData.date,session:quizData.session_number,total:totalQ,correct:correct,rate:Math.round(correct/totalQ*100)};

  // Fetch current results.json, merge, then push
  var apiBase='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
  var token=_gt();

  fetch(apiBase,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(fileInfo){
    var existing;
    if(fileInfo.content){
      try{
        var raw=atob(fileInfo.content.replace(/\n/g,''));
        // Decode UTF-8: atob returns Latin-1, need to convert back to UTF-8
        var utf8=decodeURIComponent(escape(raw));
        existing=JSON.parse(utf8);
      }catch(e){existing={student:'Bosco',sessions:[],errors:[]};}
    } else {
      existing={student:'Bosco',sessions:[],errors:[]};
    }

    // Check for duplicate session
    var dup=existing.sessions.some(function(s){return s.date===newSession.date&&s.session===newSession.session;});
    if(dup){
      if(syncStatus)syncStatus.innerHTML='&#10004; 本组成绩已同步过';
      if(syncBtn){syncBtn.disabled=false;syncBtn.textContent='已同步';}
      return Promise.resolve('skip');
    }

    // Merge
    existing.sessions.push(newSession);
    for(var j=0;j<newErrors.length;j++){existing.errors.push(newErrors[j]);}
    // Keep max 50 errors
    if(existing.errors.length>50) existing.errors=existing.errors.slice(existing.errors.length-50);

    var newContent=btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2))));
    var body={message:'Submit session '+newSession.date+' #'+newSession.session+' ('+newSession.rate+'%)',content:newContent,sha:fileInfo.sha};

    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(r){
    if(r==='skip')return;
    if(r.ok){
      if(syncStatus)syncStatus.innerHTML='&#10004; 错题本和学习报告已自动更新！';
      if(syncBtn){syncBtn.textContent='&#10004; 已同步';syncBtn.style.background='#43b883';}
    }else{
      r.json().then(function(e){
        if(syncStatus)syncStatus.innerHTML='&#9888; 同步失败，可稍后重试';
        if(syncBtn)syncBtn.disabled=false;
        console.error('GitHub API error:',e);
      });
    }
  })
  .catch(function(err){
    if(syncStatus)syncStatus.innerHTML='&#9888; 网络错误，可稍后重试';
    if(syncBtn)syncBtn.disabled=false;
    console.error('Submit error:',err);
  });
}

function showResult(){
  saveProgress();
  document.getElementById("questionArea").classList.add("hidden");
  var area=document.getElementById("resultArea"); area.classList.remove("hidden");
  var correct=0,dots="",errors=[],ansStr="";

  var msg=rate>=90?"太棒了！几乎全对！":rate>=80?"很不错！继续保持！":rate>=60?"还可以，错题好好看讲解！":"别灰心，弄懂错题就是进步！";

  html+='<div class="stat-item"><div class="val">'+errors.length+'</div><div class="lbl">错题数</div></div></div>';
  html+='<div class="submitted-notice">&#10004; 答案已自动归档</div>';
  html+='<div id="syncStatus" style="text-align:center;padding:8px;font-size:13px;color:#667eea;font-weight:600;margin-top:8px">&#9889; 正在同步到错题本...</div>';
  if(errors.length>0){
    html+='<div class="error-section"><h3>&#10008; 错题详解</h3>';
    for(var j=0;j<errors.length;j++){
      var idx=errors[j],q=questions[idx];
      var sp=q.stem.length>60?q.stem.substring(0,60)+"...":q.stem;

      html+='<div class="ei-stem">'+esc(sp)+'</div>';
      html+='<div class="ei-answer">你选：<span style="color:#c0392b;font-weight:600">'+answers[idx]+'</span>&emsp;正确：<span style="color:#1a7f4b;font-weight:600">'+q.correct_answer+'</span></div>';
      html+='<div class="ei-explain">&#128214; '+esc(q.explanation)+'</div></div>';
    }
    html+='</div>';
  }
  html+='<div class="nav-bar" style="margin-top:16px">';
  html+='<button class="btn btn-secondary" onclick="reviewAll()">&#128203; 逐题回顾</button>';
  html+='<button class="btn btn-primary" onclick="copyAns(\''+ansStr+'\')">&#128203; 复制答案</button>';
  html+='</div>';
  html+='<div class="nav-bar" style="margin-top:12px">';
  html+='<button class="btn btn-link" onclick="window.location.href=\'errors.html\'">&#128221; 查看错题本</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'report.html\'">&#128202; 查看学习报告</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'index.html\'">&#128221; 再做一组</button>';
  html+='</div>';
  html+='<div style="text-align:center;margin-top:10px"><button id="syncBtn" class="btn btn-secondary" onclick="submitToGitHub()" style="width:auto;padding:8px 20px;font-size:12px">&#128259; 重新同步</button></div>';
  html+='</div>';
  area.innerHTML=html; window.scrollTo(0,0);
  // Auto submit to GitHub
  submitToGitHub();
}
function reviewAll(){
  document.getElementById("resultArea").classList.add("hidden");
  document.getElementById("questionArea").classList.remove("hidden");
  currentPage=0; renderPage();
}
function copyAns(s){
  if(navigator.clipboard) navigator.clipboard.writeText(s).then(function(){alert("已复制："+s);});
  else prompt("请复制：",s);
}
