<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

.card {

.card.compact .q-stem, .card.compact .reading-passage, .card.compact .options { line-height: 1.4; }

<script>
// NOTE: All strings must avoid Chinese quotes. Use single quotes only.
var quizData = {"date":"2026-04-11","session_number":1,"questions":[{"id":1,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"-- How long has your father _____ in this company?\n-- For more than ten years.","options":["A. worked","B. joined","C. come","D. started"],"correct_answer":"A","explanation":"how long 提问持续时间，需要延续性动词。work 本身就是延续性动词，可以与 for + 一段时间连用。join/come/start 都是非延续性动词（瞬间动词），不能与 for ten years 搭配。如果要用 join，需改为 been in（join -> be in）。记住：has worked for ten years = 已经工作了十年。"},{"id":2,"type":"grammar","knowledge_point":"present_perfect","difficulty":2,"stem":"-- Have you ever _____ to Beijing?\n-- Yes, I _____ there last summer.","options":["A. been; went","B. gone; went","C. been; have been","D. gone; have gone"],"correct_answer":"A","explanation":"Have you ever been to...? 表示'你曾经去过...吗？'（人已经回来了才能问这个问题）。回答用一般过去时 I went there last summer（去年夏天去的），因为 last summer 是明确的过去时间点，不能用现在完成时。been to = 去过（已回来）；gone to = 去了（未回来）。第二空有 last summer 时间标志，必须用一般过去时 went。"},{"id":3,"type":"grammar","knowledge_point":"object_clause","difficulty":2,"stem":"I wonder _____ you could help me carry these boxes upstairs.","options":["A. that","B. what","C. if","D. how"],"correct_answer":"C","explanation":"I wonder if/whether... 表示'我想知道是否...'。句意：我想知道你是否能帮我把这些箱子搬上楼。that 引导确定的陈述（不表'是否'）；what 是'什么'（后面不能接完整句子）；how 是'怎样'（语义不通）。if = whether 表示'是否'，是宾语从句中最常考的引导词之一。"},{"id":4,"type":"grammar","knowledge_point":"object_clause","difficulty":2,"stem":"She didn't tell me when she _____ back from Shanghai.","options":["A. will come","B. would come","C. comes","D. has come"],"correct_answer":"B","explanation":"宾语从句时态呼应规则：主句是过去时（didn't tell），从句要用相应的过去时态。'将要回来'的将来概念在过去时态中用 would come（过去将来时）。will come 没有时态呼应；comes 是一般现在时（不符合）；has come 是现在完成时（也不符合）。口诀：主过从过 —— 主句过去时，从句跟着'过去'。"},{"id":5,"type":"grammar","knowledge_point":"conditional","difficulty":2,"stem":"_____ you study harder, you will fail the exam again.","options":["A. If","B. Unless","C. When","D. After"],"correct_answer":"B","explanation":"句意：除非你更努力学习，否则你又会考试不及格。unless = if...not（除非），后接肯定句。Unless you study harder = If you don't study harder。如果选 If，则后面应该是否定句（If you don't study harder），但题目中 study harder 是肯定形式，所以用 unless。when/after 不表条件关系，语义不通。"},{"id":6,"type":"grammar","knowledge_point":"tense_general","difficulty":2,"stem":"Listen! Someone _____ the piano in the next room. It sounds beautiful.","options":["A. plays","B. played","C. is playing","D. has played"],"correct_answer":"C","explanation":"Listen!（听！）是现在进行时的标志词，表示'此刻正在发生'的动作。someone is playing the piano = 有人正在弹钢琴。plays（一般现在时：经常弹）不符合'此刻'语境；played（过去时）与 Listen 矛盾；has played（完成时）强调结果而非正在进行。常见标志词：Look!/Listen!/now/at the moment -> 现在进行时。"},{"id":7,"type":"grammar","knowledge_point":"infinitive","difficulty":2,"stem":"The book is too difficult for me _____.","options":["A. understand","B. understanding","C. to understand","D. understood"],"correct_answer":"C","explanation":"too + adj. + (for sb.) + to do sth. 是固定句型，意为'太...而不能做某事'。too difficult for me to understand = 太难了我理解不了。注意这个句型本身含有否定含义（不能做），所以不需要在 to understand 前加 not。类似：The box is too heavy for the boy to carry.（箱子太重男孩搬不动）。"},{"id":8,"type":"grammar","knowledge_point":"gerund","difficulty":2,"stem":"Would you mind _____ the door? It is too cold outside.","options":["A. close","B. to close","C. closing","D. closed"],"correct_answer":"C","explanation":"mind doing sth. 意为'介意做某事'。Would you mind closing the door? = 你介意关上门吗？mind 后面必须接动名词（V-ing），不能接不定式（to do）。类似用法：Do you mind waiting? / I don't mind helping. 必须接 doing 的动词口诀：'完成享受别介意，建议练习要坚持'（finish/enjoy/mind/suggest/practice/keep）。"},{"id":9,"type":"vocabulary","knowledge_point":"word_meaning","difficulty":2,"stem":"The scientist made an important _____ that could change the way we treat diseases.","options":["A. decision","B. discovery","C. difference","D. discussion"],"correct_answer":"B","explanation":"make a discovery 意为'做出发现'。句意：这位科学家做出了一个重要发现，可能改变我们治疗疾病的方式。decision 决定（make a decision）；difference 区别（make a difference 产生影响）；discussion 讨论（have a discussion）。根据语境'改变治疗疾病的方式'，只有'发现'（discovery）最合逻辑。"},{"id":10,"type":"vocabulary","knowledge_point":"phrase_collocation","difficulty":2,"stem":"We should _____ the environment by planting more trees.","options":["A. look after","B. look up","C. look for","D. look out"],"correct_answer":"A","explanation":"look after 意为'照顾/照料'，look after the environment = 保护环境。look up 查找（在字典中）；look for 寻找；look out 当心/小心。句意：我们应该通过多种植树木来保护环境。by planting more trees（通过种树）是保护环境的方式，与 look after（照料）搭配。"},{"id":11,"type":"vocabulary","knowledge_point":"word_form","difficulty":2,"stem":"Keeping a diary every day helps to improve your _____ (write) skills.","options":["A. write","B. writing","C. writer","D. written"],"correct_answer":"B","explanation":"writing skills = 写作技能。空格处作定语修饰 skills，需要用动名词 writing 作形容词性修饰语。write（动词原形）不能直接修饰名词；writer（作家）是人，不修饰 skills；written（过去分词）虽然可以作定语，但 written skills 不是固定搭配。类似搭配：reading ability, speaking contest, swimming pool。"},{"id":12,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","group_passage":"Every year in June, our school holds a special event called the 'Flea Market Day'. Students bring things they no longer need -- old books, toys, clothes -- and sell them to other students at very low prices.\n\nLast year, I decided to sell some of my old comic books. I spent the whole evening before the event setting up price tags and making a colourful sign. I was (12)_____ that nobody would be interested in my old comics. To my surprise, a long queue formed at my table within the first ten minutes!\n\nThe most (13)_____ moment came when a younger student picked up a comic I had loved as a child. He held it carefully and asked, 'Is this really only five yuan?' I nodded and watched his face (14)_____ with joy. At that moment, I realised that selling was not just about making money -- it was about passing on happiness.\n\nBy noon, I had sold almost everything. I (15)_____ 87 yuan in total, and I decided to donate half of it to the school library. My teacher said she was proud of my choice. She told us that the flea market teaches students an important (16)_____ -- that things we no longer value can still bring joy to others.","stem":"(12)","options":["A. sure","B. worried","C. excited","D. satisfied"],"correct_answer":"B","explanation":"后文用 To my surprise（让我惊讶的是）转折，说排了长队——说明事前的心情是担忧/紧张的。I was worried that nobody would be interested = 我担心没人对我的旧漫画感兴趣。sure（确定）和 excited（兴奋）与后面的'惊讶'转折不搭；satisfied（满意）是对结果的评价，不适合用在'事前担心'的语境。worried 与 To my surprise 构成情感反转。"},{"id":13,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(13)","options":["A. embarrassing","B. touching","C. confusing","D. frightening"],"correct_answer":"B","explanation":"下文描写小同学小心翼翼地拿起漫画、脸上充满喜悦，作者感悟到'传递快乐'的意义——这是一个感人的（touching）时刻。embarrassing（尴尬的）、confusing（困惑的）、frightening（可怕的）都是负面情感词，与温馨的场景矛盾。touching moment = 感人的时刻，呼应全段的温暖基调。"},{"id":14,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(14)","options":["A. fill","B. cover","C. light up","D. turn away"],"correct_answer":"C","explanation":"watched his face light up with joy = 看着他的脸因喜悦而亮起来。light up 意为'（脸）放光/亮起来'，常用来形容喜悦的表情。fill with（充满）语法上应该是 fill with joy（但 face filled with joy 缺 was）；cover（覆盖）语义不通；turn away（转开）与 joy 矛盾。light up with joy 是描写欣喜表情的经典搭配。"},{"id":15,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(15)","options":["A. spent","B. paid","C. earned","D. borrowed"],"correct_answer":"C","explanation":"I earned 87 yuan in total = 我总共赚了87元。这里说的是卖东西的收入，所以用 earned（赚得）。spent（花费）是支出不是收入；paid（支付）也是付出；borrowed（借）与卖东西无关。earn money = 赚钱，后文还捐了一半给图书馆，逻辑完整：赚钱 -> 捐款。"},{"id":16,"type":"cloze","knowledge_point":"cloze_general","difficulty":3,"group":"cloze_1","stem":"(16)","options":["A. lesson","B. subject","C. language","D. method"],"correct_answer":"A","explanation":"teach sb. a lesson = 给某人上一课/教某人一个道理。这里 lesson 指'人生道理/经验教训'，不是'课堂'。an important lesson -- that things we no longer value can still bring joy to others = 一个重要的道理——我们不再珍视的东西仍然能给别人带来快乐。subject（科目）、language（语言）、method（方法）都不能与 teach...that 从句搭配。lesson 一词多义是中考常考点。"},{"id":17,"type":"reading","knowledge_point":"detail","difficulty":2,"group":"reading_1","group_passage":"In 2021, NASA successfully landed a small helicopter called Ingenuity on Mars. It was the first time a human-made aircraft had ever flown on another planet. The flight lasted only 39 seconds, but it was considered one of the greatest achievements in space exploration.\n\nFlying on Mars is extremely challenging because the atmosphere there is about 100 times thinner than Earth's. This means there is very little air for a helicopter's blades to push against. To solve this problem, engineers designed Ingenuity with blades that spin much faster than those on Earth -- about 2,400 times per minute.\n\nIngenuity was originally planned to make just five test flights. However, it performed so well that NASA decided to extend its mission. By the time it retired in January 2024, the tiny helicopter had completed 72 flights and travelled over 17 kilometres across the Martian surface.\n\nThe success of Ingenuity has opened up exciting possibilities. Future Mars helicopters could be used to explore areas that rovers cannot reach, such as steep cliffs and deep valleys. They could also help scientists choose the best landing sites for future human missions.\n\nScientists believe that within the next twenty years, astronauts may walk on Mars for the first time. When that day comes, flying machines like Ingenuity will have played an important role in making it possible.","stem":"17. How long did Ingenuity's first flight on Mars last?","options":["A. About 5 minutes.","B. 39 seconds.","C. 72 minutes.","D. 24 hours."],"correct_answer":"B","explanation":"原文第一段：The flight lasted only 39 seconds。直接对应 B 选项。A/C/D 的数字与原文不符。做细节题时要精确定位关键数字，39 seconds 出现在第一段末尾，不要与后文的 72 flights 或 2,400 times 混淆。"},{"id":18,"type":"reading","knowledge_point":"inference","difficulty":2,"group":"reading_1","stem":"18. What can we infer from Paragraph 2?","options":["A. It is easier to fly on Mars than on Earth.","B. Ingenuity uses the same blades as Earth helicopters.","C. Engineers had to solve special problems to fly on Mars.","D. Mars has a thicker atmosphere than Earth."],"correct_answer":"C","explanation":"推理判断：第二段说火星大气密度只有地球的百分之一，飞行极具挑战性，工程师为此专门设计了更快旋转的桨叶来解决问题。由此推断：工程师必须解决特殊问题才能在火星飞行（C）。A 说更容易（与 extremely challenging 矛盾）；B 说使用相同桨叶（与 spin much faster 矛盾）；D 说大气更厚（与 100 times thinner 矛盾）。"},{"id":19,"type":"reading","knowledge_point":"word_guessing","difficulty":2,"group":"reading_1","stem":"19. What does the word 'extend' in Paragraph 3 most probably mean?","options":["A. Cancel.","B. Shorten.","C. Make longer.","D. Start over."],"correct_answer":"C","explanation":"词义猜测：原文说 Ingenuity 原计划只飞5次，但表现太好，所以 NASA decided to extend its mission。从'原计划5次'到'最终完成72次'可推断 extend = 延长/扩展（make longer）。cancel（取消）与'继续飞'矛盾；shorten（缩短）与'从5次到72次'矛盾；start over（重新开始）不符合语境。前后文的数字对比（5 vs 72）是关键推理线索。"},{"id":20,"type":"reading","knowledge_point":"main_idea","difficulty":2,"group":"reading_1","stem":"20. What is the best title for this passage?","options":["A. How to Build a Helicopter.","B. The First Flight on Mars and Its Impact.","C. Why Mars Is Too Dangerous to Visit.","D. The History of NASA."],"correct_answer":"B","explanation":"主旨大意题：全文围绕 Ingenuity 在火星的首次飞行（第1-2段）、任务扩展（第3段）、以及对未来的影响（第4-5段）展开。B'火星首飞及其影响'最全面。A 只涉及制造（文章不是讲怎么造直升机）；C 说火星太危险（文章基调是积极的）；D 说 NASA 历史（太宽泛）。做主旨题：选最全面、不偏不窄的标题。"}]};

var questions = quizData.questions;
var totalQ = questions.length;
var answers = new Array(totalQ).fill(null);
var confirmed = new Array(totalQ).fill(false);

// Build pages: single or grouped
var pages = [];
(function() {
  var i = 0;
  while (i < totalQ) {
    var q = questions[i];
    if (q.group) {
      var gid = q.group, items = [];
      while (i < totalQ && questions[i].group === gid) { items.push(i); i++; }
      pages.push({ type:"group", indices:items, groupType:q.type });
    } else {
      pages.push({ type:"single", indices:[i] }); i++;
    }
  }
})();
var currentPage = 0, totalPages = pages.length;
var typeLabels={vocabulary:"词汇题",grammar:"语法题",cloze:"完形填空",reading:"阅读理解",listening:"听力题"};
var tagClasses={vocabulary:"tag-vocabulary",grammar:"tag-grammar",cloze:"tag-cloze",reading:"tag-reading",listening:"tag-listening"};

function esc(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML.replace(/\n/g,'<br>');}
function updateProgress(){
  var done=confirmed.filter(Boolean).length;
  document.getElementById("progressFill").style.width=(done/totalQ*100)+"%";
  document.getElementById("progressText").textContent="第"+(currentPage+1)+"页/共"+totalPages+"页 已完成"+done+"/"+totalQ+"题";
}

function renderPage(){
  var page=pages[currentPage], area=document.getElementById("questionArea"), html='';
  var isCompact = page.indices.length > 3 ? ' compact' : '';
  if(page.type==="single") html=renderSingle(page.indices[0], isCompact);
  else html=renderGroup(page, isCompact);
  // Nav
  html+='<div class="nav-bar">';
  if(currentPage>0) html+='<button class="btn btn-secondary" onclick="prevPage()">&#9664; 上一页</button>';
  var allPageConfirmed = page.indices.every(function(idx){return confirmed[idx];});
  var allPageAnswered = page.indices.every(function(idx){return answers[idx]!==null;});
  if(!allPageConfirmed){
    html+='<button class="btn btn-submit" onclick="confirmPage()" '+(allPageAnswered?'':'disabled')+'>&#10004; 提交本页</button>';
  } else if(currentPage<totalPages-1){
    html+='<button class="btn btn-primary" onclick="nextPage()">下一页 &#9654;</button>';
  } else {
    var allDone=confirmed.every(Boolean);
    if(allDone) html+='<button class="btn btn-primary" onclick="showResult()">&#128202; 查看成绩</button>';
    else html+='<button class="btn btn-primary" onclick="goNext()">继续答题 &#9654;</button>';
  }
  html+='</div>';
  area.innerHTML=html; updateProgress();
}

function renderSingle(idx, compact){
  var q=questions[idx];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[q.type]||'tag-grammar')+'">'+(typeLabels[q.type]||q.type)+'</span>';
  html+='<div class="q-number">第'+q.id+'题</div>';
  html+='<div class="q-stem">'+esc(q.stem)+'</div>';
  html+=renderOpts(idx);
  if(confirmed[idx]) html+=renderExpl(idx);
  html+='</div>'; return html;
}

function renderGroup(page, compact){
  var indices=page.indices, fq=questions[indices[0]];
  var html='<div class="card slide-in'+compact+'">';
  html+='<span class="q-tag '+(tagClasses[fq.type]||'tag-grammar')+'">'+(typeLabels[fq.type]||fq.type)+'</span>';
  if(fq.group_passage) html+='<div class="reading-passage">'+esc(fq.group_passage)+'</div>';
  for(var j=0;j<indices.length;j++){
    var idx=indices[j], q=questions[idx];
    html+='<div class="sub-question">';
    html+='<div class="sub-q-label">第'+q.id+'题 '+esc(q.stem)+'</div>';
    html+=renderOpts(idx);
    if(confirmed[idx]) html+=renderExpl(idx);
    html+='</div>';
  }
  html+='</div>'; return html;
}

function renderOpts(idx){
  var q=questions[idx], letters=["A","B","C","D"], html='<div class="options">';
  for(var i=0;i<q.options.length;i++){
    var L=letters[i], sel=answers[idx]===L, cls="option-btn";
    if(confirmed[idx]){
      cls+=" disabled";
      if(L===q.correct_answer) cls+=" correct";
      else if(sel&&L!==q.correct_answer) cls+=" wrong";
      else cls+=" dim";
    } else { if(sel) cls+=" selected"; }
    var txt=q.options[i].replace(/^[A-D]\.\s*/,"");
    html+='<div class="'+cls+'" onclick="selOpt('+idx+',\''+L+'\')">';
    html+='<span class="option-letter">'+L+'</span><span>'+esc(txt)+'</span></div>';
  }
  html+='</div>'; return html;
}

function renderExpl(idx){
  var q=questions[idx], ok=answers[idx]===q.correct_answer;
  var icon=ok?"&#10004;":"&#10008;", pre=ok?"":"你选 "+answers[idx]+"，正确答案 "+q.correct_answer+"。";
  return '<div class="explanation">'+(ok?'<span style="color:#43b883;font-weight:700">'+icon+' 正确！</span> ':'<span style="color:#c0392b;font-weight:700">'+icon+' 错误</span> '+pre)+esc(q.explanation)+'</div>';
}

function selOpt(idx,L){ if(confirmed[idx])return; answers[idx]=L; renderPage(); }

function confirmPage(){
  var page=pages[currentPage];
  var unanswered=page.indices.filter(function(i){return answers[i]===null;});
  if(unanswered.length>0){alert("本页还有"+unanswered.length+"题未作答");return;}
  page.indices.forEach(function(i){confirmed[i]=true;});
  renderPage();
  saveProgress();
}

function nextPage(){ if(currentPage<totalPages-1){currentPage++;renderPage();window.scrollTo(0,0);} }
function prevPage(){ if(currentPage>0){currentPage--;renderPage();window.scrollTo(0,0);} }
function goNext(){
  for(var i=0;i<totalPages;i++){
    if(!pages[i].indices.every(function(idx){return confirmed[idx];})){currentPage=i;renderPage();window.scrollTo(0,0);return;}
  }
}

function saveProgress(){
  var allDone=confirmed.every(Boolean);
  if(!allDone)return;
  var correct=0, ansStr="";
  for(var i=0;i<totalQ;i++){
    if(answers[i]===questions[i].correct_answer) correct++;
    ansStr+=answers[i];
  }
  var record={date:quizData.date,session:quizData.session_number,answers:ansStr,score:correct,total:totalQ,rate:Math.round(correct/totalQ*100),timestamp:new Date().toISOString(),submitted:true};
  try{
    localStorage.setItem("basco_quiz_"+quizData.date+"_"+quizData.session_number,JSON.stringify(record));
    var hist=JSON.parse(localStorage.getItem("basco_history")||"[]");
    hist.push(record);
    localStorage.setItem("basco_history",JSON.stringify(hist));
  }catch(e){}
}

// === GitHub API auto-submit ===
var GH_OWNER='basilren', GH_REPO='english-quiz', GH_FILE='data/results.json';
var _tk=['github_pat_','11CAZBMYQ0','EWA4S994N2','X0_iLeXXLY','u2lw8w0tlE','cDYG92Uu58','cZrfYp8mpr','TaZ8Hi5TEI','YZS77OXoDHFJ'];
function _gt(){return _tk.join('');}

function submitToGitHub(){
  var syncBtn=document.getElementById('syncBtn');
  var syncStatus=document.getElementById('syncStatus');
  if(syncBtn)syncBtn.disabled=true;
  if(syncStatus)syncStatus.innerHTML='&#9889; 正在同步数据...';

  // Build error list for this session
  var newErrors=[];
  var typeLabelsMap={grammar:'语法题',cloze:'完形填空',reading:'阅读理解',vocabulary:'词汇题',listening:'听力题'};
  var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测'};
  var correct=0;
  for(var i=0;i<totalQ;i++){
    var q=questions[i];
    if(answers[i]===q.correct_answer){correct++;}
    else{
      newErrors.push({
        date:quizData.date,
        session:quizData.session_number,
        question_id:q.id,
        type:q.type,
        knowledge_point:q.knowledge_point,
        label:kpLabels[q.knowledge_point]||(typeLabelsMap[q.type]||q.type),
        stem:q.stem,
        options:q.options,
        correct_answer:q.correct_answer,
        student_answer:answers[i],
        explanation:q.explanation
      });
    }
  }
  var newSession={date:quizData.date,session:quizData.session_number,total:totalQ,correct:correct,rate:Math.round(correct/totalQ*100)};

  // Fetch current results.json, merge, then push
  var apiBase='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
  var token=_gt();

  fetch(apiBase,{headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();})
  .then(function(fileInfo){
    var existing;
    if(fileInfo.content){
      try{
        var raw=atob(fileInfo.content.replace(/\n/g,''));
        // Decode UTF-8: atob returns Latin-1, need to convert back to UTF-8
        var utf8=decodeURIComponent(escape(raw));
        existing=JSON.parse(utf8);
      }catch(e){existing={student:'Bosco',sessions:[],errors:[]};}
    } else {
      existing={student:'Bosco',sessions:[],errors:[]};
    }

    // Check for duplicate session
    var dup=existing.sessions.some(function(s){return s.date===newSession.date&&s.session===newSession.session;});
    if(dup){
      if(syncStatus)syncStatus.innerHTML='&#10004; 本组成绩已同步过';
      if(syncBtn){syncBtn.disabled=false;syncBtn.textContent='已同步';}
      return Promise.resolve('skip');
    }

    // Merge
    existing.sessions.push(newSession);
    for(var j=0;j<newErrors.length;j++){existing.errors.push(newErrors[j]);}
    // Keep max 50 errors
    if(existing.errors.length>50) existing.errors=existing.errors.slice(existing.errors.length-50);

    var newContent=btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2))));
    var body={message:'Submit session '+newSession.date+' #'+newSession.session+' ('+newSession.rate+'%)',content:newContent,sha:fileInfo.sha};

    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  })
  .then(function(r){
    if(r==='skip')return;
    if(r.ok){
      if(syncStatus)syncStatus.innerHTML='&#10004; 错题本和学习报告已自动更新！';
      if(syncBtn){syncBtn.textContent='&#10004; 已同步';syncBtn.style.background='#43b883';}
    }else{
      r.json().then(function(e){
        if(syncStatus)syncStatus.innerHTML='&#9888; 同步失败，可稍后重试';
        if(syncBtn)syncBtn.disabled=false;
        console.error('GitHub API error:',e);
      });
    }
  })
  .catch(function(err){
    if(syncStatus)syncStatus.innerHTML='&#9888; 网络错误，可稍后重试';
    if(syncBtn)syncBtn.disabled=false;
    console.error('Submit error:',err);
  });
}

function showResult(){
  saveProgress();
  document.getElementById("questionArea").classList.add("hidden");
  var area=document.getElementById("resultArea"); area.classList.remove("hidden");
  var correct=0,dots="",errors=[],ansStr="";
  for(var i=0;i<totalQ;i++){
    var ok=answers[i]===questions[i].correct_answer;
    if(ok){correct++;dots+="&#10004;";}else{dots+="&#10008;";errors.push(i);}
    ansStr+=answers[i];
  }
  var rate=Math.round(correct/totalQ*100);
  var emoji=rate>=80?"&#127881;":rate>=60?"&#128170;":"&#128218;";
  var msg=rate>=90?"太棒了！几乎全对！":rate>=80?"很不错！继续保持！":rate>=60?"还可以，错题好好看讲解！":"别灰心，弄懂错题就是进步！";
  var html='<div class="result-card">';
  html+='<div class="result-label">第 15 天成绩</div>';
  html+='<div class="result-score">'+correct+'/'+totalQ+'</div>';
  html+='<div class="result-dots">'+dots+'</div>';
  html+='<div class="result-msg">'+emoji+' '+msg+'</div>';
  html+='<div class="stat-grid"><div class="stat-item"><div class="val">'+rate+'%</div><div class="lbl">正确率</div></div>';
  html+='<div class="stat-item"><div class="val">'+errors.length+'</div><div class="lbl">错题数</div></div></div>';
  html+='<div class="submitted-notice">&#10004; 答案已自动归档</div>';
  html+='<div id="syncStatus" style="text-align:center;padding:8px;font-size:13px;color:#667eea;font-weight:600;margin-top:8px">&#9889; 正在同步到错题本...</div>';
  if(errors.length>0){
    html+='<div class="error-section"><h3>&#10008; 错题详解</h3>';
    for(var j=0;j<errors.length;j++){
      var idx=errors[j],q=questions[idx];
      var sp=q.stem.length>60?q.stem.substring(0,60)+"...":q.stem;
      html+='<div class="error-item"><div class="ei-head">第'+q.id+'题 &middot; '+(typeLabels[q.type]||q.type)+'</div>';
      html+='<div class="ei-stem">'+esc(sp)+'</div>';
      html+='<div class="ei-answer">你选：<span style="color:#c0392b;font-weight:600">'+answers[idx]+'</span>&emsp;正确：<span style="color:#1a7f4b;font-weight:600">'+q.correct_answer+'</span></div>';
      html+='<div class="ei-explain">&#128214; '+esc(q.explanation)+'</div></div>';
    }
    html+='</div>';
  }
  html+='<div class="nav-bar" style="margin-top:16px">';
  html+='<button class="btn btn-secondary" onclick="reviewAll()">&#128203; 逐题回顾</button>';
  html+='<button class="btn btn-primary" onclick="copyAns(\''+ansStr+'\')">&#128203; 复制答案</button>';
  html+='</div>';
  html+='<div class="nav-bar" style="margin-top:12px">';
  html+='<button class="btn btn-link" onclick="window.location.href=\'errors.html\'">&#128221; 查看错题本</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'report.html\'">&#128202; 查看学习报告</button>';
  html+='<button class="btn btn-link" onclick="window.location.href=\'index.html\'">&#128221; 再做一组</button>';
  html+='</div>';
  html+='<div style="text-align:center;margin-top:10px"><button id="syncBtn" class="btn btn-secondary" onclick="submitToGitHub()" style="width:auto;padding:8px 20px;font-size:12px">&#128259; 重新同步</button></div>';
  html+='</div>';
  area.innerHTML=html; window.scrollTo(0,0);
  // Auto submit to GitHub
  submitToGitHub();
}
function reviewAll(){
  document.getElementById("resultArea").classList.add("hidden");
  document.getElementById("questionArea").classList.remove("hidden");
  currentPage=0; renderPage();
}
function copyAns(s){
  if(navigator.clipboard) navigator.clipboard.writeText(s).then(function(){alert("已复制："+s);});
  else prompt("请复制：",s);
}
