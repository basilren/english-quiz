<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>加载中...</title>
<style>
body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; }
.box { background: #fff; border-radius: 16px; padding: 40px 30px; text-align: center; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
h2 { color: #4a3f8a; margin-bottom: 12px; }
p { color: #666; font-size: 14px; line-height: 1.6; }
.spinner { width: 36px; height: 36px; border: 4px solid #e8e4f0; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.retry-btn { display: inline-block; margin-top: 16px; padding: 10px 28px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }
</style>
<script>
// GitHub Pages 404 auto-redirect:
// When Pages returns 404, this page loads instead.
// We redirect to index.html with a cache-busting param.
var maxRetries = 3;
var retryCount = parseInt(sessionStorage.getItem('gh404_retry') || '0');

if (retryCount < maxRetries) {
  sessionStorage.setItem('gh404_retry', retryCount + 1);
  // Redirect to root with cache bust
  var bust = Date.now();
  window.location.replace('/english-quiz/?_cb=' + bust);
} else {
  // After 3 retries, stop and show manual button
  sessionStorage.removeItem('gh404_retry');
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('autoMsg').textContent = '页面暂时无法加载，请点击下方按钮手动刷新';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'inline-block';
  });
}
</script>
</head>
<body>
<div class="box">
  <h2>📝 Bosco 英语练习</h2>
  <div class="spinner" id="spinner"></div>
  <p id="autoMsg">页面加载中，正在自动跳转...</p>
  <a href="/english-quiz/" class="retry-btn" id="retryBtn" style="display:none" onclick="sessionStorage.removeItem('gh404_retry')">🔄 手动刷新</a>
</div>
</body>
</html>
