<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Basco 学习报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:12px;color:#333}
.container{max-width:600px;margin:0 auto}
.card{background:rgba(255,255,255,0.97);border-radius:16px;padding:18px 16px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.card h2{font-size:16px;color:#4a3f8a;margin-bottom:12px;text-align:center}
.card h3{font-size:14px;color:#4a3f8a;margin-bottom:10px}
.header{text-align:center;padding-bottom:6px}
.header h1{font-size:22px;color:#4a3f8a;margin-bottom:2px}
.header .sub{font-size:12px;color:#888}
.big-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.big-stat{background:#f8f7ff;border-radius:12px;padding:12px 8px;text-align:center}
.big-stat .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.big-stat .lbl{font-size:11px;color:#999;margin-top:2px}
.streak{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:10px;background:#fff8eb;border-radius:10px}
.streak .fire{font-size:28px}
.streak .txt{font-size:14px;color:#b45309;font-weight:600}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cal-header{font-size:10px;color:#999;text-align:center;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:11px;color:#ccc;background:#f9f8fc}
.cal-day.active{background:#43b883;color:#fff;font-weight:700}
.cal-day.today{border:2px solid #667eea}
.cal-day.empty{background:transparent}
.bar-row{display:flex;align-items:center;margin-bottom:10px}
.bar-label{width:80px;font-size:12px;color:#555;flex-shrink:0}
.bar-track{flex:1;height:20px;background:#f0edf5;border-radius:10px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:10px;transition:width 0.6s ease}
.bar-fill.green{background:linear-gradient(90deg,#43b883,#2d8f6f)}
.bar-fill.yellow{background:linear-gradient(90deg,#f59e0b,#d97706)}
.bar-fill.red{background:linear-gradient(90deg,#ef4444,#c0392b)}
.bar-val{width:42px;text-align:right;font-size:12px;font-weight:700;color:#555;margin-left:6px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
.pill.red{background:#ef4444}.pill.yellow{background:#f59e0b}.pill.green{background:#43b883}.pill.gray{background:#aaa}
.session-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed #f0edf5}
.session-row:last-child{border-bottom:none}
.session-info{font-size:13px;color:#555}
.session-score{font-size:14px;font-weight:700}
.session-score.high{color:#43b883}.session-score.mid{color:#f59e0b}.session-score.low{color:#ef4444}
.link-bar{display:flex;gap:8px;margin-bottom:12px}
.link-btn{flex:1;display:block;text-align:center;padding:13px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;color:#fff}
.link-btn.purple{background:linear-gradient(135deg,#667eea,#764ba2)}
.link-btn.red{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.footer{text-align:center;padding:14px;color:rgba(255,255,255,0.6);font-size:11px}
.loading-msg{background:rgba(255,255,255,0.95);border-radius:16px;padding:40px 20px;text-align:center;color:#888;font-size:15px}
</style>
</head>
<body>
<div class="container">
  <div id="reportContent"><div class="loading-msg">⏳ 加载学习数据...</div></div>
  <div class="link-bar">
    <a class="link-btn purple" href="/english-quiz/">📝 去做题</a>
    <a class="link-btn red" href="/english-quiz/errors.html">📒 错题本</a>
  </div>
  <div class="footer">Basco English Tutor · 报告随练习自动更新 · 加油💪</div>
</div>

<script>
var kpLabels={present_perfect:'现在完成时',object_clause:'宾语从句',conditional:'条件状语从句',infinitive:'不定式',gerund:'动名词',passive_voice:'被动语态',word_meaning:'单词释义',phrase_collocation:'词组搭配',cloze_general:'完形填空',detail:'阅读-细节理解',main_idea:'阅读-主旨大意',inference:'阅读-推理判断',word_guessing:'阅读-词义猜测'};

function loadData(){
  var url='./data/results.json?v='+Date.now();
  fetch(url,{cache:'no-store'})
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  })
  .then(function(text){
    var data=JSON.parse(text);
    renderReport(data);
  })
  .catch(function(err){
    // Fallback: GitHub API
    fetch('https://api.github.com/repos/basilren/english-quiz/contents/data/results.json',{headers:{'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){return r.json();})
    .then(function(info){
      var raw=atob(info.content.replace(/\n/g,''));
      var text=decodeURIComponent(escape(raw));
      renderReport(JSON.parse(text));
    })
    .catch(function(e){
      document.getElementById('reportContent').innerHTML='<div class="loading-msg">\u26A0\uFE0F \u52A0\u8F7D\u5931\u8D25\uFF0C\u8BF7\u5237\u65B0</div>';
    });
  });
}

function renderReport(data){
  var sessions=data.sessions||[];
  var errors=data.errors||[];
  var area=document.getElementById('reportContent');

  if(sessions.length===0){
    area.innerHTML='<div class="loading-msg">还没有做题记录，快去做题吧！</div>';
    return;
  }

  // Calculate stats
  var totalQ=0,totalC=0;
  sessions.forEach(function(s){totalQ+=s.total;totalC+=s.correct;});
  var overallRate=Math.round(totalC/totalQ*100);
  var dates={};
  sessions.forEach(function(s){dates[s.date]=1;});
  var uniqueDates=Object.keys(dates).sort();
  var dayCount=uniqueDates.length;

  // Streak calculation
  var streak=0;
  var today=new Date();today.setHours(0,0,0,0);
  for(var d=0;d<365;d++){
    var checkDate=new Date(today);checkDate.setDate(checkDate.getDate()-d);
    var ds=checkDate.toISOString().slice(0,10);
    if(dates[ds])streak++;
    else if(d>0)break;
  }

  // Knowledge point accuracy
  var kpStats={};
  // Count from sessions + errors
  sessions.forEach(function(s){
    // We don't have per-question data from sessions, only from errors
  });
  // Build question-level stats from quiz data stored in errors
  // We'll approximate: for each session, total - errors for that session = correct
  // For knowledge-point level, we need error data
  var kpErrors={};
  errors.forEach(function(e){
    if(!kpErrors[e.knowledge_point])kpErrors[e.knowledge_point]={wrong:0,label:e.label||kpLabels[e.knowledge_point]||e.knowledge_point};
    kpErrors[e.knowledge_point].wrong++;
  });

  var html='';

  // === Header Card ===
  html+='<div class="card header">';
  html+='<h1>📊 Basco 学习报告</h1>';
  html+='<div class="sub">沪教版 Oxford English 8B · 更新于 '+sessions[sessions.length-1].date+'</div>';
  html+='<div class="big-stats">';
  html+='<div class="big-stat"><div class="num">'+dayCount+'</div><div class="lbl">练习天数</div></div>';
  html+='<div class="big-stat"><div class="num">'+totalQ+'</div><div class="lbl">总做题数</div></div>';
  html+='<div class="big-stat"><div class="num">'+overallRate+'%</div><div class="lbl">总正确率</div></div>';
  html+='</div>';
  html+='<div class="streak"><span class="fire">🔥</span><span class="txt">连续打卡 '+streak+' 天！'+(streak>=7?'太棒了！':streak>=3?'继续坚持！':'养成习惯！')+'</span></div>';
  html+='</div>';

  // === Calendar Card ===
  var now=new Date();
  var year=now.getFullYear(),month=now.getMonth();
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var todayDate=now.getDate();
  var monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  // Adjust firstDay for Monday-start (0=Mon, 6=Sun)
  var startOffset=(firstDay===0?6:firstDay-1);

  html+='<div class="card"><h2>📅 '+monthNames[month]+'打卡日历</h2>';
  html+='<div class="calendar">';
  html+='<div class="cal-header">一</div><div class="cal-header">二</div><div class="cal-header">三</div>';
  html+='<div class="cal-header">四</div><div class="cal-header">五</div><div class="cal-header">六</div><div class="cal-header">日</div>';
  for(var e=0;e<startOffset;e++)html+='<div class="cal-day empty"></div>';
  for(var dd=1;dd<=daysInMonth;dd++){
    var dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    var cls='cal-day';
    if(dates[dateStr])cls+=' active';
    if(dd===todayDate)cls+=' today';
    html+='<div class="'+cls+'">'+dd+'</div>';
  }
  html+='</div>';
  // Calendar footer
  var activeDaysThisMonth=uniqueDates.filter(function(d){return d.startsWith(year+'-'+String(month+1).padStart(2,'0'));}).length;
  html+='<div style="text-align:center;margin-top:8px;font-size:11px;color:#999">🟢 = 已打卡 · 本月打卡 <b>'+activeDaysThisMonth+'</b> 天</div>';
  html+='</div>';

  // === Accuracy by Knowledge Point ===
  html+='<div class="card"><h2>📈 各知识点分析</h2><div id="barChart">';
  // Get knowledge point stats from errors
  var kpList=Object.keys(kpErrors);
  if(kpList.length>0){
    kpList.sort(function(a,b){return kpErrors[b].wrong-kpErrors[a].wrong;});
    kpList.forEach(function(kp){
      var e=kpErrors[kp];
      var barColor=e.wrong>=3?'red':e.wrong>=2?'yellow':'green';
      var barWidth=Math.min(100,e.wrong*25);
      html+='<div class="bar-row">';
      html+='<span class="bar-label">'+e.label+'</span>';
      html+='<div class="bar-track"><div class="bar-fill '+barColor+'" style="width:'+barWidth+'%"></div></div>';
      html+='<span class="bar-val">'+e.wrong+'错</span>';
      html+='</div>';
    });
  } else {
    html+='<div style="text-align:center;color:#888;padding:10px">暂无数据</div>';
  }
  html+='</div></div>';

  // === Weakness Status ===
  html+='<div class="card"><h2>🎯 弱项状态</h2>';
  var weak=[],mastered=[];
  kpList.forEach(function(kp){
    var e=kpErrors[kp];
    if(e.wrong>=2)weak.push(e);
    else mastered.push(e);
  });
  if(weak.length>0){
    html+='<h3>🔴 需加强</h3><div class="pills" style="margin-bottom:14px">';
    weak.forEach(function(e){html+='<span class="pill red">'+e.label+' ('+e.wrong+'错)</span>';});
    html+='</div>';
  }
  if(mastered.length>0){
    html+='<h3>🟡 偶发错误</h3><div class="pills" style="margin-bottom:14px">';
    mastered.forEach(function(e){html+='<span class="pill yellow">'+e.label+' ('+e.wrong+'错)</span>';});
    html+='</div>';
  }
  // Unlocked topics (no errors)
  var allKP=['present_perfect','object_clause','conditional','infinitive','gerund','passive_voice','word_meaning','phrase_collocation','cloze_general','detail','main_idea','inference','word_guessing'];
  var unlocked=allKP.filter(function(k){return !kpErrors[k];});
  if(unlocked.length>0){
    html+='<h3>⬜ 未涉及/全对</h3><div class="pills">';
    unlocked.forEach(function(k){html+='<span class="pill gray">'+(kpLabels[k]||k)+'</span>';});
    html+='</div>';
  }
  html+='</div>';

  // === Session History ===
  html+='<div class="card"><h2>📋 做题记录</h2>';
  var sorted=sessions.slice().reverse();
  sorted.forEach(function(s){
    var cls='session-score '+(s.rate>=80?'high':s.rate>=60?'mid':'low');
    html+='<div class="session-row">';
    html+='<div class="session-info">'+s.date+' · 第'+s.session+'组 · '+s.total+'题</div>';
    html+='<div class="'+cls+'">'+s.rate+'%（'+s.correct+'/'+s.total+'）</div>';
    html+='</div>';
  });
  // Trend
  if(sessions.length>=2){
    var last=sessions[sessions.length-1].rate,prev=sessions[sessions.length-2].rate;
    var diff=last-prev;
    if(diff>0)html+='<div style="text-align:center;margin-top:10px;font-size:12px;color:#43b883;font-weight:600">📈 最近一组比上一组提升了 '+diff+'%！</div>';
    else if(diff<0)html+='<div style="text-align:center;margin-top:10px;font-size:12px;color:#ef4444;font-weight:600">📉 最近一组比上一组下降了 '+Math.abs(diff)+'%，加油！</div>';
    else html+='<div style="text-align:center;margin-top:10px;font-size:12px;color:#f59e0b;font-weight:600">持平！继续努力！</div>';
  }
  html+='</div>';

  area.innerHTML=html;
}

loadData();
</script>
</body>
</html>
